# GPU override for WSL2 (Docker without nvidia-container-toolkit).
# The NVIDIA GPU is reached by mounting the WSL driver libs + the /dev/dxg
# compute device into the container; ollama's bundled CUDA runtime then
# finds libcuda via LD_LIBRARY_PATH.
#
#   docker compose -f docker-compose.yml -f docker-compose.gpu-wsl.yml up -d
services:
  ollama:
    devices:
      - /dev/dxg:/dev/dxg
    volumes:
      - /usr/lib/wsl:/usr/lib/wsl:ro
    environment:
      LD_LIBRARY_PATH: /usr/lib/wsl/lib
