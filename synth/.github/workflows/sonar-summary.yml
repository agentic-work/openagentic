# Proprietary and confidential. Unauthorized copying prohibited.

# Sonar → GitHub Issues Summary
# Maintains a single rolling GitHub issue (label: "sonar-summary") per
# repo, refreshed on SonarQube scan completion and weekly. Uses the
# GitHub REST API directly (no gh CLI dependency on the runner).
name: Sonar Summary Issue
on:
  workflow_run:
    workflows: [SonarQube]
    types: [completed]
  schedule:
    - cron: '0 13 * * 1'
  workflow_dispatch:
permissions:
  contents: read
  issues: write
jobs:
  sync:
    name: Sync findings to GitHub Issue
    runs-on: arc-${{ github.event.repository.name }}
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Build body + upsert issue
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }}
          PROJECT: ${{ github.event.repository.name }}
          REPO: ${{ github.repository }}
          GH_API: https://api.github.com
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          SQ_AUTH="-u ${SONAR_TOKEN}:"
          GH_HDR=(-H "Accept: application/vnd.github+json" -H "Authorization: Bearer ${GH_TOKEN}" -H "X-GitHub-Api-Version: 2022-11-28")

          # Ensure label exists (idempotent: 422 if exists)
          curl -sk -X POST "${GH_HDR[@]}" "${GH_API}/repos/${REPO}/labels" \
            -d '{"name":"sonar-summary","color":"FBCA04","description":"SonarQube rolling summary"}' >/dev/null || true

          MEASURES=$(curl -sk $SQ_AUTH "${SONAR_HOST_URL}/api/measures/component?component=${PROJECT}&metricKeys=alert_status,bugs,vulnerabilities,code_smells,security_hotspots,coverage,duplicated_lines_density,reliability_rating,security_rating,sqale_rating,ncloc")
          get() { echo "$MEASURES" | jq -r --arg k "$1" '.component.measures[] | select(.metric==$k) | .value' ; }
          rating() { case "$1" in 1.0) echo "A";; 2.0) echo "B";; 3.0) echo "C";; 4.0) echo "D";; 5.0) echo "E";; *) echo "-";; esac; }

          QG=$(get alert_status); BUGS=$(get bugs); VULNS=$(get vulnerabilities)
          SMELLS=$(get code_smells); HOTSPOTS=$(get security_hotspots)
          COV=$(get coverage); DUP=$(get duplicated_lines_density)
          REL=$(rating "$(get reliability_rating)")
          SEC=$(rating "$(get security_rating)")
          MAINT=$(rating "$(get sqale_rating)")
          LOC=$(get ncloc)

          TOP=$(curl -sk $SQ_AUTH \
            "${SONAR_HOST_URL}/api/issues/search?componentKeys=${PROJECT}&severities=BLOCKER,CRITICAL&resolved=false&ps=15&s=SEVERITY&asc=false" \
            | jq -r '.issues[] | "- **[\(.severity)]** `\(.rule)` — \(.component | split(":") | .[1] // .[0]):\(.line // 0) — \(.message)"')
          [ -z "$TOP" ] && TOP="_No BLOCKER/CRITICAL open issues._"

          {
            echo "# SonarQube Summary — \`${PROJECT}\`"
            echo
            echo "_Auto-updated on each SQ scan completion and weekly._"
            echo
            echo "**Dashboard:** ${SONAR_HOST_URL}/dashboard?id=${PROJECT}"
            echo
            echo "## Quality Gate: **${QG:-UNKNOWN}**"
            echo
            echo "| Metric | Value |"
            echo "|---|---:|"
            echo "| Reliability | ${REL} |"
            echo "| Security | ${SEC} |"
            echo "| Maintainability | ${MAINT} |"
            echo "| Bugs | ${BUGS:-0} |"
            echo "| Vulnerabilities | ${VULNS:-0} |"
            echo "| Security Hotspots | ${HOTSPOTS:-0} |"
            echo "| Code Smells | ${SMELLS:-0} |"
            echo "| Coverage | ${COV:-0}% |"
            echo "| Duplication | ${DUP:-0}% |"
            echo "| Lines of Code | ${LOC:-0} |"
            echo
            echo "## Top 15 BLOCKER / CRITICAL open issues"
            echo
            echo "$TOP"
            echo
            echo "---"
            echo "_Updated: $(date -u +%Y-%m-%dT%H:%M:%SZ) UTC_"
          } > /tmp/body.md

          # JSON-encode body
          BODY_JSON=$(jq -Rs . < /tmp/body.md)
          TITLE="SonarQube Summary — ${PROJECT}"

          # Find existing open issue with label
          EXISTING=$(curl -sk "${GH_HDR[@]}" \
            "${GH_API}/repos/${REPO}/issues?labels=sonar-summary&state=open&per_page=1" \
            | jq -r '.[0].number // empty')

          if [ -n "$EXISTING" ]; then
            curl -sk -X PATCH "${GH_HDR[@]}" "${GH_API}/repos/${REPO}/issues/${EXISTING}" \
              -d "{\"body\":${BODY_JSON}}" >/dev/null
            echo "Updated issue #${EXISTING}"
          else
            curl -sk -X POST "${GH_HDR[@]}" "${GH_API}/repos/${REPO}/issues" \
              -d "{\"title\":\"${TITLE}\",\"body\":${BODY_JSON},\"labels\":[\"sonar-summary\"]}" \
              | jq -r '"Created issue #\(.number): \(.html_url)"'
          fi
