# Proprietary and confidential. Unauthorized copying prohibited.

# Secret scanner — fails the build if committed secrets (API keys,
# tokens, credentials) are detected via gitleaks.
name: Secret Scan
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: read
jobs:
  gitleaks:
    name: Gitleaks
    runs-on: arc-${{ github.event.repository.name }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history — scan everything, not just HEAD
      - name: Install gitleaks
        run: |
          curl -sL https://github.com/gitleaks/gitleaks/releases/download/v8.21.2/gitleaks_8.21.2_linux_x64.tar.gz | tar xz
          sudo mv gitleaks /usr/local/bin/gitleaks
          gitleaks version
      - name: Run gitleaks
        run: gitleaks detect --source . --verbose --redact --exit-code 1
