# Proprietary and confidential. Unauthorized copying prohibited.

# Synth Built-in Capabilities
# These define WHAT is available, not HOW to use it.

capabilities:
  # ============================================
  # HTTP / Web Requests
  # ============================================
  - name: http
    description: |
      Make HTTP requests to external APIs and web services.
      Supports GET, POST, PUT, DELETE methods.
      Use httpx for async requests.
    auth:
      type: none
      description: No auth by default, but can use bearer tokens if provided
    allowed_domains: []  # Empty = all domains allowed (configure per-deployment)
    rate_limit: 60  # requests per minute
    max_response_size: 10000000  # 10MB
    sdk_import: "import httpx"
    packages: ["httpx"]

  # ============================================
  # Filesystem
  # ============================================
  - name: filesystem
    description: |
      Read and write files on the local filesystem.
      Restricted to the configured working directory.
      Use pathlib for path operations.
    auth:
      type: none
      description: No auth, but path restrictions apply
    sdk_import: "from pathlib import Path"

  # ============================================
  # Shell Commands
  # ============================================
  - name: shell
    description: |
      Execute shell commands in a subprocess.
      Commands run in the configured working directory.
      Use asyncio.create_subprocess_exec for async execution.
    auth:
      type: none
      description: No auth, sandboxed execution
    sdk_import: "import asyncio"

  # ============================================
  # GitHub API
  # ============================================
  - name: github
    description: |
      Access the GitHub REST API for repositories, issues, PRs, users, etc.
      Requires a GitHub Personal Access Token or GitHub App credentials.
      Use httpx to call api.github.com endpoints.
    auth:
      type: bearer
      scopes:
        - repo:read
        - repo:write
        - issues:read
        - issues:write
        - pull_requests:read
        - pull_requests:write
        - user:read
        - notifications:read
      token_env_var: GITHUB_TOKEN
      description: GitHub Personal Access Token
    allowed_domains:
      - api.github.com
    rate_limit: 30  # Be conservative with GitHub API
    schema_url: https://api.github.com
    schema_type: openapi
    sdk_import: "import httpx  # Use Authorization: Bearer {GITHUB_TOKEN}"
    packages: ["httpx"]

  # ============================================
  # Slack API
  # ============================================
  - name: slack
    description: |
      Access the Slack Web API for messages, channels, users, etc.
      Requires a Slack Bot Token or User Token.
    auth:
      type: bearer
      scopes:
        - channels:read
        - channels:write
        - chat:write
        - users:read
        - files:read
        - files:write
      token_env_var: SLACK_TOKEN
      description: Slack Bot Token (xoxb-) or User Token (xoxp-)
    allowed_domains:
      - slack.com
      - api.slack.com
    rate_limit: 20
    schema_type: openapi
    sdk_import: "import httpx  # Use Authorization: Bearer {SLACK_TOKEN}"
    packages: ["httpx"]

  # ============================================
  # AWS (boto3)
  # ============================================
  - name: aws
    description: |
      Access AWS services via boto3.
      Supports S3, EC2, Lambda, DynamoDB, SQS, SNS, CloudWatch, Cost Explorer, IAM.
      Uses ambient AWS credentials (env vars, ~/.aws/credentials, or IAM role).
      Use asyncio.run_in_executor for sync boto3 calls.
    auth:
      type: ambient
      description: AWS credentials from environment, config files, or IAM role
    sdk_import: "import boto3"
    packages: ["boto3"]

  # ============================================
  # Google Cloud Platform
  # ============================================
  - name: gcp
    description: |
      Access Google Cloud services via the google-cloud SDK or REST API.
      Supports Storage, BigQuery, Pub/Sub, Compute Engine, Billing, IAM.
      Uses ambient GCP credentials (gcloud auth, service account, GOOGLE_APPLICATION_CREDENTIALS).
      For simple operations, use httpx with gcloud auth print-access-token.
      For SDK usage, use google.cloud client libraries.
    auth:
      type: ambient
      description: GCP credentials from gcloud auth, service account key, or workload identity
    sdk_import: "import subprocess; import httpx  # Use gcloud auth print-access-token for bearer"
    packages: ["httpx", "google-cloud-storage", "google-cloud-compute", "google-cloud-bigquery", "google-cloud-resource-manager", "google-cloud-billing", "google-cloud-iam"]

  # ============================================
  # Microsoft Azure
  # ============================================
  - name: azure
    description: |
      Access Microsoft Azure services via the Azure SDK or REST API.
      Supports Blob Storage, Cosmos DB, Key Vault, Functions, Virtual Machines, Cost Management.
      Uses ambient Azure credentials (az login, service principal, managed identity).
      For REST API calls, use httpx with: az account get-access-token --resource https://management.azure.com --query accessToken -o tsv
      Get subscription ID with: az account show --query id -o tsv
      Cost Management API: POST /subscriptions/{subId}/providers/Microsoft.CostManagement/query?api-version=2023-11-01
      Date format for timePeriod: "2026-01-01T00:00:00Z"
    auth:
      type: ambient
      description: Azure credentials from az login, service principal, or managed identity
    sdk_import: "import subprocess; import httpx  # Use az account get-access-token for bearer"
    packages: ["httpx", "azure-identity", "azure-mgmt-resource", "azure-mgmt-storage", "azure-storage-blob", "azure-mgmt-authorization", "azure-mgmt-monitor"]

  # ============================================
  # Stripe Payments
  # ============================================
  - name: stripe
    description: |
      Access the Stripe API for payments, customers, subscriptions, invoices,
      checkout sessions, refunds, and webhooks. Use the official stripe SDK;
      all write operations modify real customer/billing state when the
      configured API key is a live-mode key (sk_live_).
      Set `stripe.api_key = os.environ["STRIPE_API_KEY"]` before any call.
    auth:
      type: api_key
      scopes:
        - customers:read
        - customers:write
        - charges:read
        - charges:write
        - payment_intents:read
        - payment_intents:write
        - subscriptions:read
        - subscriptions:write
        - invoices:read
        - invoices:write
        - refunds:write
        - checkout:write
      token_env_var: STRIPE_API_KEY
      description: Stripe restricted or secret API key (sk_test_ or sk_live_)
    allowed_domains:
      - api.stripe.com
    rate_limit: 100
    schema_url: https://api.stripe.com
    schema_type: openapi
    sdk_import: "import stripe  # stripe.api_key = os.environ['STRIPE_API_KEY']"
    packages: ["stripe"]
    hitl_risks:
      - "Any POST that creates or modifies charges, refunds, payouts, subscriptions, or invoices moves real money"
      - "Live-mode keys (sk_live_) affect production customers and billing — preview the key prefix before approving"
      - "Refunds, disputes, and subscription cancellations are irreversible through the API"
      - "Updates to customer payment methods can expose, replace, or detach stored cards"

  # ============================================
  # Postgres / Supabase / Neon / RDS
  # ============================================
  - name: postgres
    description: |
      Query and mutate Postgres-compatible databases (Postgres, Supabase,
      Neon, RDS, CockroachDB). Supports arbitrary SQL, transactions, schema
      introspection via information_schema, and server-side prepared
      statements. Connect with psycopg v3 in async mode using the libpq URI
      from DATABASE_URL.
    auth:
      type: api_key
      scopes:
        - query:read
        - query:write
        - ddl:write
      token_env_var: DATABASE_URL
      description: libpq connection URI (postgres://user:pass@host:port/db?sslmode=require)
    rate_limit: 300
    sdk_import: "import psycopg  # await psycopg.AsyncConnection.connect(os.environ['DATABASE_URL'])"
    packages: ["psycopg[binary]"]
    hitl_risks:
      - "DDL (CREATE/ALTER/DROP TABLE, TRUNCATE) permanently alters schema and is often irreversible"
      - "Unbounded DELETE or UPDATE without a WHERE clause can wipe entire tables"
      - "SELECT * on large tables may leak PII or exhaust memory — prefer explicit columns and LIMIT"
      - "Cross-schema or cross-tenant reads may escape the caller's intended data boundary"
      - "Long-running transactions can hold locks and block production traffic"

  # ============================================
  # Notion API
  # ============================================
  - name: notion
    description: |
      Access the Notion API for pages, databases, blocks, comments, and
      search. Supports both workspace-level internal-integration tokens and
      OAuth2 access tokens. Use the notion-client AsyncClient against
      https://api.notion.com/v1.
    auth:
      type: bearer
      scopes:
        - pages:read
        - pages:write
        - databases:read
        - databases:write
        - blocks:read
        - blocks:write
        - comments:read
        - comments:write
        - users:read
      token_env_var: NOTION_TOKEN
      description: Notion internal-integration token (secret_...) or OAuth access token
    allowed_domains:
      - api.notion.com
    rate_limit: 3  # Notion documented average: ~3 requests/second
    schema_url: https://api.notion.com/v1
    schema_type: openapi
    sdk_import: "from notion_client import AsyncClient  # AsyncClient(auth=os.environ['NOTION_TOKEN'])"
    packages: ["notion-client"]
    hitl_risks:
      - "Archiving pages or databases removes access for other workspace users (recoverable but disruptive)"
      - "Database property-schema changes can break dependent views, formulas, and automations"
      - "Block rewrites are destructive when existing block IDs are replaced rather than updated"
      - "Integration tokens bypass per-user permission UI — writes apply with workspace-admin authority"

  # ============================================
  # Atlassian (Jira + Confluence)
  # ============================================
  - name: atlassian
    description: |
      Access Jira (issues, JQL, transitions, sprints) and Confluence (pages,
      spaces, comments) via the Atlassian Cloud REST API. Requires three env
      vars: ATLASSIAN_SITE (e.g. "mycompany.atlassian.net"),
      ATLASSIAN_EMAIL, and ATLASSIAN_API_TOKEN. Authenticate with HTTP Basic:
      auth=(email, token). Jira v3 base: /rest/api/3/; Confluence v2 base:
      /wiki/api/v2/.
    auth:
      type: basic
      scopes:
        - jira:issues:read
        - jira:issues:write
        - jira:projects:read
        - jira:transitions:write
        - confluence:pages:read
        - confluence:pages:write
        - confluence:spaces:read
      token_env_var: ATLASSIAN_API_TOKEN
      description: Atlassian API token; also requires ATLASSIAN_SITE and ATLASSIAN_EMAIL
    allowed_domains:
      - atlassian.net
      - atlassian.com
    rate_limit: 30
    sdk_import: "import httpx  # auth=(os.environ['ATLASSIAN_EMAIL'], os.environ['ATLASSIAN_API_TOKEN']); base=f\"https://{os.environ['ATLASSIAN_SITE']}\""
    packages: ["httpx"]
    hitl_risks:
      - "Bulk issue transitions or deletions can cascade through sprints and break reporting"
      - "JQL queries scoped too broadly can leak cross-project PII and customer data"
      - "Confluence page rewrites overwrite wiki history if the update API replaces body wholesale"
      - "Permission-scheme changes on spaces affect every downstream user"

  # ============================================
  # Linear (GraphQL)
  # ============================================
  - name: linear
    description: |
      Access the Linear API for issues, cycles, projects, teams, and
      comments. GraphQL-only API at https://api.linear.app/graphql.
      Authenticate with Authorization: <LINEAR_API_KEY> (no "Bearer "
      prefix — Linear uses the raw key).
    auth:
      type: api_key
      scopes:
        - issues:read
        - issues:write
        - projects:read
        - projects:write
        - teams:read
        - cycles:read
        - comments:write
      token_env_var: LINEAR_API_KEY
      description: Linear personal API key (lin_api_...)
    allowed_domains:
      - api.linear.app
    rate_limit: 60
    schema_url: https://api.linear.app/graphql
    schema_type: graphql
    sdk_import: "import httpx  # headers={'Authorization': os.environ['LINEAR_API_KEY'], 'Content-Type': 'application/json'}"
    packages: ["httpx"]
    hitl_risks:
      - "Issue deletions in Linear are permanent — there is no trash/undo via API"
      - "Bulk assignment or team-wide relabelling disrupts in-flight engineering work"
      - "Cycle restructuring (moving issues between cycles) breaks sprint reports"

  # ============================================
  # Kubernetes (kubectl via official client)
  # ============================================
  - name: kubernetes
    description: |
      Interact with Kubernetes clusters via the official Python client
      (kubectl-equivalent). Supports list/get/apply/delete/exec/logs/
      port-forward across the contexts available in KUBECONFIG. Pick a
      context explicitly; do not default silently to whatever current-context
      happens to be in the user's kubeconfig (production risk).
    auth:
      type: ambient
      scopes:
        - k8s:read
        - k8s:write
        - k8s:exec
        - k8s:delete
      description: Uses KUBECONFIG from env (and optional KUBE_CONTEXT to pick a context)
    rate_limit: 120
    sdk_import: "from kubernetes import client, config  # config.load_kube_config(context=os.environ.get('KUBE_CONTEXT'))"
    packages: ["kubernetes"]
    hitl_risks:
      - "apply/patch/replace against a prod context can ship config changes immediately with no rollback"
      - "delete on namespaces, statefulsets, or PVCs is effectively irreversible (data loss)"
      - "kubectl exec grants an interactive shell inside a running pod — full privileged access"
      - "Contexts often default to the last-used cluster; verify the target context before approving"
      - "port-forward can expose internal services to the local machine and any snooping process"

  # ============================================
  # Browser automation (Playwright)
  # ============================================
  - name: browser
    description: |
      Headless Chromium automation via Playwright for the no-API long tail:
      navigate, fill forms, click, screenshot, scrape authenticated pages.
      Requires a one-time `playwright install chromium` in the sandbox
      environment. Use a persistent context rooted at BROWSER_PROFILE_DIR
      to reuse cookies and logged-in sessions across invocations.
    auth:
      type: none
      description: No server-side auth; session cookies come from BROWSER_PROFILE_DIR if set
    rate_limit: 30
    sdk_import: "from playwright.async_api import async_playwright  # async with async_playwright() as p: browser = await p.chromium.launch_persistent_context(os.environ.get('BROWSER_PROFILE_DIR', '/tmp/synth-browser'))"
    packages: ["playwright"]
    hitl_risks:
      - "Clicks and form submissions against authenticated sessions perform real actions as the logged-in user"
      - "Navigation outside an expected allow-list can phish the browser profile toward malicious pages"
      - "File downloads and uploads can exfiltrate or introduce data without a network-layer audit"
      - "Screenshots of internal dashboards may capture PII, secrets, or auth tokens visible in the DOM"
      - "First-run requires `playwright install chromium` — tools that assume it's present will fail fast"

  # ============================================
  # Sentry (Issues, events, releases)
  # ============================================
  - name: sentry
    description: |
      Access the Sentry API for issues, events, releases, projects, and
      performance data. REST API at https://sentry.io/api/0/ (or
      self-hosted via SENTRY_URL). Supply SENTRY_ORG to scope requests to
      the default org slug.
    auth:
      type: bearer
      scopes:
        - issues:read
        - issues:write
        - events:read
        - releases:read
        - releases:write
        - projects:read
      token_env_var: SENTRY_AUTH_TOKEN
      description: Sentry internal integration / personal auth token
    allowed_domains:
      - sentry.io
    rate_limit: 40
    sdk_import: "import httpx  # headers={'Authorization': f\"Bearer {os.environ['SENTRY_AUTH_TOKEN']}\"}"
    packages: ["httpx"]
    hitl_risks:
      - "Bulk issue resolution silences real errors — use with caution on noisy projects"
      - "Releases:write can create or finalize releases, affecting deploy tracking for the whole team"
      - "Project-level settings changes propagate to every SDK sending events into that project"

  # ============================================
  # Email (Gmail API + generic SMTP/IMAP)
  # ============================================
  - name: email
    description: |
      Read, search, and send email. Two backends supported:
        1. Gmail API — requires Google OAuth credentials
           (GOOGLE_CLIENT_ID, GOOGLE_CLIENT_SECRET, GOOGLE_REFRESH_TOKEN);
           use google-api-python-client with gmail.v1.
        2. Generic SMTP/IMAP — SMTP_URL (smtps://user:pass@host:port) for
           sending, IMAP_URL for reading; use stdlib smtplib/imaplib.
      Pick one backend per tool — don't mix.
    auth:
      type: oauth2
      scopes:
        - email:read
        - email:search
        - email:send
        - email:labels:write
      description: Gmail via OAuth2 refresh-token flow, or SMTP/IMAP via connection URL
    rate_limit: 30
    sdk_import: "from googleapiclient.discovery import build  # for Gmail; OR import smtplib, imaplib for SMTP/IMAP"
    packages: ["google-api-python-client", "google-auth", "google-auth-oauthlib"]
    hitl_risks:
      - "Outbound sends cannot be recalled — triple-check the recipient list and message body before approving"
      - "Bulk deletes of threads or labels are destructive to workflow and audit history"
      - "Forwarding-rule changes (auto-forward-to-external) are a classic exfiltration backdoor"
      - "OAuth refresh tokens granted broad scopes persist until explicitly revoked by the user"

  # ============================================
  # Vector database (Pinecone / Qdrant / Weaviate / pgvector)
  # ============================================
  - name: vector
    description: |
      Vector database operations (upsert, query, delete, namespace mgmt) for
      RAG and agent-memory workloads. Backend-agnostic — pick ONE per tool:
        - Pinecone — PINECONE_API_KEY (+ optional PINECONE_ENV)
        - Qdrant — QDRANT_URL (+ optional QDRANT_API_KEY for Cloud)
        - Weaviate — WEAVIATE_URL (+ optional WEAVIATE_API_KEY)
        - pgvector — reuses the `postgres` capability (DATABASE_URL)
    auth:
      type: api_key
      scopes:
        - vector:read
        - vector:write
        - vector:admin
      description: Backend-specific API key (see description for env vars)
    rate_limit: 120
    sdk_import: "# Pick one: from pinecone import Pinecone | from qdrant_client import AsyncQdrantClient | import weaviate"
    packages: ["pinecone", "qdrant-client", "weaviate-client"]
    hitl_risks:
      - "Namespace or collection drops delete all vectors and metadata irreversibly"
      - "Bulk upserts without dedup can duplicate embeddings and skew retrieval"
      - "Index rebuilds can render RAG pipelines unavailable until the rebuild finishes"
      - "Cross-tenant query leaks if namespace/filter isolation is misconfigured"

  # ============================================
  # JSON Processing
  # ============================================
  - name: json
    description: |
      Parse, transform, and generate JSON data.
      Use the built-in json module.
    auth:
      type: none
    sdk_import: "import json"

  # ============================================
  # Date/Time
  # ============================================
  - name: datetime
    description: |
      Work with dates, times, timezones, and durations.
      Use datetime and zoneinfo modules.
    auth:
      type: none
    sdk_import: "from datetime import datetime, timedelta; from zoneinfo import ZoneInfo"

  # ============================================
  # Data Processing
  # ============================================
  - name: data
    description: |
      Process and transform data structures.
      Includes sorting, filtering, grouping, aggregation.
      Use built-in Python functions and comprehensions.
    auth:
      type: none
    sdk_import: "from collections import defaultdict, Counter; from itertools import groupby"
