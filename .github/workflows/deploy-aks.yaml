# Proprietary and confidential. Unauthorized copying prohibited.

# Deploy OpenAgentic to AKS Clusters
# Uses az aks command invoke for private cluster access
#
# Secrets required:
#   AZURE_CREDENTIALS - Azure SP credentials JSON
#
# Helm values stored in Azure Blob Storage:
#   DEV: ocioomcpdevmodfs01/helm-values/values-aks-dev.yaml
#   STG: ocioomcpstgsa/helm-values/values-aks-stg.yaml
#
# To upload values:
#   az storage blob upload --account-name ocioomcpdevmodfs01 --container-name helm-values \
#     --name values-aks-dev.yaml --file helm/openagentic/values-aks-dev.yaml --auth-mode login

name: Deploy to AKS

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy'
        required: true
        type: choice
        options:
          - dev
          - stg
          - both
        default: 'dev'
      restart_only:
        description: 'Only restart deployments (no helm upgrade)'
        required: false
        type: boolean
        default: false

  # Auto-deploy to DEV after successful image builds
  workflow_run:
    workflows: ["Build and Push Images"]
    types:
      - completed
    branches:
      - master

env:
  # DEV cluster
  DEV_RESOURCE_GROUP: ocio-omcp-dev-moderate-rg
  DEV_CLUSTER_NAME: omcp-dev-aks-agentic
  DEV_SUBSCRIPTION: OCIO-DO-DEV-C1
  # STG cluster (in PRD subscription)
  STG_RESOURCE_GROUP: ocio-omcp-stg-moderate-rg
  STG_CLUSTER_NAME: omcp-stg-aks-agentic
  STG_SUBSCRIPTION: OCIO-DO-PRD-C1

jobs:
  deploy-dev:
    if: |
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.environment == 'dev' || github.event.inputs.environment == 'both')) ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    runs-on: openagentic-runners
    environment: development

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set DEV subscription
        run: az account set --subscription "${{ env.DEV_SUBSCRIPTION }}"

      - name: Restart deployments only
        if: github.event.inputs.restart_only == 'true'
        run: |
          echo "Restarting deployments in DEV cluster..."

          for deployment in openagentic-api openagentic-ui openagentic-code-manager openagentic-mcp-proxy openagentic-flowise; do
            echo "Restarting $deployment..."
            az aks command invoke \
              --resource-group ${{ env.DEV_RESOURCE_GROUP }} \
              --name ${{ env.DEV_CLUSTER_NAME }} \
              --command "kubectl rollout restart deployment/$deployment -n openagentic || true"
          done

          echo "Waiting for rollouts..."
          az aks command invoke \
            --resource-group ${{ env.DEV_RESOURCE_GROUP }} \
            --name ${{ env.DEV_CLUSTER_NAME }} \
            --command "kubectl rollout status deployment/openagentic-api -n openagentic --timeout=300s"

      - name: Fetch values from Blob Storage and prepare helm chart
        if: github.event.inputs.restart_only != 'true'
        run: |
          mkdir -p /tmp/helm-deploy

          # Fetch values from Azure Blob Storage
          echo "Fetching helm values from Blob Storage..."
          az storage blob download \
            --account-name ocioomcpdevmodfs01 \
            --container-name helm-values \
            --name values-aks-dev.yaml \
            --file /tmp/helm-deploy/values.yaml \
            --auth-mode login

          # Verify values file was retrieved
          if [ ! -s /tmp/helm-deploy/values.yaml ]; then
            echo "ERROR: Failed to retrieve values from Blob Storage"
            exit 1
          fi
          echo "✓ Values file retrieved ($(wc -c < /tmp/helm-deploy/values.yaml) bytes)"

          # Package helm chart
          cd helm/openagentic
          helm dependency update 2>/dev/null || true
          helm package . -d /tmp/helm-deploy/

      - name: Deploy to DEV
        if: github.event.inputs.restart_only != 'true'
        run: |
          cd /tmp/helm-deploy
          CHART_FILE=$(ls *.tgz | head -1)

          echo "Deploying $CHART_FILE to DEV..."

          # Note: az aks command invoke has 1MB limit
          # We use --file to upload chart and values
          az aks command invoke \
            --resource-group ${{ env.DEV_RESOURCE_GROUP }} \
            --name ${{ env.DEV_CLUSTER_NAME }} \
            --command "helm upgrade --install openagentic ./$CHART_FILE -f ./values.yaml -n openagentic --create-namespace --wait --timeout 10m" \
            --file .

      - name: Verify deployment
        run: |
          az aks command invoke \
            --resource-group ${{ env.DEV_RESOURCE_GROUP }} \
            --name ${{ env.DEV_CLUSTER_NAME }} \
            --command "kubectl get pods -n openagentic -o wide"

  deploy-stg:
    if: github.event_name == 'workflow_dispatch' && (github.event.inputs.environment == 'stg' || github.event.inputs.environment == 'both')
    runs-on: openagentic-runners
    environment: staging
    needs: [deploy-dev]  # Require DEV success first when deploying both

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set STG subscription
        run: az account set --subscription "${{ env.STG_SUBSCRIPTION }}"

      - name: Restart deployments only
        if: github.event.inputs.restart_only == 'true'
        run: |
          echo "Restarting deployments in STG cluster..."

          for deployment in openagentic-api openagentic-ui openagentic-code-manager openagentic-mcp-proxy openagentic-flowise; do
            echo "Restarting $deployment..."
            az aks command invoke \
              --resource-group ${{ env.STG_RESOURCE_GROUP }} \
              --name ${{ env.STG_CLUSTER_NAME }} \
              --command "kubectl rollout restart deployment/$deployment -n openagentic || true"
          done

          echo "Waiting for rollouts..."
          az aks command invoke \
            --resource-group ${{ env.STG_RESOURCE_GROUP }} \
            --name ${{ env.STG_CLUSTER_NAME }} \
            --command "kubectl rollout status deployment/openagentic-api -n openagentic --timeout=300s"

      - name: Fetch values from Key Vault and prepare helm chart
        if: github.event.inputs.restart_only != 'true'
        run: |
          mkdir -p /tmp/helm-deploy

          # Fetch values from Azure Key Vault
          echo "Fetching helm values from Key Vault..."
          az keyvault secret show \
            --vault-name omcp-stg-kv-1 \
            --name helm-values-stg \
            --query value -o tsv > /tmp/helm-deploy/values.yaml

          # Verify values file was retrieved
          if [ ! -s /tmp/helm-deploy/values.yaml ]; then
            echo "ERROR: Failed to retrieve values from Key Vault"
            exit 1
          fi
          echo "✓ Values file retrieved ($(wc -c < /tmp/helm-deploy/values.yaml) bytes)"

          # Package helm chart
          cd helm/openagentic
          helm dependency update 2>/dev/null || true
          helm package . -d /tmp/helm-deploy/

      - name: Deploy to STG
        if: github.event.inputs.restart_only != 'true'
        run: |
          cd /tmp/helm-deploy
          CHART_FILE=$(ls *.tgz | head -1)

          echo "Deploying $CHART_FILE to STG..."

          az aks command invoke \
            --resource-group ${{ env.STG_RESOURCE_GROUP }} \
            --name ${{ env.STG_CLUSTER_NAME }} \
            --command "helm upgrade --install openagentic ./$CHART_FILE -f ./values.yaml -n openagentic --create-namespace --wait --timeout 10m" \
            --file .

      - name: Verify deployment
        run: |
          az aks command invoke \
            --resource-group ${{ env.STG_RESOURCE_GROUP }} \
            --name ${{ env.STG_CLUSTER_NAME }} \
            --command "kubectl get pods -n openagentic -o wide"
