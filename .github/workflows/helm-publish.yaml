# Proprietary and confidential. Unauthorized copying prohibited.

# Package and publish Helm chart to Google Artifact Registry
# Triggers on helm/ changes or manual dispatch

name: Publish Helm Chart

on:
  push:
    branches:
      - main
    paths:
      - 'helm/openagentic/**'
  workflow_dispatch:
    inputs:
      version_bump:
        description: 'Version bump type'
        required: false
        type: choice
        options:
          - none
          - patch
          - minor
          - major
        default: none

env:
  REGISTRY: us-east4-docker.pkg.dev
  PROJECT_ID: openagentic-dev
  CHART_REPO: openagentic
  CHART_PATH: helm/openagentic

jobs:
  lint:
    runs-on: openagentic-runners
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Lint chart
        run: helm lint ${{ env.CHART_PATH }}

  publish:
    needs: lint
    runs-on: openagentic-runners
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          token_format: access_token

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Login to GAR
        run: |
          gcloud auth print-access-token | helm registry login -u oauth2accesstoken --password-stdin ${{ env.REGISTRY }}

      - name: Bump version
        if: inputs.version_bump && inputs.version_bump != 'none'
        run: |
          CURRENT=$(grep '^version:' ${{ env.CHART_PATH }}/Chart.yaml | awk '{print $2}')
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

          case "${{ inputs.version_bump }}" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          sed -i "s/^version: .*/version: ${NEW_VERSION}/" ${{ env.CHART_PATH }}/Chart.yaml
          echo "Bumped version: ${CURRENT} -> ${NEW_VERSION}"

      - name: Package chart
        run: |
          helm dependency build ${{ env.CHART_PATH }}
          helm package ${{ env.CHART_PATH }} --destination .helm-packages

      - name: Push to GAR
        run: |
          PACKAGE=$(ls .helm-packages/*.tgz)
          helm push ${PACKAGE} oci://${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.CHART_REPO }}
          echo "## Helm Chart Published" >> $GITHUB_STEP_SUMMARY
          echo "- Package: \`$(basename ${PACKAGE})\`" >> $GITHUB_STEP_SUMMARY
          echo "- Registry: \`oci://${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.CHART_REPO }}\`" >> $GITHUB_STEP_SUMMARY
