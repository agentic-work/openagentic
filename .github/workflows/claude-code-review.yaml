# Proprietary and confidential. Unauthorized copying prohibited.

# Claude Code AI-Assisted Code Review and Development
# Uses Claude Code CLI on self-hosted runners
#
# This workflow demonstrates using Claude Code in GitHub Actions for:
# - Automated code review on PRs
# - AI-assisted documentation generation
# - Code quality suggestions

name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

  workflow_dispatch:
    inputs:
      task:
        description: 'Task for Claude Code'
        required: true
        type: choice
        options:
          - code-review
          - generate-docs
          - suggest-tests
          - security-scan
      target_path:
        description: 'Path to analyze (default: changed files)'
        required: false
        default: ''

env:
  ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

jobs:
  claude-review:
    runs-on: openagentic-runners  # Self-hosted on dalek with Claude Code
    if: github.event_name == 'pull_request' || github.event.inputs.task != ''

    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Claude Code
        run: |
          npm install -g @anthropic-ai/claude-code || true
          claude --version || echo "Claude Code version check"

      - name: Get changed files
        id: changed
        if: github.event_name == 'pull_request'
        run: |
          # Get list of changed files
          FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD | grep -E '\.(ts|tsx|js|jsx|py|go|rs)$' | head -20 || echo "")
          echo "files=${FILES}" >> $GITHUB_OUTPUT
          echo "Changed files: ${FILES}"

      - name: Code Review with Claude
        id: review
        if: github.event_name == 'pull_request' || github.event.inputs.task == 'code-review'
        run: |
          # Create review prompt
          cat << 'EOF' > /tmp/review-prompt.md
          Review the following code changes and provide:
          1. A brief summary of what changed
          2. Any potential bugs or issues
          3. Security concerns if any
          4. Suggestions for improvement
          5. Overall quality assessment (1-5 stars)

          Focus on being constructive and actionable.
          EOF

          # Get the diff
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            git diff origin/${{ github.base_ref }}...HEAD > /tmp/changes.diff
          else
            git diff HEAD~1 > /tmp/changes.diff
          fi

          # Run Claude Code review (non-interactive mode)
          echo "Running Claude Code review..."
          if command -v claude &> /dev/null; then
            # Use Claude Code CLI in print mode
            claude --print "$(cat /tmp/review-prompt.md)

            Here are the code changes to review:

            \`\`\`diff
            $(cat /tmp/changes.diff | head -500)
            \`\`\`" > /tmp/review-output.md 2>&1 || echo "Review completed with warnings"
          else
            echo "Claude Code not available, using fallback" > /tmp/review-output.md
          fi

          # Output review
          echo "## Claude Code Review" >> $GITHUB_STEP_SUMMARY
          cat /tmp/review-output.md >> $GITHUB_STEP_SUMMARY

      - name: Post PR Comment
        if: github.event_name == 'pull_request' && steps.review.outcome == 'success'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let review = '';
            try {
              review = fs.readFileSync('/tmp/review-output.md', 'utf8');
            } catch (e) {
              review = 'Claude Code review completed but output not available.';
            }

            // Truncate if too long
            if (review.length > 60000) {
              review = review.substring(0, 60000) + '\n\n...(truncated)';
            }

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 🤖 Claude Code Review\n\n${review}\n\n---\n*Automated review by Claude Code on self-hosted runner*`
            });

      - name: Generate Documentation
        if: github.event.inputs.task == 'generate-docs'
        run: |
          TARGET="${{ github.event.inputs.target_path }}"
          if [ -z "$TARGET" ]; then
            TARGET="services/"
          fi

          echo "Generating documentation for: $TARGET"

          if command -v claude &> /dev/null; then
            claude --print "Generate comprehensive documentation for the code in ${TARGET}. Include:
            - Overview of the module/service
            - Key functions and their purposes
            - Configuration options
            - Usage examples
            - API reference if applicable" > /tmp/docs-output.md 2>&1 || echo "Documentation generation completed"
          fi

          echo "## Generated Documentation" >> $GITHUB_STEP_SUMMARY
          cat /tmp/docs-output.md >> $GITHUB_STEP_SUMMARY || echo "No documentation generated"

      - name: Suggest Tests
        if: github.event.inputs.task == 'suggest-tests'
        run: |
          TARGET="${{ github.event.inputs.target_path }}"
          if [ -z "$TARGET" ]; then
            # Use changed files from PR
            TARGET="${{ steps.changed.outputs.files }}"
          fi

          echo "Suggesting tests for: $TARGET"

          if command -v claude &> /dev/null; then
            claude --print "Analyze the following code and suggest comprehensive test cases:
            - Unit tests for individual functions
            - Integration tests for module interactions
            - Edge cases to consider
            - Mock strategies

            Code path: ${TARGET}" > /tmp/tests-output.md 2>&1 || echo "Test suggestion completed"
          fi

          echo "## Suggested Tests" >> $GITHUB_STEP_SUMMARY
          cat /tmp/tests-output.md >> $GITHUB_STEP_SUMMARY || echo "No test suggestions generated"
