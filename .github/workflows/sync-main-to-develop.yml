# Proprietary and confidential. Unauthorized copying prohibited.

name: Back-merge main → develop

# Every push to main triggers this. Keeps develop in sync regardless
# of whether main was updated via PR merge or direct push, so the
# two branches never drift the way they did on 2026-04-12
# (6 commits landed on main, none replayed onto develop).

on:
  push:
    branches: [main]

concurrency:
  group: sync-main-to-develop
  cancel-in-progress: false

jobs:
  backmerge:
    runs-on: openagentic-runners
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: develop
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git identity
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Back-merge main into develop
        run: |
          git fetch origin main
          if git merge-base --is-ancestor develop origin/main; then
            # develop is strictly behind main → fast-forward, no merge commit
            git merge --ff-only origin/main
            git push origin develop
          else
            # develop has commits main doesn't → explicit merge commit
            if git merge --no-ff --no-edit -m "chore: back-merge main into develop" origin/main; then
              git push origin develop
            else
              echo "::error::Conflict back-merging main into develop — resolve manually on a branch and open a PR into develop."
              git merge --abort
              exit 1
            fi
          fi
