# Proprietary and confidential. Unauthorized copying prohibited.

# Build and Push Docker Images to Google Container Registry
# Uses self-hosted runners on dalek node for maximum performance
#
# Triggers:
# - Push to develop/main branches
# - Manual dispatch with service selection
# - Pull request (build only, no push)

name: Build and Push Images

on:
  push:
    branches:
      - develop
      - main
    paths:
      - 'services/**'
      - 'k8s/**'
      - '.github/workflows/build-images.yaml'

  pull_request:
    branches:
      - develop
      - main
    paths:
      - 'services/**'

  workflow_dispatch:
    inputs:
      services:
        description: 'Services to build (comma-separated, or "all")'
        required: false
        default: 'all'
        type: string
      push:
        description: 'Push images to registry'
        required: false
        default: true
        type: boolean

env:
  REGISTRY: us-east4-docker.pkg.dev
  PROJECT_ID: openagentic-dev
  REPOSITORY: openagentic

jobs:
  # Detect which services changed
  detect-changes:
    runs-on: openagentic-runners
    outputs:
      services: ${{ steps.changes.outputs.services }}
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changed services
        id: changes
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            if [ "${{ github.event.inputs.services }}" == "all" ]; then
              SERVICES="openagentic-api,openagentic-ui,openagentic-flowise,openagentic-mcp-proxy,openagentic-manager,openagentic-exec"
            else
              SERVICES="${{ github.event.inputs.services }}"
            fi
          else
            # Detect changes from git diff
            CHANGED=$(git diff --name-only HEAD~1 HEAD | grep '^services/' | cut -d'/' -f2 | sort -u | tr '\n' ',' | sed 's/,$//')
            SERVICES="${CHANGED:-none}"
          fi
          echo "services=${SERVICES}" >> $GITHUB_OUTPUT
          echo "Detected services: ${SERVICES}"

      - name: Build matrix
        id: matrix
        run: |
          SERVICES="${{ steps.changes.outputs.services }}"
          if [ "$SERVICES" == "none" ] || [ -z "$SERVICES" ]; then
            echo 'matrix={"include":[]}' >> $GITHUB_OUTPUT
          else
            # Convert comma-separated to JSON array
            MATRIX=$(echo "$SERVICES" | tr ',' '\n' | jq -R . | jq -s '{include: map({service: .})}' | tr -d '\n')
            echo "matrix=${MATRIX}" >> $GITHUB_OUTPUT
          fi

  # Build and push images
  build:
    needs: detect-changes
    if: needs.detect-changes.outputs.services != 'none' && needs.detect-changes.outputs.services != ''
    runs-on: openagentic-runners  # Self-hosted on dalek
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.detect-changes.outputs.matrix) }}

    permissions:
      contents: read
      id-token: write  # For Workload Identity Federation

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          token_format: access_token

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for GCR
        run: |
          gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      - name: Extract metadata
        id: meta
        run: |
          SERVICE="${{ matrix.service }}"
          SHORT_SHA="${GITHUB_SHA::7}"
          BRANCH="${GITHUB_REF_NAME//\//-}"

          # Determine tag
          if [ "${{ github.ref }}" == "refs/heads/main" ]; then
            TAG="latest"
          elif [ "${{ github.ref }}" == "refs/heads/develop" ]; then
            TAG="develop"
          else
            TAG="${BRANCH}"
          fi

          echo "service=${SERVICE}" >> $GITHUB_OUTPUT
          echo "image=${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${SERVICE}" >> $GITHUB_OUTPUT
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "sha_tag=${SHORT_SHA}" >> $GITHUB_OUTPUT

      - name: Check Dockerfile exists
        id: dockerfile
        run: |
          SERVICE="${{ matrix.service }}"
          if [ -f "services/${SERVICE}/Dockerfile" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "path=services/${SERVICE}/Dockerfile" >> $GITHUB_OUTPUT
            echo "context=services/${SERVICE}" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "::warning::No Dockerfile found for ${SERVICE}"
          fi

      - name: Build image
        if: steps.dockerfile.outputs.exists == 'true'
        uses: docker/build-push-action@v5
        with:
          context: ${{ steps.dockerfile.outputs.context }}
          file: ${{ steps.dockerfile.outputs.path }}
          push: false
          load: true
          tags: |
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.tag }}
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.sha_tag }}
          cache-from: type=registry,ref=${{ steps.meta.outputs.image }}:buildcache
          cache-to: type=registry,ref=${{ steps.meta.outputs.image }}:buildcache,mode=max
          build-args: |
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            GIT_SHA=${{ github.sha }}
            VERSION=${{ steps.meta.outputs.tag }}

      - name: Push image
        if: |
          steps.dockerfile.outputs.exists == 'true' &&
          github.event_name != 'pull_request' &&
          (github.event_name != 'workflow_dispatch' || github.event.inputs.push == 'true')
        run: |
          docker push ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.tag }}
          docker push ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.sha_tag }}

      - name: Summary
        if: steps.dockerfile.outputs.exists == 'true'
        run: |
          echo "## Build Summary for ${{ matrix.service }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Image | \`${{ steps.meta.outputs.image }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Tag | \`${{ steps.meta.outputs.tag }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| SHA | \`${{ steps.meta.outputs.sha_tag }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Pushed | ${{ github.event_name != 'pull_request' }} |" >> $GITHUB_STEP_SUMMARY

  # Notify on completion
  notify:
    needs: build
    if: always() && github.event_name != 'pull_request'
    runs-on: openagentic-runners
    steps:
      - name: Build status
        run: |
          if [ "${{ needs.build.result }}" == "success" ]; then
            echo "All images built successfully!"
          else
            echo "::warning::Some builds may have failed"
          fi
