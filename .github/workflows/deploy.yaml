# Proprietary and confidential. Unauthorized copying prohibited.

# Deploy Services to Kubernetes
# Uses self-hosted runners with kubectl access
#
# This workflow deploys built images to the K8s cluster

name: Deploy to K8s

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        type: choice
        options:
          - dev
          - staging
          - prod
      services:
        description: 'Services to deploy (comma-separated, or "all")'
        required: false
        default: 'all'
        type: string
      image_tag:
        description: 'Image tag to deploy'
        required: false
        default: 'develop'
        type: string

  workflow_run:
    workflows: ["Build and Push Images"]
    types: [completed]
    branches: [develop]

env:
  REGISTRY: us-east4-docker.pkg.dev
  PROJECT_ID: openagentic-dev
  REPOSITORY: openagentic

jobs:
  deploy:
    runs-on: openagentic-runners
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')

    permissions:
      contents: read
      id-token: write  # Required for Workload Identity Federation

    environment:
      name: ${{ github.event.inputs.environment || 'dev' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          install_components: 'gke-gcloud-auth-plugin,kubectl'

      - name: Configure kubectl
        run: |
          # Get GKE cluster credentials
          gcloud container clusters get-credentials openagentic-cluster \
            --zone us-east4-c \
            --project ${{ env.PROJECT_ID }}

          kubectl cluster-info
          kubectl get nodes

      - name: Determine services to deploy
        id: services
        run: |
          SERVICES="${{ github.event.inputs.services || 'all' }}"
          TAG="${{ github.event.inputs.image_tag || 'develop' }}"

          if [ "$SERVICES" == "all" ]; then
            SERVICES="openagentic-api,openagentic-ui,openagentic-flowise,openagentic-mcp-proxy"
          fi

          echo "services=${SERVICES}" >> $GITHUB_OUTPUT
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "Deploying: ${SERVICES} with tag: ${TAG}"

      - name: Deploy services
        run: |
          SERVICES="${{ steps.services.outputs.services }}"
          TAG="${{ steps.services.outputs.tag }}"
          NAMESPACE="${{ github.event.inputs.environment || 'default' }}"

          IFS=',' read -ra SERVICE_ARRAY <<< "$SERVICES"

          for SERVICE in "${SERVICE_ARRAY[@]}"; do
            SERVICE=$(echo "$SERVICE" | xargs)  # Trim whitespace
            IMAGE="${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${SERVICE}:${TAG}"

            echo "Deploying ${SERVICE} with image ${IMAGE}"

            # Check if deployment exists
            if kubectl get deployment "${SERVICE}" -n "${NAMESPACE}" &>/dev/null; then
              # Update existing deployment
              kubectl set image deployment/"${SERVICE}" \
                "${SERVICE}=${IMAGE}" \
                -n "${NAMESPACE}"

              # Wait for rollout
              kubectl rollout status deployment/"${SERVICE}" \
                -n "${NAMESPACE}" \
                --timeout=300s
            else
              echo "::warning::Deployment ${SERVICE} not found in namespace ${NAMESPACE}"
            fi
          done

      - name: Verify deployments
        run: |
          NAMESPACE="${{ github.event.inputs.environment || 'default' }}"

          echo "## Deployment Status" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          kubectl get deployments -n "${NAMESPACE}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          kubectl get pods -n "${NAMESPACE}" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

      - name: Run smoke tests
        run: |
          # Wait for services to be ready
          sleep 30

          # Basic health checks
          echo "Running smoke tests..."

          # Check API health
          if curl -sf "https://chat-dev.openagentic.io/health" > /dev/null; then
            echo "✅ API health check passed"
          else
            echo "::warning::API health check failed"
          fi

          echo "Smoke tests completed"
