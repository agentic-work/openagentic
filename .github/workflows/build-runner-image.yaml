# Proprietary and confidential. Unauthorized copying prohibited.

# Build Custom ARC Runner Image
# This workflow builds the custom GitHub Actions runner with Docker and Claude Code
#
# Note: This workflow uses ubuntu-latest for bootstrap since we're building the runner itself
# Once the runner is deployed, subsequent builds can use self-hosted

name: Build Runner Image

on:
  push:
    branches:
      - develop
      - main
    paths:
      - 'k8s/arc/Dockerfile.runner'
      - '.github/workflows/build-runner-image.yaml'

  workflow_dispatch:
    inputs:
      push:
        description: 'Push image to registry'
        required: false
        default: true
        type: boolean

env:
  REGISTRY: us-east4-docker.pkg.dev
  PROJECT_ID: openagentic-dev
  REPOSITORY: openagentic
  IMAGE_NAME: arc-runner

jobs:
  build-runner:
    runs-on: openagentic-runners  # Bootstrap with GitHub-hosted runner

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Configure Docker for GCR
        run: |
          gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      - name: Extract metadata
        id: meta
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          if [ "${{ github.ref }}" == "refs/heads/main" ]; then
            TAG="latest"
          else
            TAG="develop"
          fi

          echo "image=${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}" >> $GITHUB_OUTPUT
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "sha_tag=${SHORT_SHA}" >> $GITHUB_OUTPUT

      - name: Build runner image
        uses: docker/build-push-action@v5
        with:
          context: k8s/arc
          file: k8s/arc/Dockerfile.runner
          push: false
          load: true
          tags: |
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.tag }}
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.sha_tag }}
          cache-from: type=registry,ref=${{ steps.meta.outputs.image }}:buildcache
          cache-to: type=registry,ref=${{ steps.meta.outputs.image }}:buildcache,mode=max

      - name: Test runner image
        run: |
          # Verify key tools are installed
          docker run --rm ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.tag }} node --version
          docker run --rm ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.tag }} pnpm --version
          docker run --rm ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.tag }} gcloud --version | head -1
          docker run --rm ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.tag }} kubectl version --client 2>/dev/null || true
          echo "All tools verified!"

      - name: Push runner image
        if: github.event_name != 'pull_request' && (github.event_name != 'workflow_dispatch' || github.event.inputs.push == 'true')
        run: |
          docker push ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.tag }}
          docker push ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.sha_tag }}

      - name: Update runner values
        if: github.event_name != 'pull_request'
        run: |
          echo "## Runner Image Built" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Image: \`${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.tag }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "To update the runner scale set:" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "helm upgrade openagentic-runners \\" >> $GITHUB_STEP_SUMMARY
          echo "  --namespace arc-runners \\" >> $GITHUB_STEP_SUMMARY
          echo "  --set template.spec.containers[0].image=${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.tag }} \\" >> $GITHUB_STEP_SUMMARY
          echo "  oci://ghcr.io/actions/actions-runner-controller-charts/gha-runner-scale-set" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
