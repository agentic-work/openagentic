
#
# Real E2E Integration Sweep
# --------------------------
# Drives POST /api/admin/test-harness/run-e2e against the api running in
# the SAME cluster as the ARC self-hosted runner. The runner lives in
# the `arc-runners` namespace, so it has direct service-name access to
# `openagentic-api.agentic-dev.svc:8000` without any ingress hop.
#
# Triggered:
#   - workflow_dispatch    (manual)
#   - pull_request to main (smoke mode — fast, no Flows/T2)
#   - schedule (nightly)   (full mode)
#
# Required secrets / vars:
#   secrets.TEST_HARNESS_API_KEY  Static bearer the api accepts as admin.
#                                 Set on `deployment/openagentic-api` via
#                                 `kubectl set env … TEST_HARNESS_API_KEY=…`.
#                                 Rotate quarterly.
#
# Outputs:
#   - /tmp/e2e-results.ndjson uploaded as an artifact
#   - GH Step Summary markdown table
#   - exit 0 iff every test in the sweep passed

name: e2e-int-test

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'Sweep mode'
        required: false
        default: 'full'
        type: choice
        options:
          - full
          - smoke
  pull_request:
    branches: [main]
    paths:
      - 'services/openagentic-api/**'
      - 'services/openagentic-ui/src/features/admin/components/Testing/**'
      - 'scripts/harness/e2e-int-test.sh'
      - '.github/workflows/e2e-int-test.yml'
  schedule:
    # 03:00 UTC nightly — well outside business hours so real token spend
    # lands on the cheapest hour of the model providers' pricing tiers
    # (Anthropic / OpenAI run flat, but Azure spot pricing varies).
    - cron: '0 3 * * *'

permissions:
  contents: read

jobs:
  e2e:
    name: OpenAgentic E2E Sweep (in-cluster)
    # `openagentic-runners` is the ARC runner pool. It runs INSIDE the
    # agentic-dev cluster so api/mcp-proxy/openagentic-proxy are service-name
    # reachable without ingress / external DNS. Label matches the live
    # runner `openagentic-runners-vnwl2-runner-8xzw2` in `arc-runners` ns.
    runs-on: openagentic-runners
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Make harness script executable
        run: chmod +x scripts/harness/e2e-int-test.sh

      - name: Dry run (sanity check)
        run: scripts/harness/e2e-int-test.sh --dry-run

      - name: Run E2E sweep
        env:
          # In-cluster service-name URL. Bypasses ingress hop entirely.
          API_BASE: http://openagentic-api.agentic-dev.svc:8000
          # Workflow_dispatch carries `mode` input; PRs default to smoke;
          # schedule defaults to full.
          HARNESS_MODE: ${{ github.event.inputs.mode || (github.event_name == 'pull_request' && 'smoke' || 'full') }}
          HARNESS_INCLUDE_FLOWS: 'true'
          HARNESS_INCLUDE_MCP: 'true'
          HARNESS_INCLUDE_T3: 'true'
          # TEST_HARNESS_API_KEY is the api-side bearer; the harness script
          # just calls it HARNESS_USER_JWT because the endpoint accepts
          # either an admin JWT OR the static key (preHandler in
          # admin-test-harness-run-e2e.ts).
          HARNESS_USER_JWT: ${{ secrets.TEST_HARNESS_API_KEY }}
          OUT_FILE: /tmp/e2e-results.ndjson
        run: scripts/harness/e2e-int-test.sh

      - name: Upload NDJSON results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-results-ndjson
          path: /tmp/e2e-results.ndjson
          if-no-files-found: warn
          retention-days: 14

      - name: Tail results on failure
        if: failure()
        run: |
          echo "::group::Last 80 NDJSON frames"
          tail -80 /tmp/e2e-results.ndjson || true
          echo "::endgroup::"
