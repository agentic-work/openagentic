# Dependabot configuration for openagentic.
#
# Conventions:
#   - Weekly cadence (Monday) to batch updates and keep PR noise low.
#   - Patch + minor updates are GROUPED into a single PR per ecosystem/dir so
#     routine bumps land as one reviewable PR; MAJOR updates stay individual.
#   - open-pull-requests-limit is kept modest per ecosystem for the same reason.
#
# Ecosystems covered:
#   - npm            : every shipping Node package (root, api, ui, workflows,
#                      proxy, the two shared/* packages, the setup wizard)
#   - pip            : the mcp-proxy + all 9 built-in MCP servers (requirements.txt)
#   - docker         : every Dockerfile dir (base-image bumps)
#   - github-actions : the workflows in /.github/workflows
#
# Test-only package.json dirs (tests/*, services/openagentic-ui/tests/e2e,
# the eslint-plugin-admin-tokens helper) are intentionally omitted — they are
# not shipped and would only add PR noise.
version: 2

updates:
  # ───────────────────────── npm (Node services) ─────────────────────────────
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      npm-minor-patch:
        applies-to: version-updates
        update-types: [minor, patch]

  - package-ecosystem: npm
    directory: "/services/openagentic-api"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      npm-minor-patch:
        applies-to: version-updates
        update-types: [minor, patch]

  - package-ecosystem: npm
