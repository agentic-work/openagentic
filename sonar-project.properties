sonar.projectKey=openagentic
sonar.projectName=openagentic OSS
sonar.sourceEncoding=UTF-8

# Exclude build artifacts, vendored code, and anything we don't author.
sonar.exclusions=**/node_modules/**,**/dist/**,**/build/**,**/.next/**,**/coverage/**,**/__pycache__/**,**/*.min.js,**/*.bundle.js,**/.venv/**,**/venv/**,**/target/**,**/.gradle/**,**/vendor/**,**/.pnpm-store/**,services/openagentic-workflows/packages/server/dist/**,helm/**

# Tests — surface them but don't count against main source metrics.
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx,**/test/**,**/tests/**,**/__tests__/**,**/*_test.py,**/test_*.py

# Coverage reports (emitted by vitest/jest/pytest when `npm test -- --coverage` runs).
sonar.javascript.lcov.reportPaths=services/openagentic-api/coverage/lcov.info,services/openagentic-ui/coverage/lcov.info,tests/coverage/lcov.info
sonar.python.coverage.reportPaths=coverage.xml

# Language-specific tuning
sonar.typescript.tsconfigPaths=services/openagentic-api/tsconfig.json,services/openagentic-ui/tsconfig.json,tools/setup/tsconfig.json
