# SonarQube project config — openagentic OSS.
sonar.projectKey=openagentic
sonar.projectName=OpenAgentic
sonar.sourceEncoding=UTF-8

# Pin analysis version to the package.json version. PREVIOUS_VERSION leak
# period treats everything since the last sonar.projectVersion bump as
# "new code"; without it, every commit on a multi-service monorepo is
# counted as new and the new_coverage gate becomes unreachable.
sonar.projectVersion=1.0.0

# Sources — pnpm workspace under services/ and tools/. tests/ is for QA
# automation, not unit tests for the workspaces, so it's in sources too
# (SQ will scan it as code, treat anything matching test.inclusions as
# tests rather than coverage targets).
sonar.sources=services,tools,scripts,tests

sonar.exclusions=**/node_modules/**,**/dist/**,**/build/**,**/.next/**,**/coverage/**,**/__pycache__/**,**/*.min.js,**/*.bundle.js,**/.venv/**,**/venv/**,**/target/**,**/.gradle/**,**/vendor/**,**/generated/**,**/*.d.ts,**/static/**,**/public/**,**/.pytest_cache/**,**/.ruff_cache/**

sonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx,**/test/**,**/tests/**,**/__tests__/**

# Copy-paste (CPD) exclusions — INTENTIONALLY VENDORED cross-service shared code.
# OSS vendors shared types / the LLM SDK / shared services into each service
# (per-service copy instead of a runtime shared import), so SQ correctly sees
# them as near-identical — but they are ONE canonical artifact maintained in
# lockstep, not accidental copy-paste of unique business logic. Excluded from
# duplication detection ONLY (still scanned for bugs/smells/coverage via
# sonar.sources). Scoped tightly to the vendored files — NOT a blanket dir skip.
#
#   1. agentic-events — the canonical event taxonomy ("the contract every
#      service must speak"); pure type declarations, vendored into ui + api
#      (services/, lib/agentic-sdk/) + the shared llm-sdk.
#   2. llm-sdk normalizers + CanonicalEvent + select — the provider→canonical
#      SDK, vendored into api/src/lib/agentic-sdk/ and services/shared/llm-sdk/.
#   3. WorkflowSecretService — the same secret-resolution service vendored into
#      openagentic-api and openagentic-workflows.
#   4. The SHARED MilvusService (collection management) vendored into
#      services/shared and api/src/services/shared. NOTE: the per-user-memory
#      api/src/services/MilvusService.ts is a DISTINCT implementation and is
#      deliberately NOT excluded (its similarity to the shared one is only
#      coincidental Milvus-SDK boilerplate, not a vendored copy).
sonar.cpd.exclusions=\
  **/agentic-events/index.ts,\
  **/agentic-events/types.ts,\
  services/openagentic-api/src/lib/agentic-sdk/normalizers/**,\
  services/shared/llm-sdk/src/lib/normalizers/**,\
  services/openagentic-api/src/services/WorkflowSecretService.ts,\
  services/openagentic-workflows/src/services/WorkflowSecretService.ts,\
  services/shared/MilvusService.ts,\
  services/openagentic-api/src/services/shared/MilvusService.ts

# Coverage report path (LCOV from vitest/jest). The sonar.yml workflow
# runs `pnpm test:coverage` if defined; we tolerate its absence so the
# scan still emits issues + duplications + hotspots even when there's no
# coverage data yet.
sonar.javascript.lcov.reportPaths=services/openagentic-api/coverage/lcov.info,services/openagentic-ui/coverage/lcov.info
sonar.typescript.lcov.reportPaths=services/openagentic-api/coverage/lcov.info,services/openagentic-ui/coverage/lcov.info

# Coverage exclusions — files that are not unit-test targets (build/test config,
# type decls, generated code, doc-gen scripts, mocks, DB migrations). Keeps the
# coverage denominator to real application logic; does NOT exclude app source.
sonar.coverage.exclusions=**/*.config.ts,**/*.config.js,**/*.config.mts,**/vite.config.*,**/vitest.config.*,**/*.d.ts,**/scripts/**,**/mockData/**,**/prisma/migrations/**,**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx
