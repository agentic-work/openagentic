# SonarQube project config — openagentic OSS.
sonar.projectKey=openagentic
sonar.projectName=OpenAgentic
sonar.sourceEncoding=UTF-8

# Pin analysis version to the package.json version. PREVIOUS_VERSION leak
# period treats everything since the last sonar.projectVersion bump as
# "new code"; without it, every commit on a multi-service monorepo is
# counted as new and the new_coverage gate becomes unreachable.
sonar.projectVersion=1.0.0

# Sources — pnpm workspace under services/ and tools/. tests/ is for QA
# automation, not unit tests for the workspaces, so it's in sources too
# (SQ will scan it as code, treat anything matching test.inclusions as
# tests rather than coverage targets).
sonar.sources=services,tools,scripts,tests

sonar.exclusions=**/node_modules/**,**/dist/**,**/build/**,**/.next/**,**/coverage/**,**/__pycache__/**,**/*.min.js,**/*.bundle.js,**/.venv/**,**/venv/**,**/target/**,**/.gradle/**,**/vendor/**,**/generated/**,**/*.d.ts,**/static/**,**/public/**,**/.pytest_cache/**,**/.ruff_cache/**

sonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx,**/test/**,**/tests/**,**/__tests__/**

# Coverage report path (LCOV from vitest/jest). The sonar.yml workflow
# runs `pnpm test:coverage` if defined; we tolerate its absence so the
# scan still emits issues + duplications + hotspots even when there's no
# coverage data yet.
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.typescript.lcov.reportPaths=coverage/lcov.info
