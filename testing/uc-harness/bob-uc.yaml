# Bob cloud_operations UC harness cases.
# Source: docs/releases/0.6.5-plan.md + docs/usecases/UAT060/usecases_full_text.txt.
# bob_uc_questions.md is not present in this repo; stock prompts are seeded
# from the canonical UAT060 catalog (UC-022..UC-029) and Bob's cloud_operations
# anchor (MEMORY.md).
#
# Each case:
#   id:               stable identifier
#   prompt:           verbatim user message
#   expected_tools:   tool names that MUST be present in the tool-call stream
#                     (subset; additional tools are fine)
#   expected_patterns: regex strings that MUST each match the final assistant
#                     text (case-insensitive)
#   timeout_s:        per-case wall-clock budget
#   model:            optional; omit for admin default

- id: UC-022-list-rgs
  prompt: "List all Azure resource groups in the current subscription and show their locations."
  expected_tools:
    - azure_list_resource_groups
  expected_patterns:
    - "resource group"
    - "location|region"
  timeout_s: 120

- id: UC-023-storage-sku
  prompt: "What SKU and replication tier is storage account 'openagenticdevsa' using? If it does not exist, say so clearly."
  expected_tools: []
  expected_patterns:
    - "storage|sku|account"
  timeout_s: 120

- id: UC-024-loganalytics
  prompt: "Describe the default retention and daily quota on the Log Analytics workspace in resource group rg-openagentic-dev. Explain what the values mean. If none exist, say so."
  expected_tools: []
  expected_patterns:
    - "retention|quota|log analytics|no (?:workspaces|workspace)|none found|does not"
  # The RG has no LA workspaces → Opus 4.6 can spend 3-4 minutes wandering
  # through resource-graph retries before emitting its final "there are
  # no workspaces" conclusion. 360s budget accommodates that.
  timeout_s: 360

- id: UC-025-vm-family
  prompt: "Give me a one-paragraph summary of the Standard_D8s_v5 VM size: vCPU, RAM, and what workloads it's suited for."
  expected_patterns:
    - "vcpu|cpu"
    - "ram|memory|gb"
    - "d8s_v5|d-series|dsv5"
  expected_tools: []
  timeout_s: 90

- id: UC-026-aks-clusters
  prompt: "List the AKS clusters visible in the current subscription, one per line with their Kubernetes version."
  expected_tools:
    - azure_list_aks_clusters
  expected_patterns:
    - "aks|kubernetes"
    # Include "no clusters / zero / none" fallback — subscription may
    # genuinely have zero AKS clusters, in which case the correct
    # response is to say so, not to invent a version string.
    - "version|1\\.[0-9]+|no (?:aks|kubernetes)? ?clusters|zero|none found|does not"
  timeout_s: 150

- id: UC-027-perf-monitoring
  prompt: "Give me a high-level plan for monitoring Azure App Gateway backend pool latency with alerting when P95 exceeds 500ms. Cite the specific Azure Monitor metric name(s) you'd watch and the alert threshold shape."
  expected_tools: []
  expected_patterns:
    - "monitor|metric|alert"
    - "latency|response|p95|percentile"
    - "threshold|rule|action"
  timeout_s: 120

- id: UC-028-sec-incident
  prompt: "A burst of 4xx responses is hitting our Front Door profile fd-prod. Describe the first three triage steps you'd take in Azure, which MCP tools you'd invoke for each step, and what you'd look at in the logs."
  expected_tools: []
  expected_patterns:
    - "front ?door|waf|diagnostic"
    - "triage|investigate|step"
    - "log|analytics|kusto|trace"
  timeout_s: 120

- id: UC-029-capacity-forecast
  prompt: "For a typical App Service Plan running at 70% average CPU, what's the standard capacity planning heuristic for when to scale up vs scale out? Give numbers."
  expected_patterns:
    - "scale[ -](up|out)"
    - "cpu|70%|utilization"
    - "instance|node|replica"
  expected_tools: []
  timeout_s: 90
