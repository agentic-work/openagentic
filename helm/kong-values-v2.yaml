# Proprietary and confidential. Unauthorized copying prohibited.

# Kong values using kong/kong chart (more stable than kong/ingress)
# For Docker Desktop with Gateway API support

# Main Kong image
image:
  repository: kong/kong-gateway
  tag: "3.9"

# Environment vars
env:
  database: "off"
  # SSE/streaming timeouts (critical for chat)
  nginx_proxy_proxy_read_timeout: "3600s"
  nginx_proxy_proxy_send_timeout: "3600s"
  nginx_proxy_proxy_connect_timeout: "60s"
  nginx_proxy_proxy_buffering: "off"
  # Trust all IPs for Docker Desktop
  trusted_ips: "0.0.0.0/0,::/0"
  real_ip_header: "X-Forwarded-For"
  real_ip_recursive: "on"
  plugins: "bundled"

# Ingress Controller
ingressController:
  enabled: true
  image:
    repository: kong/kubernetes-ingress-controller
    tag: "3.3"

  installCRDs: false

  env:
    # Gateway API controller name
    gateway_api_controller_name: "konghq.com/kic-gateway-controller"
    # Enable Gateway API
    feature_gates: "GatewayAlpha=true"
    # Watch all namespaces
    watch_namespace: ""
    log_level: "info"

  ingressClass: kong
  ingressClassAnnotations: {}

  admissionWebhook:
    enabled: false

# Proxy service
proxy:
  enabled: true
  type: LoadBalancer
  http:
    enabled: true
    servicePort: 80
    containerPort: 8000
  tls:
    enabled: true
    servicePort: 443
    containerPort: 8443

# Admin API
admin:
  enabled: true
  type: ClusterIP
  http:
    enabled: true
    servicePort: 8001
    containerPort: 8001
  tls:
    enabled: false

# Status endpoint
status:
  enabled: true
  http:
    enabled: true
    containerPort: 8100

# Resources
resources:
  requests:
    cpu: 250m
    memory: 256Mi
  limits:
    cpu: 1000m
    memory: 1Gi

# Readiness/liveness probes
readinessProbe:
  httpGet:
    path: /status
    port: status
    scheme: HTTP
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 5
  successThreshold: 1
  failureThreshold: 3

livenessProbe:
  httpGet:
    path: /status
    port: status
    scheme: HTTP
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 5
  successThreshold: 1
  failureThreshold: 3

# Service account
serviceAccount:
  create: true
