# Proprietary and confidential. Unauthorized copying prohibited.

# Redis values for OpenAgentic K3s cluster
# Install: helm install redis bitnami/redis -n openagentic -f redis-values.yaml

fullnameOverride: redis

global:
  imageRegistry: docker.io
  security:
    allowInsecureImages: true

architecture: replication

auth:
  enabled: true
  password: "openagentic123"

master:
  # Pin to amd64 (hal/dalek). Pi nodes had RDB/AOF format drift that crashed
  # the replica when it re-scheduled across arches. 0.6.6 pod-placement fix.
  nodeSelector:
    kubernetes.io/arch: amd64
  persistence:
    enabled: true
    storageClass: nfs
    size: 8Gi
  resources:
    requests:
      memory: 256Mi
      cpu: 100m
    limits:
      memory: 1Gi
      cpu: 500m

replica:
  replicaCount: 1
  nodeSelector:
    kubernetes.io/arch: amd64
  persistence:
    enabled: true
    storageClass: nfs
    size: 8Gi
  resources:
    requests:
      memory: 256Mi
      cpu: 100m
    limits:
      memory: 1Gi
      cpu: 500m
