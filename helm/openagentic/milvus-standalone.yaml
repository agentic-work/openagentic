

# ===================================================================================================
# MILVUS STANDALONE (CPU-BASED) FOR K3S LOCAL
# ===================================================================================================
# Deploy with: helm install milvus zilliztech/milvus -n openagentic -f helm/openagentic/milvus-standalone.yaml

cluster:
  enabled: false

standalone:
  replicas: 1
  enabled: true
  resources:
    requests:
      cpu: "500m"
      memory: "2Gi"
    limits:
      cpu: "4000m"
      memory: "8Gi"
  nodeSelector: {}

image:
  all:
    repository: milvusdb/milvus
    tag: v2.6.10
    pullPolicy: IfNotPresent

# etcd for metadata
etcd:
  enabled: true
  replicaCount: 1
  image:
    registry: docker.io
    repository: milvusdb/etcd
    tag: 3.5.5-r4
  persistence:
    enabled: true
    storageClass: nfs
    size: 10Gi
  nodeSelector: {}

# MinIO for storage
minio:
  enabled: true
  mode: standalone
  rootUser: minioadmin
  rootPassword: minioadmin123
  persistence:
    enabled: true
    storageClass: nfs
    size: 50Gi
  nodeSelector: {}

# Pulsar disabled for standalone
pulsar:
  enabled: false
pulsarv3:
  enabled: false
