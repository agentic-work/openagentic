# =============================================================================
# Default values for the openagentic Helm chart (public OSS)
# =============================================================================
#
# Override in your own values file. Images are pulled from
# ghcr.io/agentic-work/* — overlay your own registry if you
# self-host (see values-local-registry.yaml for an example).
#
# Usage:
#   helm install openagentic ./helm/openagentic -n openagentic --create-namespace
#
# With a custom values file:
#   helm install openagentic ./helm/openagentic -f my-values.yaml -n openagentic
# =============================================================================

global:
  environment: production
  imagePullPolicy: IfNotPresent
  # Override per-chart by setting a registry on each service.image.repository.
  imageRegistry: "ghcr.io/agentic-work/"

# ─── Core services ──────────────────────────────────────────────────────────
api:
  enabled: true
  image:
    repository: ghcr.io/agentic-work/openagentic-api
    tag: latest

ui:
  enabled: true
  image:
    repository: ghcr.io/agentic-work/openagentic-ui
    tag: latest

workflows:
  enabled: true
  image:
    repository: ghcr.io/agentic-work/openagentic-workflows
    tag: latest

mcpProxy:
  enabled: true
  image:
    repository: ghcr.io/agentic-work/openagentic-mcp-proxy
    tag: latest

openagenticProxy:
  enabled: true
  image:
    repository: ghcr.io/agentic-work/openagentic-proxy
    tag: latest

synth:
  enabled: false
  image:
    repository: ghcr.io/agentic-work/openagentic-synth
    tag: latest

# ─── Bundled MCPs (all disabled by default; enable in your overlay) ─────────
awpAdminMcp:
  enabled: false
  image:
    repository: ghcr.io/agentic-work/oap-admin-mcp
    tag: latest

awpAwsMcp:
  enabled: false
  image:
    repository: ghcr.io/agentic-work/oap-aws-mcp
    tag: latest

awpAzureMcp:
  enabled: false
  image:
    repository: ghcr.io/agentic-work/oap-azure-mcp
    tag: latest

awpGcpMcp:
  enabled: false
  image:
    repository: ghcr.io/agentic-work/oap-gcp-mcp
    tag: latest

awpKubernetesMcp:
  enabled: false
  image:
    repository: ghcr.io/agentic-work/oap-kubernetes-mcp
    tag: latest

awpPrometheusMcp:
  enabled: false
  image:
    repository: ghcr.io/agentic-work/oap-prometheus-mcp
    tag: latest

awpLokiMcp:
  enabled: false
  image:
    repository: ghcr.io/agentic-work/oap-loki-mcp
    tag: latest

awpAlertmanagerMcp:
  enabled: false
  image:
    repository: ghcr.io/agentic-work/oap-alertmanager-mcp
    tag: latest

awpWebMcp:
  enabled: true
  image:
    repository: ghcr.io/agentic-work/oap-web-mcp
    tag: latest

awpGithubMcp:
  enabled: false
  image:
    repository: ghcr.io/agentic-work/oap-github-mcp
    tag: latest

awpKnowledgeMcp:
  enabled: true
  image:
    repository: ghcr.io/agentic-work/oap-knowledge-mcp
    tag: latest

awpIncidentMcp:
  enabled: false
  image:
    repository: ghcr.io/agentic-work/oap-incident-mcp
    tag: latest

awpRunbookMcp:
  enabled: false
  image:
    repository: ghcr.io/agentic-work/oap-runbook-mcp
    tag: latest

awpAgentArchitectMcp:
  enabled: false
  image:
    repository: ghcr.io/agentic-work/oap-agent-architect-mcp
    tag: latest

awpAzureCostMcp:
  enabled: false
  image:
    repository: ghcr.io/agentic-work/oap-azure-cost-mcp
    tag: latest

# ─── Third-party (off-cluster registries) ───────────────────────────────────
postgresql:
  image:
    repository: pgvector/pgvector
    tag: pg16

redis:
  image:
    repository: redis
    tag: 7-alpine

milvus:
  image:
    repository: milvusdb/milvus
    tag: v2.4.15

ollama:
  enabled: false
  image:
    repository: ollama/ollama
    tag: latest

# ─── Misc ───────────────────────────────────────────────────────────────────
ingress:
  enabled: false

# Only set this when pulling from a private registry. Create the secret with:
#   kubectl create secret docker-registry registry-pull-secret \
#     --docker-server=<your-registry-host> \
#     --docker-username=<user> --docker-password=<token> \
#     -n openagentic
# Leave empty for public registries (default: ghcr.io/agentic-work).
imagePullSecrets: []
