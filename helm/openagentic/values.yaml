# =============================================================================
# Barebones OpenAgentic stack — default values
# =============================================================================
#
# A self-contained single-replica deployment: postgres (pgvector), redis,
# ollama, and the app services (api, ui, workflows, mcp-proxy, proxy)
# plus searxng for web search. Vector search uses pgvector; Milvus is omitted.
#
#   helm install openagentic ./helm/openagentic -n openagentic --create-namespace
#
# Override image.registry/tag, ingress.host, and secrets.* in your own values
# file for a real deployment. The defaults below run a working demo stack.
# =============================================================================

# Container image coordinates. All app images share one registry + tag.
image:
  registry: ghcr.io/agentic-work
  tag: latest
  pullPolicy: IfNotPresent

# Pull secret name for a private registry (e.g. Harbor). Empty = public.
imagePullSecrets: []
#  - name: harbor-creds

# Shared secrets. CHANGE THESE for any non-demo deployment.
secrets:
  postgresPassword: openagentic-dev-pg-pass
  jwtSecret: openagentic-dev-jwt-secret-change-me
  signingSecret: openagentic-dev-signing-secret-change-me
  internalApiKey: openagentic-dev-internal-key-change-me
  frontendSecret: dev-frontend-secret-change-me
  # First-boot admin seed (created once).
  adminEmail: admin@openagentic.local
  adminPassword: changeme-on-first-login
  # Optional AWS creds for a Bedrock provider (Claude on Bedrock). Leave empty
  # to skip; set in your overlay to enable Sonnet/Opus via Bedrock.
  awsAccessKeyId: ""
  awsSecretAccessKey: ""
  awsRegion: us-east-1

# Ollama. The in-cluster Ollama ALWAYS serves embeddings (nomic-embed-text is
# light — runs fine CPU-only, GPU not required). The CHAT model is served by
# `chatHost` — supporting BOTH local and remote Ollama:
#   chatHost: ""                    chat uses the in-cluster Ollama (all-local,
#                                   zero-config; chatModel is pulled in-cluster).
#   chatHost: "http://HOST:11434"   chat uses a REMOTE Ollama (e.g. a GPU box)
#                                   for big models; the in-cluster Ollama then
#                                   pulls ONLY the embed model (no GPU needed).
# Example remote GPU host: http://10.2.10.142:11434  (model e.g. gpt-oss:20b)
ollama:
  embedModel: nomic-embed-text
  chatModel: llama3.2:3b
  chatHost: ""          # remote chat Ollama endpoint; empty = use in-cluster
  # GPU off by default (portable). Embeddings never need a GPU; set true only
  # if you run a big chat model on the IN-CLUSTER Ollama (chatHost empty).
  gpu: false

# Postgres datastore (pgvector). storage sizes are modest for a demo.
postgres:
  image: pgvector/pgvector:pg16
  storage: 8Gi

redis:
  image: redis:7-alpine

searxng:
  image: searxng/searxng:latest

# Vector DB for the tool semantic cache. The api requires a vector backend;
# milvus (with bundled etcd + minio) is the in-cluster default. Set enabled
# false ONLY if you wire the api to pgvector-only mode (MILVUS_ENABLED=false).
milvus:
  enabled: true
  image: milvusdb/milvus:v2.4.15

# Which MCP servers the proxy spawns. web/knowledge/admin need no creds.
# `enabled` is the legacy comma-string (kept for back-compat / UI display).
# The real on/off switch is the per-MCP `OpenAgentic_<NAME>_MCP_DISABLED` env
# flag in templates/mcp-proxy.yaml, which is templated off the structured
# per-MCP toggles below.
mcps:
  enabled: "web,knowledge,admin,kubernetes,prometheus"
  # In-cluster ops MCPs — ON by default for the ops ICP (no external creds).
  # kubernetes: uses the mcp-proxy pod ServiceAccount token + read-only RBAC
  #   (templates/mcp-proxy-rbac.yaml). Set enabled:false to ship no RBAC.
  kubernetes:
    enabled: true
  # prometheus: queries the in-cluster prometheus service. No creds, no RBAC.
  prometheus:
    enabled: true
    url: "http://prometheus:9090"

# Per-service resource requests/limits. Tuned small; raise for production load.
resources:
  api:        { requests: { cpu: "250m", memory: "768Mi" }, limits: { memory: "2Gi" } }
  ui:         { requests: { cpu: "50m",  memory: "64Mi" },  limits: { memory: "256Mi" } }
  workflows:  { requests: { cpu: "100m", memory: "384Mi" }, limits: { memory: "1Gi" } }
  mcpProxy:   { requests: { cpu: "100m", memory: "256Mi" }, limits: { memory: "1Gi" } }
  proxy:      { requests: { cpu: "50m",  memory: "128Mi" }, limits: { memory: "512Mi" } }
  ollama:     { requests: { cpu: "500m", memory: "2Gi" },   limits: { memory: "6Gi" } }
  postgres:   { requests: { cpu: "100m", memory: "256Mi" }, limits: { memory: "1Gi" } }
  redis:      { requests: { cpu: "50m",  memory: "64Mi" },  limits: { memory: "256Mi" } }
  searxng:    { requests: { cpu: "50m",  memory: "128Mi" }, limits: { memory: "512Mi" } }
  prometheus: { requests: { cpu: "100m", memory: "256Mi" }, limits: { memory: "1Gi" } }

# Optional components. proxy is an egress shim for tool calls. Off by default
# for a minimal install — the core (chat, flows, MCPs) runs without it. Enable
# in your overlay if you need it.
proxy:
  enabled: false

# Prometheus — scrapes api/mcp-proxy/proxy /metrics and backs the admin dashboard
# metrics (request rate, latency, LLM TTFT/TPOT, token cost, MCP calls). When
# enabled the api is auto-pointed at it via PROMETHEUS_HOST/PORT.
prometheus:
  enabled: false
  retention: 7d
  persistence: false   # set true (+ storageSize) for a durable TSDB PVC
  storageSize: 8Gi

# Node placement. Empty = schedule anywhere. Set kubernetes.io/arch when
# your images are single-arch and the cluster is mixed amd64/arm64.
nodeSelector: {}

# Ingress (nginx). Set host + tlsSecret to expose the UI over HTTPS.
ingress:
  enabled: false
  className: nginx
  host: openagentic.local
  # Name of a pre-existing kubernetes.io/tls secret in the release namespace.
  tlsSecret: ""
