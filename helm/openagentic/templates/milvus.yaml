{{- if .Values.milvus.enabled }}
# Milvus standalone + its deps (etcd + minio). The api requires a vector DB for
# the tool semantic cache; this is the in-cluster vector search backend.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: etcd-data
  labels:
    {{- include "openagentic.labels" . | nindent 4 }}
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 4Gi
---
apiVersion: v1
kind: Service
metadata:
  name: etcd
  labels:
    {{- include "openagentic.labels" . | nindent 4 }}
spec:
  selector:
    app: etcd
  ports:
    - port: 2379
      targetPort: 2379
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: etcd
  labels:
    {{- include "openagentic.labels" . | nindent 4 }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: etcd
  template:
    metadata:
      labels:
        app: etcd
    spec:
      enableServiceLinks: false
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: etcd
          image: quay.io/coreos/etcd:v3.5.18
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - etcd
            - -advertise-client-urls=http://etcd:2379
            - -listen-client-urls=http://0.0.0.0:2379
            - --data-dir=/etcd
          env:
            - name: ETCD_AUTO_COMPACTION_MODE
              value: revision
            - name: ETCD_AUTO_COMPACTION_RETENTION
              value: "1000"
            - name: ETCD_QUOTA_BACKEND_BYTES
              value: "4294967296"
            - name: ETCD_SNAPSHOT_COUNT
              value: "50000"
          ports:
            - containerPort: 2379
          volumeMounts:
            - name: data
              mountPath: /etcd
          readinessProbe:
            exec:
              command: ["etcdctl", "endpoint", "health"]
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests: { cpu: "50m", memory: "256Mi" }
            limits: { memory: "1Gi" }
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: etcd-data
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: minio-data
  labels:
    {{- include "openagentic.labels" . | nindent 4 }}
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 8Gi
---
apiVersion: v1
kind: Service
metadata:
  name: minio
  labels:
    {{- include "openagentic.labels" . | nindent 4 }}
spec:
  selector:
    app: minio
  ports:
    - port: 9000
      targetPort: 9000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: minio
  labels:
    {{- include "openagentic.labels" . | nindent 4 }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: minio
  template:
    metadata:
      labels:
        app: minio
    spec:
      enableServiceLinks: false
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: minio
          image: minio/minio:RELEASE.2024-12-18T13-15-44Z
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args: ["server", "/data", "--console-address", ":9001"]
          env:
            - name: MINIO_ROOT_USER
              value: minioadmin
            - name: MINIO_ROOT_PASSWORD
              value: minioadmin
          ports:
            - containerPort: 9000
          volumeMounts:
            - name: data
              mountPath: /data
          readinessProbe:
            httpGet:
              path: /minio/health/live
              port: 9000
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests: { cpu: "50m", memory: "256Mi" }
            limits: { memory: "1Gi" }
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: minio-data
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: milvus-data
  labels:
    {{- include "openagentic.labels" . | nindent 4 }}
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: milvus
  labels:
    {{- include "openagentic.labels" . | nindent 4 }}
spec:
  selector:
    app: milvus
  ports:
    - name: grpc
      port: 19530
      targetPort: 19530
    - name: health
      port: 9091
      targetPort: 9091
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: milvus
  labels:
    {{- include "openagentic.labels" . | nindent 4 }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: milvus
  template:
    metadata:
      labels:
        app: milvus
    spec:
      enableServiceLinks: false
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      # Milvus standalone aborts (SIGABRT / exit 134) if it starts before etcd +
      # minio are accepting connections, which showed as 'RESTARTS 1 / Error' on
      # a fresh cold boot. Gate startup on both deps so milvus comes up clean.
      initContainers:
        - name: wait-for-deps
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "waiting for etcd:2379 and minio:9000 ..."
              until nc -z etcd 2379; do sleep 2; done
              until nc -z minio 9000; do sleep 2; done
              echo "deps ready"
      containers:
        - name: milvus
          image: {{ .Values.milvus.image }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args: ["milvus", "run", "standalone"]
          env:
            - name: ETCD_ENDPOINTS
              value: etcd:2379
            - name: MINIO_ADDRESS
              value: minio:9000
          ports:
            - containerPort: 19530
            - containerPort: 9091
          volumeMounts:
            - name: data
              mountPath: /var/lib/milvus
          readinessProbe:
            httpGet:
              path: /healthz
              port: 9091
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 30
          resources:
            requests: { cpu: "250m", memory: "1Gi" }
            limits: { memory: "4Gi" }
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: milvus-data
{{- end }}
