

{{- if .Values.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "openagentic.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "openagentic.labels" . | nindent 4 }}
    {{- if and .Values.externalSecrets.enabled (hasKey (.Values.externalSecrets | default dict) "azureKeyVault") (.Values.externalSecrets.azureKeyVault).useWorkloadIdentity }}
    azure.workload.identity/use: "true"
    {{- end }}
  {{- if or .Values.serviceAccount.annotations (and .Values.externalSecrets.enabled (hasKey (.Values.externalSecrets | default dict) "azureKeyVault") ((.Values.externalSecrets.azureKeyVault).useWorkloadIdentity)) }}
  annotations:
    {{- if and .Values.externalSecrets.enabled (hasKey (.Values.externalSecrets | default dict) "azureKeyVault") ((.Values.externalSecrets.azureKeyVault).useWorkloadIdentity) }}
    azure.workload.identity/client-id: {{ .Values.externalSecrets.azureKeyVault.managedIdentityClientId | quote }}
    {{- end }}
    {{- with .Values.serviceAccount.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- end }}
{{- end }}