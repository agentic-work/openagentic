# Proprietary and confidential. Unauthorized copying prohibited.

{{- if .Values.pgadmin.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "openagentic.fullname" . }}-pgadmin
  labels:
    {{- include "openagentic.labels" . | nindent 4 }}
    app.kubernetes.io/component: pgadmin
spec:
  type: {{ .Values.pgadmin.service.type }}
  ports:
  - port: {{ .Values.pgadmin.service.port }}
    targetPort: http
    protocol: TCP
    name: http
  selector:
    {{- include "openagentic.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: pgadmin
{{- end }}
