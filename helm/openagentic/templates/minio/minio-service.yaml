

{{- if .Values.minio.enabled }}
# Unified MinIO Service
apiVersion: v1
kind: Service
metadata:
  name: {{ include "openagentic.fullname" . }}-minio
  labels:
    {{- include "openagentic.labels" . | nindent 4 }}
    app.kubernetes.io/component: minio
spec:
  type: {{ .Values.minio.service.type | default "ClusterIP" }}
  ports:
    - port: 9000
      targetPort: api
      protocol: TCP
      name: api
    - port: 9001
      targetPort: console
      protocol: TCP
      name: console
  selector:
    {{- include "openagentic.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: minio
{{- end }}
