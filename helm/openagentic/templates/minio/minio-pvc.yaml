

{{- if and .Values.minio.enabled .Values.minio.persistence.enabled }}
# Unified MinIO PVC
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "openagentic.fullname" . }}-minio
  labels:
    {{- include "openagentic.labels" . | nindent 4 }}
    app.kubernetes.io/component: minio
spec:
  accessModes:
    - {{ .Values.minio.persistence.accessMode | default "ReadWriteOnce" }}
  resources:
    requests:
      storage: {{ .Values.minio.persistence.size | default "10Gi" }}
  {{- if .Values.minio.persistence.storageClass }}
  storageClassName: {{ .Values.minio.persistence.storageClass }}
  {{- end }}
{{- end }}
