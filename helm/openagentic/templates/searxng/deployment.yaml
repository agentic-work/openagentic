

{{- if .Values.searxng.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "openagentic.fullname" . }}-searxng
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "openagentic.labels" . | nindent 4 }}
    app.kubernetes.io/component: searxng
spec:
  replicas: {{ .Values.searxng.replicas | default 1 }}
  selector:
    matchLabels:
      {{- include "openagentic.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: searxng
  template:
    metadata:
      labels:
        {{- include "openagentic.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: searxng
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/searxng/configmap.yaml") . | sha256sum }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.searxng.nodeSelector | default .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      # SECURITY: No service account needed
      automountServiceAccountToken: false
      # Fix DNS: ndots:1 ensures external domains are tried as FQDN first (example.local.com wildcard)
      dnsConfig:
        options:
          - name: ndots
            value: "1"
      containers:
      - name: searxng
        image: "{{ .Values.searxng.image.repository | default "searxng/searxng" }}:{{ .Values.searxng.image.tag | default "latest" }}"
        imagePullPolicy: {{ .Values.searxng.image.pullPolicy | default "IfNotPresent" }}
        ports:
        - name: http
          containerPort: 8080
          protocol: TCP
        env:
        - name: SEARXNG_BASE_URL
          value: {{ .Values.searxng.env.SEARXNG_BASE_URL | default "http://localhost:8080" | quote }}
        livenessProbe:
          httpGet:
            path: /
            port: http
          initialDelaySeconds: 30
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 5
        readinessProbe:
          httpGet:
            path: /
            port: http
          initialDelaySeconds: 20
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 5
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        volumeMounts:
        - name: searxng-config
          mountPath: /etc/searxng/settings.yml
          subPath: settings.yml
          readOnly: true
      volumes:
      - name: searxng-config
        configMap:
          name: {{ include "openagentic.fullname" . }}-searxng-config
{{- end }}
