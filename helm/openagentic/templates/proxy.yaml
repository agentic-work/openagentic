{{- if .Values.proxy.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: proxy
  labels:
    {{- include "openagentic.labels" . | nindent 4 }}
spec:
  selector:
    app: proxy
  ports:
    - port: 3300
      targetPort: 3300
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: proxy
  labels:
    {{- include "openagentic.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: proxy
  template:
    metadata:
      labels:
        app: proxy
    spec:
      enableServiceLinks: false
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: proxy
          image: {{ .Values.image.registry }}/openagentic-proxy:{{ .Values.image.tag }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 3300
          env:
            - name: API_URL
              value: http://api:8000
            - name: REDIS_URL
              value: redis://redis:6379
            - name: REDIS_HOST
              value: redis
            - name: REDIS_PORT
              value: "6379"
          readinessProbe:
            tcpSocket:
              port: 3300
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources.proxy | nindent 12 }}
{{- end }}
