

{{- if .Values.ingress.enabled -}}
# ===========================================
# SINGLE INGRESS - Routes to UI
# ===========================================
# The UI's nginx handles ALL internal reverse proxying:
#   /api/* -> API service (with X-OpenAgentic-Frontend header)
#   /mcp-inspector/* -> MCP proxy
#   /redis-commander/* -> Redis Commander
#   /attu/* -> Milvus admin
#   /* -> React frontend
#
# This ingress just terminates TLS and routes everything to the UI.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "openagentic.fullname" . }}
  labels:
    {{- include "openagentic.labels" . | nindent 4 }}
  annotations:
    {{- with .Values.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
    # SSE/Streaming support - ingress-specific annotations
    {{- if eq .Values.ingress.ingressClassName "haproxy" }}
    haproxy.org/response-set-header: "X-Accel-Buffering no"
    haproxy.org/abortonclose: "true"
    {{- end }}
    {{- if eq .Values.ingress.ingressClassName "nginx" }}
    # CRITICAL: These annotations are REQUIRED for SSE streaming to work
    # Without these, NGINX Ingress buffers the entire response before sending to client
    nginx.ingress.kubernetes.io/proxy-buffering: "off"
    nginx.ingress.kubernetes.io/proxy-request-buffering: "off"
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    # Force connection to stay open for SSE
    nginx.ingress.kubernetes.io/upstream-hash-by: "$request_uri"
    # Send custom header to disable buffering at all downstream proxies
    nginx.ingress.kubernetes.io/proxy-set-headers: "{{ .Release.Namespace }}/custom-headers"
    {{- end }}
spec:
  {{- if .Values.ingress.ingressClassName }}
  ingressClassName: {{ .Values.ingress.ingressClassName }}
  {{- end }}
  {{- if .Values.ingress.tls }}
  tls:
    {{- range .Values.ingress.tls }}
    - hosts:
        {{- range .hosts }}
        - {{ . | quote }}
        {{- end }}
      secretName: {{ .secretName }}
    {{- end }}
  {{- end }}
  rules:
    {{- range .Values.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "openagentic.fullname" $ }}-ui
                port:
                  number: 80
    {{- end }}
{{- end }}
