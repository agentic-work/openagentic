

{{- if and .Values.workflows.enabled .Values.workflows.autoscaling.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "openagentic.fullname" . }}-workflows
  labels:
    {{- include "openagentic.labels" . | nindent 4 }}
    app.kubernetes.io/component: workflows
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "openagentic.fullname" . }}-workflows
  minReplicas: {{ .Values.workflows.autoscaling.minReplicas | default 1 }}
  maxReplicas: {{ .Values.workflows.autoscaling.maxReplicas | default 5 }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.workflows.autoscaling.targetCPUUtilizationPercentage | default 70 }}
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: {{ .Values.workflows.autoscaling.targetMemoryUtilizationPercentage | default 80 }}
{{- end }}
