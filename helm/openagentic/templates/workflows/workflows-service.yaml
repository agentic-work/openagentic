# Proprietary and confidential. Unauthorized copying prohibited.

{{- if .Values.workflows.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "openagentic.fullname" . }}-workflows
  labels:
    {{- include "openagentic.labels" . | nindent 4 }}
    app.kubernetes.io/component: workflows
spec:
  type: {{ .Values.workflows.service.type | default "ClusterIP" }}
  ports:
    - port: {{ .Values.workflows.service.port | default 3400 }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "openagentic.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: workflows
{{- end }}
