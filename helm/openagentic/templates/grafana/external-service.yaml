{{- if .Values.grafana.enabled }}
# ExternalName service to proxy requests to Grafana in another namespace.
# This lets the UI nginx proxy_pass to grafana.{{ .Release.Namespace }} even though
# the real Grafana lives in {{ .Values.grafana.namespace }}.
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: grafana-proxy
    app.kubernetes.io/part-of: {{ .Release.Name }}
spec:
  type: ExternalName
  externalName: grafana.{{ .Values.grafana.namespace }}.svc.cluster.local
  ports:
    - port: {{ .Values.grafana.port | default 3000 }}
      targetPort: {{ .Values.grafana.port | default 3000 }}
      protocol: TCP
{{- end }}
