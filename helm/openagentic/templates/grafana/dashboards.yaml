

{{- if and .Values.grafana.enabled .Values.grafana.dashboards.enabled }}
# Grafana dashboard provisioning via sidecar ConfigMaps.
# Grafana's k8s-sidecar watches for ConfigMaps with the label defined in
# grafana.dashboards.label (default: grafana_dashboard) and auto-imports them.
# These ConfigMaps are created in the Grafana namespace so the sidecar can see them.
{{- $grafanaNamespace := .Values.grafana.namespace }}
{{- $dashboardLabel := .Values.grafana.dashboards.label | default "grafana_dashboard" }}
{{- $dashboardFolder := .Values.grafana.dashboards.folder | default "OpenAgentic" }}
{{- $releaseName := .Release.Name }}
{{- $releaseNamespace := .Release.Namespace }}
{{- range $path, $_ := .Files.Glob "dashboards/*.json" }}
{{- $name := trimSuffix ".json" (base $path) }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ $releaseName }}-dashboard-{{ $name }}
  namespace: {{ $grafanaNamespace }}
  labels:
    {{ $dashboardLabel }}: "1"
    app.kubernetes.io/part-of: {{ $releaseName }}
    app.kubernetes.io/managed-by: Helm
  annotations:
    grafana_folder: {{ $dashboardFolder }}
    meta.helm.sh/release-name: {{ $releaseName }}
    meta.helm.sh/release-namespace: {{ $releaseNamespace }}
data:
  {{ $name }}.json: |-
{{ $.Files.Get $path | replace "{{ .Release.Namespace }}" $releaseNamespace | indent 4 }}
{{- end }}
{{- end }}
