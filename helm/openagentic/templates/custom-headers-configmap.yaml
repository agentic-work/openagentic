

{{- if .Values.ingress.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: custom-headers
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "openagentic.labels" . | nindent 4 }}
data:
  # Required for nginx-ingress proxy-set-headers annotation
  # Without this ConfigMap, ingress-nginx strips Authorization headers
  X-Forwarded-Proto: "https"
{{- end }}
