

{{- if and .Values.externalSecrets.enabled (ne (.Values.externalSecrets.provider | default "azure") "vault") }}
# ===========================================
# EXTERNAL SECRETS OPERATOR - SECRET STORE
# ===========================================
# Connects to Azure Key Vault using Workload Identity
#
# Prerequisites:
#   1. Install External Secrets Operator in cluster
#   2. Configure Azure Workload Identity on AKS
#   3. Create federated credential for the service account
#   4. Grant "Key Vault Secrets User" role to the managed identity
# ===========================================
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: {{ include "openagentic.fullname" . }}-azure-keyvault
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "openagentic.labels" . | nindent 4 }}
spec:
  provider:
    azurekv:
      # Azure Key Vault URL
      vaultUrl: "https://{{ .Values.externalSecrets.azureKeyVault.vaultName }}.vault.azure.net"

      {{- if .Values.externalSecrets.azureKeyVault.useWorkloadIdentity }}
      # Workload Identity authentication (recommended for AKS)
      authType: WorkloadIdentity
      tenantId: {{ .Values.externalSecrets.azureKeyVault.tenantId | quote }}
      serviceAccountRef:
        name: {{ .Values.externalSecrets.azureKeyVault.serviceAccountName | default (include "openagentic.serviceAccountName" .) }}
      {{- else if .Values.externalSecrets.azureKeyVault.useManagedIdentity }}
      # Managed Identity authentication
      authType: ManagedIdentity
      identityId: {{ .Values.externalSecrets.azureKeyVault.managedIdentityId | quote }}
      {{- else }}
      # Service Principal authentication (fallback)
      authType: ServicePrincipal
      tenantId: {{ .Values.externalSecrets.azureKeyVault.tenantId | quote }}
      authSecretRef:
        clientId:
          name: {{ include "openagentic.fullname" . }}-eso-sp
          key: client-id
        clientSecret:
          name: {{ include "openagentic.fullname" . }}-eso-sp
          key: client-secret
      {{- end }}
{{- end }}
