# Proprietary and confidential. Unauthorized copying prohibited.

{{- if .Values.uatDashboard.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "openagentic.fullname" . }}-uat-dashboard
  labels:
    {{- include "openagentic.labels" . | nindent 4 }}
    app.kubernetes.io/component: uat-dashboard
spec:
  replicas: {{ .Values.uatDashboard.replicas | default 1 }}
  selector:
    matchLabels:
      {{- include "openagentic.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: uat-dashboard
  template:
    metadata:
      labels:
        {{- include "openagentic.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: uat-dashboard
      {{- with .Values.uatDashboard.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "openagentic.serviceAccountName" . }}
      containers:
        - name: uat-dashboard
          image: "{{ .Values.uatDashboard.image.repository }}:{{ .Values.uatDashboard.image.tag }}"
          imagePullPolicy: {{ .Values.uatDashboard.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 3333
              protocol: TCP
          env:
            - name: PORT
              value: "3333"
            - name: NODE_ENV
              value: "production"
            - name: TESTS_DIR
              value: "/tests"
            # OpenAgentic API connection
            - name: TEST_API_URL
              value: "http://{{ include "openagentic.fullname" . }}-api:8000"
            - name: API_URL
              value: "http://{{ include "openagentic.fullname" . }}-api:8000"
            # Test API key (for running tests against the platform)
            - name: TEST_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "openagentic.fullname" . }}-secrets
                  key: api-key
                  optional: true
            # Anthropic API key for Claude terminal
            {{- if .Values.uatDashboard.anthropicApiKey }}
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "openagentic.fullname" . }}-uat-secrets
                  key: anthropic-api-key
                  optional: true
            {{- end }}
            {{- with .Values.uatDashboard.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          volumeMounts:
            # Mount tests directory from the main repo
            - name: tests
              mountPath: /tests
              readOnly: true
          {{- with .Values.uatDashboard.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: {{ .Values.uatDashboard.livenessProbe.initialDelaySeconds | default 15 }}
            periodSeconds: {{ .Values.uatDashboard.livenessProbe.periodSeconds | default 30 }}
            timeoutSeconds: {{ .Values.uatDashboard.livenessProbe.timeoutSeconds | default 5 }}
            failureThreshold: {{ .Values.uatDashboard.livenessProbe.failureThreshold | default 3 }}
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: {{ .Values.uatDashboard.readinessProbe.initialDelaySeconds | default 10 }}
            periodSeconds: {{ .Values.uatDashboard.readinessProbe.periodSeconds | default 10 }}
            timeoutSeconds: {{ .Values.uatDashboard.readinessProbe.timeoutSeconds | default 5 }}
            failureThreshold: {{ .Values.uatDashboard.readinessProbe.failureThreshold | default 3 }}
      volumes:
        # Tests volume - can be ConfigMap, PVC, or hostPath depending on deployment
        - name: tests
          {{- if .Values.uatDashboard.testsVolume.hostPath }}
          hostPath:
            path: {{ .Values.uatDashboard.testsVolume.hostPath }}
            type: Directory
          {{- else if .Values.uatDashboard.testsVolume.pvc }}
          persistentVolumeClaim:
            claimName: {{ .Values.uatDashboard.testsVolume.pvc }}
          {{- else }}
          emptyDir: {}
          {{- end }}
      {{- with .Values.uatDashboard.nodeSelector | default .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.uatDashboard.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.uatDashboard.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
