

{{- if .Values.uatDashboard.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "openagentic.fullname" . }}-uat-dashboard
  labels:
    {{- include "openagentic.labels" . | nindent 4 }}
    app.kubernetes.io/component: uat-dashboard
spec:
  type: {{ .Values.uatDashboard.service.type | default "ClusterIP" }}
  ports:
    - port: {{ .Values.uatDashboard.service.port | default 3333 }}
      targetPort: http
      protocol: TCP
      name: http
    {{- if eq .Values.uatDashboard.service.type "NodePort" }}
    {{- if .Values.uatDashboard.service.nodePort }}
      nodePort: {{ .Values.uatDashboard.service.nodePort }}
    {{- end }}
    {{- end }}
  selector:
    {{- include "openagentic.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: uat-dashboard
{{- end }}
