apiVersion: v1
kind: Service
metadata:
  name: api
  labels:
    {{- include "openagentic.labels" . | nindent 4 }}
spec:
  selector:
    app: api
  ports:
    - port: 8000
      targetPort: 8000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  labels:
    {{- include "openagentic.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      enableServiceLinks: false
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: api
          image: {{ .Values.image.registry }}/openagentic-api:{{ .Values.image.tag }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: openagentic-secrets
          env:
            - name: NODE_ENV
              value: production
            - name: REDIS_URL
              value: redis://redis:6379
            {{- if .Values.milvus.enabled }}
            # In-cluster milvus is the vector backend for the tool semantic cache.
            - name: MILVUS_HOST
              value: milvus
            - name: MILVUS_PORT
              value: "19530"
            - name: SKIP_TOOL_SEMANTIC_CACHE
              value: "false"
            {{- else }}
            # No milvus — run pgvector-only; entrypoint + node skip the milvus path.
            - name: MILVUS_ENABLED
              value: "false"
            - name: SKIP_TOOL_SEMANTIC_CACHE
              value: "true"
            {{- end }}
            # RAG retrieval stays off on fresh boot to avoid embedding stalls when
            # Ollama is shared between chat/tools and embeddings.
            - name: DISABLE_RAG
              value: "true"
            - name: OLLAMA_ENABLED
              value: "true"
            # Chat host — a REMOTE Ollama (e.g. a GPU box) when ollama.chatHost
            # is set; otherwise the in-cluster Ollama. Embeddings ALWAYS use the
            # in-cluster Ollama (nomic-embed-text is light, runs fine CPU-only).
            - name: OLLAMA_HOST
              value: {{ .Values.ollama.chatHost | default "http://ollama:11434" | quote }}
            - name: OLLAMA_BASE_URL
              value: {{ .Values.ollama.chatHost | default "http://ollama:11434" | quote }}
            - name: EMBEDDING_OLLAMA_BASE_URL
              value: http://ollama:11434
            - name: EMBEDDING_PROVIDER
              value: ollama
            - name: OLLAMA_EMBEDDING_MODEL
              value: {{ .Values.ollama.embedModel | quote }}
            - name: OLLAMA_EMBED_MODEL
              value: {{ .Values.ollama.embedModel | quote }}
            - name: EMBEDDING_MODEL
              value: {{ .Values.ollama.embedModel | quote }}
            # Seed a local Ollama provider on first boot so a bare install chats
            # with zero API keys. Chat role seeds only when chatModel is set.
            - name: BOOTSTRAP_PROVIDER_NAME
              value: ollama-local
            - name: BOOTSTRAP_PROVIDER_DISPLAY_NAME
              value: Ollama (local)
            - name: BOOTSTRAP_PROVIDER_TYPE
              value: ollama
            - name: BOOTSTRAP_PROVIDER_CONFIG
              value: '{"endpoint":"{{ .Values.ollama.chatHost | default "http://ollama:11434" }}"}'
            - name: BOOTSTRAP_PROVIDER_DEFAULTS
              value: '{"chat":"{{ .Values.ollama.chatModel }}","embedding":"{{ .Values.ollama.embedModel }}","embeddingDimension":768}'
            - name: API_HOST
              value: api
            - name: API_PORT
              value: "8000"
            - name: MCP_PROXY_HOST
              value: mcp-proxy
            - name: MCP_PROXY_PORT
              value: "8080"
            - name: WORKFLOWS_HOST
              value: workflows
            - name: WORKFLOWS_PORT
              value: "3400"
            - name: WORKFLOW_SERVICE_URL
              value: http://workflows:3400
            - name: OPENAGENTIC_PROXY_URL
              value: http://proxy:3300
            - name: OPENAGENTIC_API_INTERNAL_URL
              value: http://api:8000
            {{- if .Values.prometheus.enabled }}
            # Dashboard metrics: the Prom-first admin endpoints (cluster/health,
            # api-requests/*, perf/*) + the /api/admin/prom proxy read these.
            - name: PROMETHEUS_HOST
              value: prometheus
            - name: PROMETHEUS_PORT
              value: "9090"
            - name: PROM_URL
              value: http://prometheus:9090
            {{- end }}
            # tool_search self-call target (model-driven MCP discovery).
            - name: INTERNAL_API_URL
              value: http://api:8000
            {{- if .Values.ingress.enabled }}
            # Browser CORS: allow the UI's public origin (else login 500s with
            # "Not allowed by CORS"). The default localhost list excludes it.
            - name: ALLOWED_ORIGINS
              value: "https://{{ .Values.ingress.host }}"
            {{- end }}
            - name: AUTH_PROVIDER
              value: local
            - name: ADMIN_USER_EMAIL
              value: {{ .Values.secrets.adminEmail | quote }}
            - name: LOCAL_ADMIN_USERNAME
              value: Admin
            - name: ADMIN_REQUIRE_PASSWORD_RESET
              value: "false"
          startupProbe:
            httpGet:
              path: /api/health
              port: 8000
            periodSeconds: 5
            failureThreshold: 60
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8000
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources.api | nindent 12 }}
