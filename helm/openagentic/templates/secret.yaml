

apiVersion: v1
kind: Secret
metadata:
  name: {{ include "openagentic.fullname" . }}-secret
  labels:
    {{- include "openagentic.labels" . | nindent 4 }}
type: Opaque
{{- $existingSecret := (lookup "v1" "Secret" .Release.Namespace (printf "%s-secret" (include "openagentic.fullname" .))) }}
{{- $sd := dict }}
{{- if $existingSecret }}{{- $sd = $existingSecret.data | default dict }}{{- end }}
stringData:
  database-url: "postgresql://{{ include "openagentic.postgresql.username" . }}:{{ include "openagentic.postgresql.password" . }}@{{ include "openagentic.postgresql.serviceName" . }}:{{ include "openagentic.postgresql.port" . }}/{{ include "openagentic.postgresql.database" . }}?sslmode={{ .Values.postgresql.sslmode | default "require" }}"
  jwt-secret: {{ include "openagentic.secretOrGenerate" (dict "override" .Values.security.jwtSecret "data" $sd "key" "jwt-secret" "length" 32) | quote }}
  signing-secret: {{ include "openagentic.secretOrGenerate" (dict "override" .Values.security.signingSecret "data" $sd "key" "signing-secret" "length" 32) | quote }}
  database-username: {{ include "openagentic.postgresql.username" . | quote }}
  database-password: {{ include "openagentic.postgresql.password" . | quote }}
  redis-password: {{ include "openagentic.redis.password" . | quote }}
  # NOTE: AZURE_MCP_* secrets removed - oap-azure-mcp uses OBO tokens
  {{- if .Values.secrets.awsAccessKeyId }}
  awsAccessKeyId: {{ .Values.secrets.awsAccessKeyId | quote }}
  {{- end }}
  {{- if .Values.secrets.awsSecretAccessKey }}
  awsSecretAccessKey: {{ .Values.secrets.awsSecretAccessKey | quote }}
  {{- end }}
---
# NOTE: Redis secret is created by Bitnami Redis subchart, not here
# The subchart creates {{ .Release.Name }}-redis secret when auth.enabled=true
---
{{- if .Values.milvus.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "openagentic.fullname" . }}-milvus
  labels:
    {{- include "openagentic.labels" . | nindent 4 }}
type: Opaque
stringData:
  password: {{ .Values.milvus.auth.password | quote }}
{{- end }}
---
# Milvus MinIO secret (needed when Milvus has bundled MinIO)
{{- if and .Values.milvus.enabled ((.Values.milvus).minio).enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: milvus-minio-secret
  labels:
    {{- include "openagentic.labels" . | nindent 4 }}
type: Opaque
stringData:
  accesskey: {{ required "milvus.minio.accessKey is required" ((.Values.milvus).minio).accessKey | quote }}
  secretkey: {{ required "milvus.minio.secretKey is required" ((.Values.milvus).minio).secretKey | quote }}
{{- end }}
---
{{- if .Values.pgadmin.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "openagentic.fullname" . }}-pgadmin
  labels:
    {{- include "openagentic.labels" . | nindent 4 }}
type: Opaque
stringData:
  default-password: {{ .Values.pgadmin.defaultPassword | quote }}
{{- end }}
---
# Database secrets used by API and MCP Proxy
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "openagentic.fullname" . }}-db-secrets
  labels:
    {{- include "openagentic.labels" . | nindent 4 }}
type: Opaque
stringData:
  POSTGRES_PASSWORD: {{ include "openagentic.postgresql.password" . | quote }}
  DATABASE_URL: "postgresql://{{ include "openagentic.postgresql.username" . }}:{{ include "openagentic.postgresql.password" . }}@{{ include "openagentic.postgresql.serviceName" . }}:{{ include "openagentic.postgresql.port" . }}/{{ include "openagentic.postgresql.database" . }}?sslmode={{ .Values.postgresql.sslmode | default "require" }}&connection_limit={{ .Values.api.dbConnectionLimit | default 5 }}"
  REDIS_URL: {{ include "openagentic.redis.url" . | quote }}
  REDIS_PASSWORD: {{ include "openagentic.redis.password" . | quote }}
---
# Application secrets (frontend, API, MCP)
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "openagentic.fullname" . }}-secrets
  labels:
    {{- include "openagentic.labels" . | nindent 4 }}
type: Opaque
{{- $existingSecrets := (lookup "v1" "Secret" .Release.Namespace (printf "%s-secrets" (include "openagentic.fullname" .))) }}
{{- $sd2 := dict }}
{{- if $existingSecrets }}{{- $sd2 = $existingSecrets.data | default dict }}{{- end }}
stringData:
  frontend-secret: {{ include "openagentic.secretOrGenerate" (dict "override" .Values.secrets.frontendSecret "data" $sd2 "key" "frontend-secret" "length" 32) | quote }}
  api-secret-key: {{ include "openagentic.secretOrGenerate" (dict "override" .Values.secrets.apiSecretKey "data" $sd2 "key" "api-secret-key" "length" 32) | quote }}
  signing-secret: {{ include "openagentic.secretOrGenerate" (dict "override" .Values.secrets.signingSecret "data" $sd2 "key" "signing-secret" "length" 32) | quote }}
  mcpServiceAuthKey: {{ include "openagentic.secretOrGenerate" (dict "override" .Values.secrets.mcpServiceAuthKey "data" $sd2 "key" "mcpServiceAuthKey" "length" 32) | quote }}
---
# API-specific secrets
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "openagentic.fullname" . }}-api-secrets
  labels:
    {{- include "openagentic.labels" . | nindent 4 }}
type: Opaque
{{- $existingApiSecrets := (lookup "v1" "Secret" .Release.Namespace (printf "%s-api-secrets" (include "openagentic.fullname" .))) }}
{{- $apiData := dict }}
{{- if $existingApiSecrets }}{{- $apiData = $existingApiSecrets.data | default dict }}{{- end }}
stringData:
  VAULT_TOKEN: {{ include "openagentic.secretOrGenerate" (dict "override" .Values.secrets.vaultToken "data" $apiData "key" "VAULT_TOKEN" "length" 32) | quote }}
  JWT_SECRET: {{ include "openagentic.secretOrGenerate" (dict "override" (.Values.secrets.jwtSecret | default .Values.security.jwtSecret) "data" $apiData "key" "JWT_SECRET" "length" 64) | quote }}
  API_SECRET_KEY: {{ include "openagentic.secretOrGenerate" (dict "override" (.Values.secrets.apiSecretKey | default .Values.security.apiSecretKey) "data" $apiData "key" "API_SECRET_KEY" "length" 32) | quote }}
  API_KEY: {{ include "openagentic.secretOrGenerate" (dict "override" .Values.secrets.apiKey "data" $apiData "key" "API_KEY" "length" 32) | quote }}
  SIGNING_SECRET: {{ include "openagentic.secretOrGenerate" (dict "override" (.Values.secrets.signingSecret | default .Values.security.signingSecret) "data" $apiData "key" "SIGNING_SECRET" "length" 32) | quote }}
  ADMIN_USER_PASSWORD: {{ .Values.secrets.adminUserPassword | default .Values.security.adminUserPassword | quote }}
  MILVUS_PASSWORD: {{ include "openagentic.secretOrGenerate" (dict "override" .Values.milvus.auth.password "data" $apiData "key" "MILVUS_PASSWORD" "length" 24) | quote }}
  MINIO_ACCESS_KEY: {{ include "openagentic.secretOrGenerate" (dict "override" .Values.secrets.minioAccessKey "data" $apiData "key" "MINIO_ACCESS_KEY" "length" 20) | quote }}
  MINIO_SECRET_KEY: {{ include "openagentic.secretOrGenerate" (dict "override" .Values.secrets.minioRootPassword "data" $apiData "key" "MINIO_SECRET_KEY" "length" 40) | quote }}
  CODE_MANAGER_INTERNAL_KEY: {{ include "openagentic.secretOrGenerate" (dict "override" .Values.secrets.codeManagerInternalKey "data" $apiData "key" "CODE_MANAGER_INTERNAL_KEY" "length" 32) | quote }}
  INTERNAL_SERVICE_SECRET: {{ include "openagentic.secretOrGenerate" (dict "override" .Values.secrets.internalServiceSecret "data" $apiData "key" "INTERNAL_SERVICE_SECRET" "length" 32) | quote }}
  OPENAGENTIC_PROXY_INTERNAL_KEY: {{ include "openagentic.secretOrGenerate" (dict "override" .Values.secrets.openagenticProxyInternalKey "data" $apiData "key" "OPENAGENTIC_PROXY_INTERNAL_KEY" "length" 32) | quote }}
  SERVICE_API_KEY: {{ include "openagentic.secretOrGenerate" (dict "override" .Values.secrets.serviceApiKey "data" $apiData "key" "SERVICE_API_KEY" "length" 64) | quote }}
  LOCAL_ENCRYPTION_KEY: {{ include "openagentic.secretOrGenerate" (dict "override" .Values.secrets.localEncryptionKey "data" $apiData "key" "LOCAL_ENCRYPTION_KEY" "length" 64) | quote }}
  # AWS Bedrock credentials (check both secrets section and aws.bedrock section)
  {{- $awsAccessKeyId := .Values.secrets.awsAccessKeyId | default .Values.aws.bedrock.accessKeyId }}
  {{- $awsSecretAccessKey := .Values.secrets.awsSecretAccessKey | default .Values.aws.bedrock.secretAccessKey }}
  {{- if $awsAccessKeyId }}
  AWS_ACCESS_KEY_ID: {{ $awsAccessKeyId | quote }}
  {{- end }}
  {{- if $awsSecretAccessKey }}
  AWS_SECRET_ACCESS_KEY: {{ $awsSecretAccessKey | quote }}
  {{- end }}
---
# Azure secrets
{{- if not .Values.externalSecrets.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "openagentic.fullname" . }}-azure-secrets
  labels:
    {{- include "openagentic.labels" . | nindent 4 }}
type: Opaque
stringData:
  AZURE_CLIENT_SECRET: {{ .Values.secrets.azureClientSecret | default "" | quote }}
{{- end }}
---
# Google OAuth secrets
{{- if not .Values.externalSecrets.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "openagentic.fullname" . }}-google-secrets
  labels:
    {{- include "openagentic.labels" . | nindent 4 }}
type: Opaque
stringData:
  GOOGLE_CLIENT_SECRET: {{ .Values.secrets.googleClientSecret | default "" | quote }}
{{- end }}
---
# GCP secrets (for Vertex AI)
{{- if not .Values.externalSecrets.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "openagentic.fullname" . }}-gcp-secrets
  labels:
    {{- include "openagentic.labels" . | nindent 4 }}
type: Opaque
stringData:
  service-account.json: {{ .Values.secrets.gcpServiceAccountJson | default "{}" | quote }}
{{- end }}
---
# GitHub OAuth secrets (for GitHub MCP)
{{- if and (not .Values.externalSecrets.enabled) .Values.auth.github .Values.auth.github.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "openagentic.fullname" . }}-github-secrets
  labels:
    {{- include "openagentic.labels" . | nindent 4 }}
type: Opaque
stringData:
  GITHUB_CLIENT_SECRET: {{ .Values.secrets.githubClientSecret | default "" | quote }}
  GITHUB_ENCRYPTION_KEY: {{ .Values.secrets.githubEncryptionKey | default (randAlphaNum 32) | quote }}
{{- end }}
