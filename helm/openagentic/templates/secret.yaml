{{- /*
  Secret values are REQUIRED — no weak defaults. An unset value aborts
  `helm install` with the message below (mirrors docker-compose's ${VAR:?}).
  `./install.sh --helm` generates + persists strong random values; or supply
  your own overlay (`-f my-secrets.yaml`, each value `openssl rand -hex 32`).
*/ -}}
{{- $pgPass    := required "secrets.postgresPassword is required — run `./install.sh --helm` or pass -f with an `openssl rand -hex 16` value" .Values.secrets.postgresPassword -}}
{{- $jwt       := required "secrets.jwtSecret is required — run `./install.sh --helm` or pass -f with an `openssl rand -hex 32` value" .Values.secrets.jwtSecret -}}
{{- $signing   := required "secrets.signingSecret is required — run `./install.sh --helm` or pass -f with an `openssl rand -hex 32` value" .Values.secrets.signingSecret -}}
{{- $internal  := required "secrets.internalApiKey is required — run `./install.sh --helm` or pass -f with an `openssl rand -hex 32` value" .Values.secrets.internalApiKey -}}
{{- $frontend  := required "secrets.frontendSecret is required — run `./install.sh --helm` or pass -f with an `openssl rand -hex 32` value" .Values.secrets.frontendSecret -}}
{{- $adminPass := required "secrets.adminPassword is required — run `./install.sh --helm` or set it (the first-boot admin login password)" .Values.secrets.adminPassword -}}
apiVersion: v1
kind: Secret
metadata:
  name: openagentic-secrets
  labels:
    {{- include "openagentic.labels" . | nindent 4 }}
type: Opaque
stringData:
  POSTGRES_PASSWORD: {{ $pgPass | quote }}
  DATABASE_URL: "postgresql://openagentic:{{ $pgPass }}@postgres:5432/openagentic"
  JWT_SECRET: {{ $jwt | quote }}
  SIGNING_SECRET: {{ $signing | quote }}
  INTERNAL_API_KEY: {{ $internal | quote }}
  # The api↔mcp-proxy service-to-service auth reads API_INTERNAL_KEY (both
  # sides compare against this exact name). Keep it equal to INTERNAL_API_KEY.
  API_INTERNAL_KEY: {{ $internal | quote }}
  # The in-process tool_search → /api/internal/tool-search call authenticates
  # with INTERNAL_SERVICE_SECRET (sender + route compare the same value). Must
  # be non-empty or the route fail-closes (401) and MCP discovery breaks.
  INTERNAL_SERVICE_SECRET: {{ $internal | quote }}
  # api → openagentic-proxy (sub-agent dispatch) service-to-service auth. The api
  # constructs OpenAgenticProxyClient with this; the proxy's authMiddleware compares
  # Bearer ${OPENAGENTIC_PROXY_INTERNAL_KEY} + header x-openagentic-proxy:true. Both
  # sides read this exact env name — keep equal. Without it, Task/sub-agent dispatch
  # fail-closes ("OpenAgenticProxyClient unavailable").
  OPENAGENTIC_PROXY_INTERNAL_KEY: {{ $internal | quote }}
  FRONTEND_SECRET: {{ $frontend | quote }}
  ADMIN_SEED_PASSWORD: {{ $adminPass | quote }}
  {{- if .Values.secrets.awsAccessKeyId }}
  # AWS creds for the Bedrock provider (Claude on Bedrock). Picked up by the
  # BedrockRuntimeClient via the AWS SDK default credential chain (env).
  AWS_ACCESS_KEY_ID: {{ .Values.secrets.awsAccessKeyId | quote }}
  AWS_SECRET_ACCESS_KEY: {{ .Values.secrets.awsSecretAccessKey | quote }}
  AWS_REGION: {{ .Values.secrets.awsRegion | default "us-east-1" | quote }}
  AWS_DEFAULT_REGION: {{ .Values.secrets.awsRegion | default "us-east-1" | quote }}
  {{- end }}
  {{- if ne .Values.auth.provider "local" }}
  # Entra app-reg client secret — powers BOTH Entra login (AZURE_AD_CLIENT_SECRET)
  # and Azure OBO (AZURE_CLIENT_SECRET); same app reg → same value. Required when
  # auth.provider != local.
  {{- $azSecret := required "secrets.azureClientSecret is required when auth.provider != local — set it (the Entra app-reg client secret) in your overlay" .Values.secrets.azureClientSecret }}
  AZURE_AD_CLIENT_SECRET: {{ $azSecret | quote }}
  AZURE_CLIENT_SECRET: {{ $azSecret | quote }}
  {{- with .Values.secrets.gcpOauthClientSecret }}
  GCP_OAUTH_CLIENT_SECRET: {{ . | quote }}
  {{- end }}
  {{- with .Values.secrets.gcpTokenEncryptionKey }}
  GCP_TOKEN_ENCRYPTION_KEY: {{ . | quote }}
  {{- end }}
  {{- end }}
