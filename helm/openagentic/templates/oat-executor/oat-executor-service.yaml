

{{- if and .Values.oat.enabled .Values.oat.executor.enabled }}
# ===================================================================================================
# OAT EXECUTOR SERVICE
# ===================================================================================================
# ClusterIP service for OAT Executor - only accessible within the cluster
# Only openagentic-api should be calling this service
# ===================================================================================================
apiVersion: v1
kind: Service
metadata:
  name: {{ include "openagentic.fullname" . }}-openagentic-synth
  labels:
    {{- include "openagentic.labels" . | nindent 4 }}
    app.kubernetes.io/component: openagentic-synth
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.oat.executor.config.port | default 8090 }}
      targetPort: {{ .Values.oat.executor.config.port | default 8090 }}
      protocol: TCP
      name: http
  selector:
    {{- include "openagentic.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: openagentic-synth
{{- end }}
