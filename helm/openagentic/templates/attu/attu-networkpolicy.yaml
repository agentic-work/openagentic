

{{- if and .Values.attu.enabled (.Values.attu.networkPolicy).enabled }}
# ===================================================================================================
# ATTU NETWORK POLICY
# ===================================================================================================
# Restricts network access for security:
# - Ingress: Only from UI (nginx proxy) for admin access
# - Egress: DNS, Milvus only
# ===================================================================================================
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "openagentic.fullname" . }}-attu
  labels:
    {{- include "openagentic.labels" . | nindent 4 }}
    app.kubernetes.io/component: attu
spec:
  podSelector:
    matchLabels:
      {{- include "openagentic.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: attu
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow from UI (nginx proxies /attu/ to Attu)
    - from:
        - podSelector:
            matchLabels:
              {{- include "openagentic.selectorLabels" . | nindent 14 }}
              app.kubernetes.io/component: ui
      ports:
        - protocol: TCP
          port: {{ .Values.attu.service.port | default 3000 }}
    # Allow from Ingress controller
    - from:
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              app.kubernetes.io/name: ingress-nginx
      ports:
        - protocol: TCP
          port: {{ .Values.attu.service.port | default 3000 }}
  egress:
    # DNS
    - to:
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Milvus
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: milvus
      ports:
        - protocol: TCP
          port: 19530
{{- end }}
