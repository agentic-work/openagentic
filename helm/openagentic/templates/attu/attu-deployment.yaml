# Proprietary and confidential. Unauthorized copying prohibited.

{{- if .Values.attu.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "openagentic.fullname" . }}-attu
  labels:
    {{- include "openagentic.labels" . | nindent 4 }}
    app.kubernetes.io/component: attu
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "openagentic.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: attu
  template:
    metadata:
      labels:
        {{- include "openagentic.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: attu
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.attu.nodeSelector | default .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: attu
          image: "{{ .Values.attu.image.repository }}:{{ .Values.attu.image.tag }}"
          imagePullPolicy: {{ .Values.attu.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          env:
            - name: MILVUS_URL
              value: "http://{{ include "openagentic.milvus.serviceName" . }}:{{ include "openagentic.milvus.port" . }}"
            # Set base URL for subpath hosting behind nginx reverse proxy
            - name: HOST_URL
              value: "/attu"
          resources:
            {{- toYaml .Values.attu.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
{{- end }}
