

{{- if and .Values.synth.enabled .Values.synth.executor.enabled .Values.synth.executor.autoscaling.enabled }}
# ===================================================================================================
# SYNTH EXECUTOR HORIZONTAL POD AUTOSCALER
# ===================================================================================================
# Scales synth-executor pods based on CPU and memory utilization
# - Scales up aggressively for quick response to load
# - Scales down conservatively to avoid thrashing
# ===================================================================================================
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "openagentic.fullname" . }}-synth-executor-hpa
  labels:
    {{- include "openagentic.labels" . | nindent 4 }}
    app.kubernetes.io/component: synth-executor
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "openagentic.fullname" . }}-synth-executor
  minReplicas: {{ .Values.synth.executor.autoscaling.minReplicas | default 2 }}
  maxReplicas: {{ .Values.synth.executor.autoscaling.maxReplicas | default 20 }}
  metrics:
    # Scale based on CPU
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.synth.executor.autoscaling.targetCPUUtilizationPercentage | default 70 }}
    # Scale based on memory
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: {{ .Values.synth.executor.autoscaling.targetMemoryUtilizationPercentage | default 80 }}
  behavior:
    scaleUp:
      stabilizationWindowSeconds: {{ .Values.synth.executor.autoscaling.scaleUpStabilizationSeconds | default 30 }}
      policies:
        - type: Pods
          value: 4
          periodSeconds: 30
        - type: Percent
          value: 100
          periodSeconds: 30
      selectPolicy: Max
    scaleDown:
      stabilizationWindowSeconds: {{ .Values.synth.executor.autoscaling.scaleDownStabilizationSeconds | default 300 }}
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
      selectPolicy: Min
{{- end }}
