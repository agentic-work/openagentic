{{- if and .Values.awpAdminMcp.enabled (.Values.awpAdminMcp.networkPolicy).enabled }}
# ===================================================================================================
# OpenAgentic-ADMIN-MCP NETWORK POLICY
# ===================================================================================================
# Restricts network access for security:
# - Ingress: Only from MCP Proxy
# - Egress: DNS, API, PostgreSQL
# ===================================================================================================
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "openagentic.fullname" . }}-oap-admin-mcp
  labels:
    {{- include "openagentic.labels" . | nindent 4 }}
    app.kubernetes.io/component: oap-admin-mcp
spec:
  podSelector:
    matchLabels:
      {{- include "openagentic.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: oap-admin-mcp
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow from MCP Proxy
    - from:
        - podSelector:
            matchLabels:
              {{- include "openagentic.selectorLabels" . | nindent 14 }}
              app.kubernetes.io/component: mcp-proxy
      ports:
        - protocol: TCP
          port: {{ .Values.awpAdminMcp.service.port | default 8083 }}
    {{- if .Values.grafana.enabled }}
    # Allow Prometheus to scrape /metrics
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.grafana.namespace }}
          podSelector:
            matchLabels:
              app: prometheus
      ports:
        - protocol: TCP
          port: 8083
    {{- end }}
  egress:
    # DNS
    - to:
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # API (for internal OpenAgentic API calls)
    - to:
        - podSelector:
            matchLabels:
              {{- include "openagentic.selectorLabels" . | nindent 14 }}
              app.kubernetes.io/component: api
      ports:
        - protocol: TCP
          port: {{ .Values.api.service.port | default 8000 }}
    # PostgreSQL (Bitnami subchart)
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: postgresql
      ports:
        - protocol: TCP
          port: 5432
    # PostgreSQL (built-in postgres deployment)
    - to:
        - podSelector:
            matchLabels:
              {{- include "openagentic.selectorLabels" . | nindent 14 }}
              app.kubernetes.io/component: postgres
      ports:
        - protocol: TCP
          port: 5432
    # Redis (Bitnami subchart) — admin MCP needs RO access for system observability
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: redis
      ports:
        - protocol: TCP
          port: 6379
    # Milvus (standalone) — admin MCP needs RO access for collection inspection
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: milvus
      ports:
        - protocol: TCP
          port: 19530
{{- end }}
