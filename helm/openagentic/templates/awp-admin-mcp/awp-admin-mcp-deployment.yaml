# Proprietary and confidential. Unauthorized copying prohibited.

{{- if .Values.awpAdminMcp.enabled }}
# ===================================================================================================
# OpenAgentic-ADMIN-MCP DEPLOYMENT
# ===================================================================================================
# Admin/system management MCP server (Python FastAPI)
# Provides admin tools, system configuration, and platform management capabilities
# ===================================================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "openagentic.fullname" . }}-oap-admin-mcp
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "openagentic.labels" . | nindent 4 }}
    app.kubernetes.io/component: oap-admin-mcp
spec:
  replicas: {{ .Values.awpAdminMcp.replicas | default 1 }}
  selector:
    matchLabels:
      {{- include "openagentic.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: oap-admin-mcp
  template:
    metadata:
      labels:
        {{- include "openagentic.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: oap-admin-mcp
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: {{ .Values.awpAdminMcp.service.port | default 8083 | quote }}
        prometheus.io/path: "/metrics"
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.awpAdminMcp.nodeSelector | default .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      # Fix DNS: ndots:1 ensures external domains are tried as FQDN first
      dnsConfig:
        options:
          - name: ndots
            value: "1"
      containers:
      - name: oap-admin-mcp
        image: "{{ .Values.awpAdminMcp.image.repository }}:{{ .Values.awpAdminMcp.image.tag | default .Chart.AppVersion }}"
        imagePullPolicy: {{ .Values.awpAdminMcp.image.pullPolicy | default "IfNotPresent" }}
        ports:
        - name: http
          containerPort: {{ .Values.awpAdminMcp.service.port | default 8083 }}
          protocol: TCP
        env:
        - name: PORT
          value: {{ .Values.awpAdminMcp.service.port | default 8083 | quote }}
        - name: LOG_LEVEL
          value: {{ .Values.awpAdminMcp.logLevel | default "INFO" | quote }}
        # IMPORTANT: POSTGRES_PASSWORD must come BEFORE DATABASE_URL for $(POSTGRES_PASSWORD) substitution
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ include "openagentic.fullname" . }}-db-secrets
              key: POSTGRES_PASSWORD
        - name: DATABASE_URL
          value: "postgresql://{{ include "openagentic.postgresql.username" . }}:$(POSTGRES_PASSWORD)@{{ include "openagentic.postgresql.serviceName" . }}:5432/{{ include "openagentic.postgresql.database" . }}?sslmode={{ .Values.postgresql.sslmode | default "require" }}"
        # IMPORTANT: REDIS_PASSWORD must come BEFORE REDIS_URL for $(REDIS_PASSWORD) substitution
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ .Release.Name }}-redis
              key: redis-password
        - name: REDIS_URL
          value: "redis://:$(REDIS_PASSWORD)@{{ include "openagentic.redis.serviceName" . }}:6379"
        - name: REDIS_HOST
          value: "{{ include "openagentic.redis.serviceName" . }}"
        - name: REDIS_PORT
          value: "6379"
        - name: MILVUS_HOST
          value: "{{ include "openagentic.milvus.serviceName" . }}"
        - name: MILVUS_PORT
          value: {{ include "openagentic.milvus.port" . | quote }}
        # Extra environment variables
        {{- if .Values.awpAdminMcp.env }}
        {{- range $key, $value := .Values.awpAdminMcp.env }}
        - name: {{ $key }}
          value: {{ $value | quote }}
        {{- end }}
        {{- end }}
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: {{ .Values.awpAdminMcp.livenessProbe.initialDelaySeconds | default 10 }}
          periodSeconds: {{ .Values.awpAdminMcp.livenessProbe.periodSeconds | default 30 }}
          timeoutSeconds: {{ .Values.awpAdminMcp.livenessProbe.timeoutSeconds | default 5 }}
          failureThreshold: {{ .Values.awpAdminMcp.livenessProbe.failureThreshold | default 3 }}
        readinessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: {{ .Values.awpAdminMcp.readinessProbe.initialDelaySeconds | default 5 }}
          periodSeconds: {{ .Values.awpAdminMcp.readinessProbe.periodSeconds | default 10 }}
          timeoutSeconds: {{ .Values.awpAdminMcp.readinessProbe.timeoutSeconds | default 5 }}
          failureThreshold: {{ .Values.awpAdminMcp.readinessProbe.failureThreshold | default 3 }}
        resources:
          {{- toYaml .Values.awpAdminMcp.resources | nindent 12 }}
{{- end }}
