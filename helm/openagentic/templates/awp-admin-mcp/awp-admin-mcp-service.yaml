

{{- if .Values.awpAdminMcp.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "openagentic.fullname" . }}-oap-admin-mcp
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "openagentic.labels" . | nindent 4 }}
    app.kubernetes.io/component: oap-admin-mcp
spec:
  type: {{ .Values.awpAdminMcp.service.type | default "ClusterIP" }}
  ports:
    - port: {{ .Values.awpAdminMcp.service.port | default 8083 }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "openagentic.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: oap-admin-mcp
{{- end }}
