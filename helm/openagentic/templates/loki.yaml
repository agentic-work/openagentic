{{- if .Values.loki.enabled }}
# Loki + promtail — log aggregation backing the built-in loki MCP. The mcp-proxy
# is pointed at the in-cluster loki service (LOKI_URL=http://loki:3100); promtail
# (DaemonSet) ships every pod's logs in so LogQL queries work on a fresh install.
apiVersion: v1
kind: ConfigMap
metadata:
  name: loki-config
  labels:
    {{- include "openagentic.labels" . | nindent 4 }}
data:
  loki-config.yaml: |
    auth_enabled: false
    server:
      http_listen_port: 3100
      grpc_listen_port: 9096
      log_level: warn
    common:
      instance_addr: 127.0.0.1
      path_prefix: /loki
      storage:
        filesystem:
          chunks_directory: /loki/chunks
          rules_directory: /loki/rules
      replication_factor: 1
      ring:
        kvstore:
          store: inmemory
    schema_config:
      configs:
        - from: 2024-01-01
          store: tsdb
          object_store: filesystem
          schema: v13
          index:
            prefix: index_
            period: 24h
    limits_config:
      reject_old_samples: false
      allow_structured_metadata: true
      retention_period: {{ .Values.loki.retention | default "168h" }}
    compactor:
      working_directory: /loki/compactor
      delete_request_store: filesystem
      retention_enabled: true
    analytics:
      reporting_enabled: false
---
apiVersion: v1
kind: Service
metadata:
  name: loki
  labels:
    {{- include "openagentic.labels" . | nindent 4 }}
spec:
  selector:
    app: loki
  ports:
    - port: 3100
      targetPort: 3100
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: loki
  labels:
    {{- include "openagentic.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: loki
  template:
    metadata:
      labels:
        app: loki
    spec:
      enableServiceLinks: false
      {{- include "openagentic.podSecurityContext" (dict "root" . "name" "loki") | nindent 6 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: loki
          image: {{ .Values.loki.image | default "grafana/loki:3.4.2" }}
          {{- include "openagentic.securityContext" (dict "root" $ "name" "loki") | nindent 10 }}
          args:
            - -config.file=/etc/loki/loki-config.yaml
          ports:
            - containerPort: 3100
          volumeMounts:
            - name: config
              mountPath: /etc/loki
            - name: data
              mountPath: /loki
          readinessProbe:
            httpGet:
              path: /ready
              port: 3100
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            {{- toYaml (.Values.resources.loki | default dict) | nindent 12 }}
      volumes:
        - name: config
          configMap:
            name: loki-config
        - name: data
          {{- if .Values.loki.persistence }}
          persistentVolumeClaim:
            claimName: loki-data
          {{- else }}
          emptyDir: {}
          {{- end }}
{{- if .Values.loki.persistence }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: loki-data
  labels:
    {{- include "openagentic.labels" . | nindent 4 }}
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: {{ .Values.loki.storageSize | default "8Gi" }}
{{- end }}
{{- if .Values.loki.shipLogs }}
---
# Promtail — DaemonSet reading every node's pod logs and shipping them to Loki.
# Runs as root with hostPath /var/log to read containerd/docker pod logs; uses a
# read-only SA so kubernetes_sd can label streams by namespace/pod/container.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: promtail
  labels:
    {{- include "openagentic.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ .Release.Name }}-promtail
  labels:
    {{- include "openagentic.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["nodes", "nodes/proxy", "services", "endpoints", "pods"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ .Release.Name }}-promtail
  labels:
    {{- include "openagentic.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ .Release.Name }}-promtail
subjects:
  - kind: ServiceAccount
    name: promtail
    namespace: {{ .Release.Namespace }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: promtail-config
  labels:
    {{- include "openagentic.labels" . | nindent 4 }}
data:
  promtail-config.yaml: |
    server:
      http_listen_port: 9080
      grpc_listen_port: 0
      log_level: warn
    positions:
      filename: /run/promtail/positions.yaml
    clients:
      - url: http://loki:3100/loki/api/v1/push
    scrape_configs:
      - job_name: kubernetes-pods
        kubernetes_sd_configs:
          - role: pod
        pipeline_stages:
          - cri: {}
        relabel_configs:
          - source_labels: [__meta_kubernetes_namespace]
            target_label: namespace
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: pod
          - source_labels: [__meta_kubernetes_pod_container_name]
            target_label: container
          - source_labels: [__meta_kubernetes_pod_label_app]
            target_label: app
          - source_labels: [__meta_kubernetes_pod_uid, __meta_kubernetes_pod_container_name]
            separator: /
            target_label: __path__
            replacement: /var/log/pods/*$1/*.log
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: promtail
  labels:
    {{- include "openagentic.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      app: promtail
  template:
    metadata:
      labels:
        app: promtail
    spec:
      serviceAccountName: promtail
      enableServiceLinks: false
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: promtail
          image: {{ .Values.loki.promtailImage | default "grafana/promtail:3.4.2" }}
          args:
            - -config.file=/etc/promtail/promtail-config.yaml
          securityContext:
            runAsUser: 0
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
          env:
            - name: HOSTNAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          volumeMounts:
            - name: config
              mountPath: /etc/promtail
            - name: run
              mountPath: /run/promtail
            - name: pods
              mountPath: /var/log/pods
              readOnly: true
          resources:
            requests: { cpu: "50m", memory: "64Mi" }
            limits: { memory: "256Mi" }
      volumes:
        - name: config
          configMap:
            name: promtail-config
        - name: run
          emptyDir: {}
        - name: pods
          hostPath:
            path: /var/log/pods
{{- end }}
{{- end }}
