

{{- if .Values.vault.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "openagentic.fullname" . }}-vault
  labels:
    {{- include "openagentic.labels" . | nindent 4 }}
    app.kubernetes.io/component: vault
spec:
  replicas: {{ .Values.vault.replicas }}
  selector:
    matchLabels:
      {{- include "openagentic.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: vault
  template:
    metadata:
      labels:
        {{- include "openagentic.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: vault
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8200"
        prometheus.io/path: "/v1/sys/metrics"
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        fsGroup: 1000
      containers:
      - name: vault
        image: "{{ .Values.vault.image.repository }}:{{ .Values.vault.image.tag }}"
        imagePullPolicy: {{ .Values.vault.image.pullPolicy }}
        ports:
        - containerPort: 8200
          name: vault
          protocol: TCP
        env:
        - name: VAULT_DEV_ROOT_TOKEN_ID
          value: {{ .Values.vault.devRootToken | quote }}
        - name: VAULT_DEV_LISTEN_ADDRESS
          value: "0.0.0.0:8200"
        - name: VAULT_ADDR
          value: "http://127.0.0.1:8200"
        - name: VAULT_API_ADDR
          value: "http://vault:8200"
        resources:
          {{- toYaml .Values.vault.resources | nindent 10 }}
        volumeMounts:
        - name: vault-data
          mountPath: /vault/file
        livenessProbe:
          httpGet:
            path: /v1/sys/health
            port: 8200
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /v1/sys/health?standbyok=true
            port: 8200
          initialDelaySeconds: 10
          periodSeconds: 5
      volumes:
      - name: vault-data
        {{- if .Values.vault.persistence.enabled }}
        persistentVolumeClaim:
          claimName: {{ include "openagentic.fullname" . }}-vault
        {{- else }}
        emptyDir: {}
        {{- end }}
{{- end }}