# Proprietary and confidential. Unauthorized copying prohibited.

{{- if or (and .Values.postgres .Values.postgres.enabled) .Values.postgresql.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "openagentic.fullname" . }}-postgres-init
  labels:
    {{- include "openagentic.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
data:
  00-init.sql: |
    -- Enable required PostgreSQL extensions for OpenAgentic data layer

    -- pgvector: Vector similarity search for ACID-compliant transactional embeddings
    CREATE EXTENSION IF NOT EXISTS vector;

    -- pg_trgm: Fuzzy text search for semantic matching
    CREATE EXTENSION IF NOT EXISTS pg_trgm;

    -- btree_gin: Composite indexes for complex queries
    CREATE EXTENSION IF NOT EXISTS btree_gin;
{{- end }}