# Proprietary and confidential. Unauthorized copying prohibited.

apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "openagentic.fullname" . }}-api
  labels:
    {{- include "openagentic.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  replicas: {{ .Values.api.replicas }}
  selector:
    matchLabels:
      {{- include "openagentic.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        {{- include "openagentic.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "{{ .Values.api.service.port }}"
        prometheus.io/path: "/metrics"
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "openagentic.serviceAccountName" . }}
      # SECURITY: Disable SA token mount — API does not need K8s API access
      automountServiceAccountToken: false
      {{- with .Values.api.nodeSelector | default .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.api.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.api.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      # Fix DNS: ndots:1 ensures external domains are tried as FQDN first (gnomuslabs.com wildcard)
      dnsConfig:
        options:
          - name: ndots
            value: "1"
      terminationGracePeriodSeconds: 60
      securityContext:
        {{- toYaml .Values.api.podSecurityContext | nindent 8 }}
      initContainers:
      - name: wait-for-postgres
        image: {{ .Values.initContainer.image | default "busybox:1.36.1" }}
        command: ['sh', '-c', 'until nc -z {{ include "openagentic.postgresql.serviceName" . }} {{ include "openagentic.postgresql.port" . }}; do echo waiting for postgres; sleep 2; done']
      containers:
      - name: api
        image: "{{ .Values.api.image.repository }}:{{ .Values.api.image.tag | default .Chart.AppVersion }}"
        imagePullPolicy: {{ .Values.api.image.pullPolicy }}
        ports:
        - containerPort: {{ .Values.api.service.port }}
          name: http
        env:
        - name: NODE_ENV
          value: {{ .Values.global.environment | quote }}
        - name: UNIFIED_STREAM
          value: "true"
        - name: PORT
          value: "{{ .Values.api.service.port }}"
        # ═══════════════════════════════════════════════════════════════════════════════
        # PIPELINE MODE - Controls TTFT optimization
        # 'blocking' (default): Wait for RAG/MCP before streaming
        # 'nonblocking': Start streaming immediately (1-3s TTFT target)
        # ═══════════════════════════════════════════════════════════════════════════════
        - name: PIPELINE_MODE
          value: {{ .Values.api.env.PIPELINE_MODE | default "blocking" | quote }}
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: {{ include "openagentic.fullname" . }}-db-secrets
              key: DATABASE_URL
        - name: REDIS_URL
          value: "{{ include "openagentic.redis.url" . }}"
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ .Release.Name }}-redis
              key: redis-password
        - name: MILVUS_ADDRESS
          value: "{{ include "openagentic.milvus.serviceName" . }}:{{ include "openagentic.milvus.port" . }}"
        - name: MILVUS_HEALTH_URL
          value: "http://{{ include "openagentic.milvus.serviceName" . }}:9091/healthz"
        # Code Manager configuration
        - name: CODE_MANAGER_URL
          value: "http://{{ include "openagentic.fullname" . }}-code-manager:{{ .Values.codeManager.service.port | default 3050 }}"
        - name: OPENAGENTIC_MANAGER_URL
          value: "http://{{ include "openagentic.fullname" . }}-code-manager:{{ .Values.codeManager.service.port | default 3050 }}"
        # SECURITY: Internal API key for code-manager authentication
        # Only the API should be able to access the code-manager service
        - name: CODE_MANAGER_INTERNAL_KEY
          valueFrom:
            secretKeyRef:
              {{- if .Values.azureKeyVault.enabled }}
              name: {{ include "openagentic.fullname" . }}-keyvault-secrets
              {{- else }}
              name: {{ include "openagentic.fullname" . }}-api-secrets
              {{- end }}
              key: CODE_MANAGER_INTERNAL_KEY
        # GhostPilot deployment toggle — feeds the default for the codemode admin setting
        - name: GHOSTPILOT_DEPLOYMENT_ENABLED
          value: {{ .Values.codeManager.ghostpilot.enabled | default false | quote }}
        # Agent Proxy configuration
        {{- if .Values.openagenticProxy.enabled }}
        - name: OPENAGENTIC_PROXY_URL
          value: "http://{{ include "openagentic.fullname" . }}-openagentic-proxy:{{ .Values.openagenticProxy.service.port | default 3300 }}"
        - name: OPENAGENTIC_PROXY_INTERNAL_KEY
          valueFrom:
            secretKeyRef:
              name: {{ include "openagentic.fullname" . }}-api-secrets
              key: OPENAGENTIC_PROXY_INTERNAL_KEY
        {{- end }}
        # Workflow Execution Service
        {{- if .Values.workflows.enabled }}
        - name: WORKFLOW_SERVICE_URL
          value: "http://{{ include "openagentic.fullname" . }}-workflows:{{ .Values.workflows.service.port | default 3400 }}"
        {{- end }}
        # MCP Proxy configuration
        - name: MCP_PROXY_ENABLED
          value: {{ .Values.mcpProxy.enabled | default false | quote }}
        - name: MCP_PROXY_URL
          value: "http://{{ include "openagentic.fullname" . }}-mcp-proxy:{{ .Values.mcpProxy.service.port | default 8080 }}"
        - name: MCP_PROXY_HOST
          value: "{{ include "openagentic.fullname" . }}-mcp-proxy"
        - name: MCP_PROXY_PORT
          value: "{{ .Values.mcpProxy.service.port | default 8080 }}"
        # MCP Inspector MCPP port for WebSocket proxy
        - name: MCP_INSPECTOR_MCPP_PORT
          value: "6277"
        # ═══════════════════════════════════════════════════════════════════════════════
        # OAT (On-demand Agent Tooling) / Synth Configuration
        # SynthService reads SYNTH_* env vars
        # ═══════════════════════════════════════════════════════════════════════════════
        - name: OAT_ENABLED
          value: {{ .Values.oat.enabled | default false | quote }}
        - name: SYNTH_ENABLED
          value: {{ .Values.oat.enabled | default false | quote }}
        {{- if .Values.oat.enabled }}
        - name: SYNTH_LLM_PROVIDER
          value: {{ .Values.oat.llmProvider | default "auto" | quote }}
        - name: SYNTH_LLM_MODEL
          value: {{ .Values.oat.llmModel | default "" | quote }}
        - name: SYNTH_MAX_TIMEOUT_SECONDS
          value: {{ .Values.oat.maxTimeoutSeconds | default 60 | quote }}
        - name: SYNTH_MAX_CONCURRENT_EXECUTIONS
          value: {{ .Values.oat.maxConcurrentExecutions | default 10 | quote }}
        - name: SYNTH_MAX_DAILY_SYNTHESES
          value: {{ .Values.oat.maxDailySyntheses | default 1000 | quote }}
        - name: SYNTH_AUTO_APPROVE_LOW_RISK
          value: {{ .Values.oat.autoApproveLowRisk | default true | quote }}
        - name: SYNTH_AUTO_APPROVE_MEDIUM_RISK
          value: {{ .Values.oat.autoApproveMediumRisk | default true | quote }}
        - name: SYNTH_CREDENTIAL_SOURCE
          value: {{ .Values.oat.credentialSource | default "sso_only" | quote }}
        {{- if and .Values.oat.executor.enabled }}
        - name: SYNTH_EXECUTOR_URL
          value: "http://{{ include "openagentic.fullname" . }}-openagentic-synth:{{ .Values.oat.executor.config.port | default 8090 }}"
        - name: OAT_EXECUTOR_URL
          value: "http://{{ include "openagentic.fullname" . }}-openagentic-synth:{{ .Values.oat.executor.config.port | default 8090 }}"
        {{- end }}
        {{- end }}
        {{- if .Values.vault.enabled }}
        - name: VAULT_ADDRESS
          value: "http://{{ include "openagentic.fullname" . }}-vault:8200"
        - name: VAULT_ENABLED
          value: "true"
        {{- end }}
        # VAULT_TOKEN always injected (secrets.config.ts validates it)
        - name: VAULT_TOKEN
          valueFrom:
            secretKeyRef:
              name: {{ include "openagentic.fullname" . }}-api-secrets
              key: VAULT_TOKEN
        # LOCAL_ENCRYPTION_KEY for auth_config credential encryption (AES-256-CBC)
        - name: LOCAL_ENCRYPTION_KEY
          valueFrom:
            secretKeyRef:
              name: {{ include "openagentic.fullname" . }}-api-secrets
              key: LOCAL_ENCRYPTION_KEY
        # Milvus + embeddings are MANDATORY — no skip flags
        - name: FRONTEND_URL
          value: {{ .Values.api.frontendUrl | quote }}
        - name: ALLOWED_ORIGINS
          value: {{ .Values.api.corsOrigins | quote }}
        - name: HOST
          value: "0.0.0.0"
        - name: POSTGRES_HOST
          value: "{{ include "openagentic.postgresql.serviceName" . }}"
        - name: POSTGRES_PORT
          value: "{{ include "openagentic.postgresql.port" . }}"
        - name: POSTGRES_USER
          value: {{ include "openagentic.postgresql.username" . | quote }}
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ include "openagentic.fullname" . }}-db-secrets
              key: POSTGRES_PASSWORD
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ include "openagentic.fullname" . }}-db-secrets
              key: POSTGRES_PASSWORD
        - name: POSTGRES_DB
          value: {{ include "openagentic.postgresql.database" . | quote }}
        - name: POSTGRES_URL
          valueFrom:
            secretKeyRef:
              name: {{ include "openagentic.fullname" . }}-db-secrets
              key: DATABASE_URL
        - name: REDIS_HOST
          value: "{{ include "openagentic.redis.serviceName" . }}"
        - name: REDIS_PORT
          value: "{{ include "openagentic.redis.port" . }}"
        - name: MILVUS_HOST
          value: "{{ include "openagentic.milvus.serviceName" . }}"
        - name: MILVUS_PORT
          value: "{{ include "openagentic.milvus.port" . }}"
        - name: MILVUS_TIMEOUT
          value: "120000"
        # Azure AD Authentication - Consolidated
        - name: AAD_CLIENT_ID
          value: {{ .Values.auth.azure.clientId | quote }}
        - name: AAD_AUTHORITY
          value: {{ .Values.auth.azure.authority | quote }}
        - name: AAD_REDIRECT_URI
          value: {{ .Values.auth.azure.redirectUri | quote }}
        - name: AZURE_AD_AUTHORIZED_GROUPS
          value: {{ printf "%s,%s" .Values.auth.azure.authorizedUserGroups .Values.auth.azure.authorizedAdminGroups | quote }}
        # Security Secrets
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              {{- if .Values.azureKeyVault.enabled }}
              name: {{ include "openagentic.fullname" . }}-keyvault-secrets
              {{- else }}
              name: {{ include "openagentic.fullname" . }}-api-secrets
              {{- end }}
              key: JWT_SECRET
        # Cookie security - set to "false" for local k8s without TLS (HTTP)
        - name: SECURE_COOKIES
          value: {{ .Values.api.secureCookies | default "true" | quote }}
        - name: API_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: {{ include "openagentic.fullname" . }}-api-secrets
              key: API_SECRET_KEY
        # MCPProxyClient uses API_INTERNAL_KEY as Bearer for mcp-proxy.
        - name: API_INTERNAL_KEY
          valueFrom:
            secretKeyRef:
              name: {{ include "openagentic.fullname" . }}-api-secrets
              key: API_SECRET_KEY
        - name: WORKFLOW_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: {{ include "openagentic.fullname" . }}-api-secrets
              key: WORKFLOW_SECRET_KEY
              optional: true
        {{- if and .Values.vault.enabled .Values.externalSecrets.enabled }}
        - name: VAULT_ADDR
          value: {{ .Values.externalSecrets.vault.server | quote }}
        - name: VAULT_TOKEN
          valueFrom:
            secretKeyRef:
              name: {{ include "openagentic.fullname" . }}-vault-token
              key: token
        - name: VAULT_TRANSIT_ENABLED
          value: "true"
        {{- end }}
        - name: JWT_AUTH_TOKEN_SECRET
          valueFrom:
            secretKeyRef:
              {{- if .Values.azureKeyVault.enabled }}
              name: {{ include "openagentic.fullname" . }}-keyvault-secrets
              {{- else }}
              name: {{ include "openagentic.fullname" . }}-api-secrets
              {{- end }}
              key: JWT_SECRET
        - name: API_KEY
          valueFrom:
            secretKeyRef:
              name: {{ include "openagentic.fullname" . }}-api-secrets
              key: API_KEY
        - name: FRONTEND_SECRET
          value: {{ .Values.security.frontendSecret | quote }}
        - name: INTERNAL_SERVICE_SECRET
          valueFrom:
            secretKeyRef:
              name: {{ include "openagentic.fullname" . }}-api-secrets
              key: INTERNAL_SERVICE_SECRET
        - name: SIGNING_SECRET
          valueFrom:
            secretKeyRef:
              name: {{ include "openagentic.fullname" . }}-api-secrets
              key: SIGNING_SECRET
        # Azure Service Principal (consolidated - remove duplicates)
        - name: AZURE_CLIENT_ID
          value: {{ .Values.auth.azure.clientId | quote }}
        - name: AZURE_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              {{- if .Values.azureKeyVault.enabled }}
              name: {{ include "openagentic.fullname" . }}-keyvault-secrets
              {{- else if .Values.externalSecrets.enabled }}
              name: {{ include "openagentic.fullname" . }}-api-secrets
              {{- else }}
              name: {{ include "openagentic.fullname" . }}-azure-secrets
              {{- end }}
              key: AZURE_CLIENT_SECRET
        - name: AZURE_TENANT_ID
          value: {{ .Values.auth.azure.tenantId | quote }}
        # Azure AD Authentication Environment Variables (required by azureADAuth.ts)
        - name: AZURE_AD_CLIENT_ID
          value: {{ .Values.auth.azure.clientId | quote }}
        - name: AZURE_AD_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              {{- if .Values.azureKeyVault.enabled }}
              name: {{ include "openagentic.fullname" . }}-keyvault-secrets
              {{- else if .Values.externalSecrets.enabled }}
              name: {{ include "openagentic.fullname" . }}-api-secrets
              {{- else }}
              name: {{ include "openagentic.fullname" . }}-azure-secrets
              {{- end }}
              key: AZURE_CLIENT_SECRET
        - name: AZURE_AD_TENANT_ID
          value: {{ .Values.auth.azure.tenantId | quote }}
        - name: AZURE_AD_AUTHORITY
          value: {{ .Values.auth.azure.authority | quote }}
        - name: AZURE_AD_REDIRECT_URI
          value: {{ .Values.auth.azure.redirectUri | quote }}
        - name: AZURE_SUBSCRIPTION_ID
          value: {{ .Values.ai.azure.subscription | default "" | quote }}
        - name: AZURE_OPENAI_ENDPOINT
          value: {{ .Values.api.env.AZURE_OPENAI_ENDPOINT | quote }}
        - name: AZURE_OPENAI_DEPLOYMENT
          value: {{ .Values.api.env.AZURE_OPENAI_DEPLOYMENT | quote }}
        - name: AZURE_OPENAI_API_VERSION
          value: {{ .Values.api.env.AZURE_OPENAI_API_VERSION | quote }}
        - name: AZURE_OPENAI_MODEL_NAME
          value: {{ .Values.api.env.AZURE_OPENAI_MODEL_NAME | quote }}
        # Azure OpenAI Embedding uses base endpoint + deployment, not separate endpoint
        - name: AZURE_OPENAI_EMBEDDING_DEPLOYMENT
          value: {{ .Values.api.env.AZURE_OPENAI_EMBEDDING_DEPLOYMENT | quote }}
        - name: DEFAULT_MODEL
          value: {{ .Values.env.DEFAULT_MODEL | default .Values.api.env.DEFAULT_MODEL | default "" | quote }}
        - name: SECONDARY_MODEL
          value: {{ .Values.env.SECONDARY_MODEL | default "" | quote }}
        - name: ECONOMICAL_MODEL
          value: {{ .Values.env.ECONOMICAL_MODEL | default "" | quote }}
        - name: PREMIUM_MODEL
          value: {{ .Values.env.PREMIUM_MODEL | default "" | quote }}
        - name: ULTRA_PREMIUM_MODEL
          value: {{ .Values.env.ULTRA_PREMIUM_MODEL | default "" | quote }}
        - name: DEFAULT_CODE_MODEL
          value: {{ .Values.env.DEFAULT_CODE_MODEL | default "" | quote }}
        - name: AGENT_SPAWN_ENABLED
          value: {{ .Values.env.AGENT_SPAWN_ENABLED | default "true" | quote }}
        - name: AVAILABLE_MODELS
          value: {{ .Values.api.env.AVAILABLE_MODELS | default .Values.env.AVAILABLE_MODELS | default "" | quote }}
        - name: DEFAULT_EMBEDDING_MODEL
          value: {{ .Values.api.env.DEFAULT_EMBEDDING_MODEL | quote }}
        - name: ADMIN_USER_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ include "openagentic.fullname" . }}-api-secrets
              key: ADMIN_USER_PASSWORD
        - name: ADMIN_AAD_USER_ASSOCIATION
          value: {{ .Values.auth.admin.aadAssociation | quote }}
        - name: ADMIN_AAD_UUID
          value: {{ .Values.auth.admin.aadUuid | quote }}
        - name: EXTERNAL_ADMIN_EMAILS
          value: {{ .Values.auth.externalAdminEmails | default "" | quote }}
        - name: ADMIN_REQUIRE_PASSWORD_RESET
          value: {{ .Values.auth.admin.requirePasswordReset | quote }}
        # SECURITY: Test mode gated behind explicit flag (disabled by default)
        {{- if .Values.auth.testMode.enabled }}
        - name: TEST_MODE_ENABLED
          value: "true"
        - name: TEST_API_KEY
          valueFrom:
            secretKeyRef:
              name: {{ include "openagentic.fullname" . }}-api-secrets
              key: TEST_API_KEY
              optional: true
        {{- end }}
        - name: MILVUS_USERNAME
          value: {{ .Values.milvus.auth.username | quote }}
        - name: MILVUS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ include "openagentic.fullname" . }}-api-secrets
              key: MILVUS_PASSWORD
        - name: MINIO_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: {{ include "openagentic.fullname" . }}-api-secrets
              key: MINIO_ACCESS_KEY
        - name: MINIO_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: {{ include "openagentic.fullname" . }}-api-secrets
              key: MINIO_SECRET_KEY
        - name: MINIO_ENDPOINT
          value: "{{ include "openagentic.fullname" . }}-minio:9000"
        - name: BLOB_STORAGE_TYPE
          value: "minio"
        # Additional environment variables from .env file
        - name: DOMAIN
          value: {{ .Values.env.DOMAIN | quote }}
        - name: LOG_LEVEL
          value: {{ .Values.env.LOG_LEVEL | quote }}
        - name: API_PORT
          value: {{ .Values.env.API_PORT | quote }}
        - name: AUTH_MODE
          value: {{ .Values.env.AUTH_MODE | quote }}
        - name: AUTH_PROVIDER
          value: {{ .Values.env.AUTH_PROVIDER | default .Values.env.AUTH_MODE | quote }}
        - name: AZURE_AD_ADMIN_GROUP
          value: {{ .Values.auth.azure.adminGroup | quote }}
        - name: AAD_AUTHORIZED_USER_GROUPS
          value: {{ .Values.auth.azure.authorizedUserGroups | quote }}
        - name: AAD_AUTHORIZED_ADMIN_GROUPS
          value: {{ .Values.auth.azure.authorizedAdminGroups | quote }}
        - name: AZURE_RESOURCE_GROUP
          value: {{ .Values.ai.azure.resourceGroup | default "" | quote }}
        - name: AZURE_OPENAI_RESOURCE_NAME
          value: {{ .Values.ai.azure.resourceName | default "" | quote }}
        # EMBEDDING_MODEL, EMBEDDING_PROVIDER, EMBEDDING_DIMENSION handled in EMBEDDING PROVIDER CONFIGURATION section below
        - name: AZURE_OPENAI_EMBEDDING_API_VERSION
          value: {{ .Values.env.AZURE_OPENAI_EMBEDDING_API_VERSION | default "2023-05-15" | quote }}
        - name: AZURE_OPENAI_EMBEDDING_ENDPOINT
          value: {{ .Values.env.AZURE_OPENAI_EMBEDDING_ENDPOINT | quote }}
        # LLM Provider Configuration
        - name: DEFAULT_LLM_PROVIDER
          value: {{ .Values.env.DEFAULT_LLM_PROVIDER | quote }}
        - name: LLM_ENABLE_FAILOVER
          value: {{ .Values.env.LLM_ENABLE_FAILOVER | quote }}
        - name: LLM_FAILOVER_TIMEOUT
          value: {{ .Values.env.LLM_FAILOVER_TIMEOUT | quote }}
        - name: LLM_ENABLE_LOAD_BALANCING
          value: {{ .Values.env.LLM_ENABLE_LOAD_BALANCING | quote }}
        - name: LLM_LOAD_BALANCING_STRATEGY
          value: {{ .Values.env.LLM_LOAD_BALANCING_STRATEGY | quote }}
        # AWS Bedrock Provider Configuration
        {{- if .Values.aws.bedrock.enabled }}
        - name: AWS_BEDROCK_ENABLED
          value: "true"
        - name: AWS_BEDROCK_PRIORITY
          value: {{ .Values.aws.bedrock.priority | quote }}
        {{- if .Values.aws.bedrock.endpoint }}
        - name: AWS_BEDROCK_ENDPOINT
          value: {{ .Values.aws.bedrock.endpoint | quote }}
        {{- end }}
        - name: AWS_BEDROCK_MODEL_ID
          value: {{ .Values.aws.bedrock.modelId | quote }}
        - name: AWS_BEDROCK_MAX_TOKENS
          value: {{ .Values.aws.bedrock.maxTokens | quote }}
        - name: AWS_BEDROCK_TEMPERATURE
          value: {{ .Values.aws.bedrock.temperature | quote }}
        - name: AWS_BEDROCK_AVAILABLE_MODELS
          value: {{ .Values.aws.bedrock.availableModels | quote }}
        - name: AWS_BEDROCK_EMBEDDING_MODEL
          value: {{ .Values.aws.bedrock.embeddingModel | quote }}
        - name: AWS_BEDROCK_EMBEDDING_DIMENSION
          value: {{ .Values.aws.bedrock.embeddingDimension | quote }}
        - name: AWS_BEDROCK_CHAT_MODEL
          value: {{ .Values.env.AWS_BEDROCK_CHAT_MODEL | quote }}
        - name: AWS_BEDROCK_MODEL_OPUS
          value: {{ .Values.env.AWS_BEDROCK_MODEL_OPUS | quote }}
        - name: AWS_BEDROCK_MODEL_SONNET
          value: {{ .Values.env.AWS_BEDROCK_MODEL_SONNET | quote }}
        - name: AWS_BEDROCK_MODEL_HAIKU
          value: {{ .Values.env.AWS_BEDROCK_MODEL_HAIKU | quote }}
        - name: AWS_BEDROCK_MODEL_THINKING
          value: {{ .Values.env.AWS_BEDROCK_MODEL_THINKING | quote }}
        - name: AWS_BEDROCK_IMAGE_MODEL
          value: {{ .Values.env.AWS_BEDROCK_IMAGE_MODEL | quote }}
        - name: AWS_BEDROCK_IMAGE_FORMAT
          value: {{ .Values.env.AWS_BEDROCK_IMAGE_FORMAT | default "amazon" | quote }}
        - name: AWS_IMAGE_MODEL
          value: {{ .Values.env.AWS_BEDROCK_IMAGE_MODEL | quote }}
        - name: AWS_BEDROCK_COMPACTION_MODEL
          value: {{ .Values.env.AWS_BEDROCK_COMPACTION_MODEL | quote }}
        # AWS Bedrock Prompt Caching (75% savings on cached tokens)
        - name: AWS_BEDROCK_ENABLE_CACHING
          value: {{ .Values.aws.bedrock.enableCaching | default "true" | quote }}
        {{- end }}
        # AWS Configuration
        {{- if .Values.aws }}
        - name: AWS_REGION
          value: {{ .Values.aws.bedrock.region | default "us-east-1" | quote }}
        - name: AWS_DEFAULT_REGION
          value: {{ .Values.aws.bedrock.region | default "us-east-1" | quote }}
        {{- if .Values.azureKeyVault.enabled }}
        # Use AWS credentials from Azure Key Vault
        - name: AWS_ACCESS_KEY_ID
          valueFrom:
            secretKeyRef:
              name: {{ include "openagentic.fullname" . }}-keyvault-secrets
              key: AWS_ACCESS_KEY_ID
        - name: AWS_SECRET_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: {{ include "openagentic.fullname" . }}-keyvault-secrets
              key: AWS_SECRET_ACCESS_KEY
        {{- else if .Values.externalSecrets.enabled }}
        # Use AWS credentials from ESO-managed secret
        - name: AWS_ACCESS_KEY_ID
          valueFrom:
            secretKeyRef:
              name: {{ include "openagentic.fullname" . }}-api-secrets
              key: AWS_ACCESS_KEY_ID
        - name: AWS_SECRET_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: {{ include "openagentic.fullname" . }}-api-secrets
              key: AWS_SECRET_ACCESS_KEY
        {{- else }}
        # SECURITY: AWS credentials always via secretKeyRef (never plain value)
        {{- if .Values.aws.bedrock.accessKeyId }}
        - name: AWS_ACCESS_KEY_ID
          valueFrom:
            secretKeyRef:
              name: {{ include "openagentic.fullname" . }}-api-secrets
              key: AWS_ACCESS_KEY_ID
              optional: true
        {{- end }}
        {{- if .Values.aws.bedrock.secretAccessKey }}
        - name: AWS_SECRET_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: {{ include "openagentic.fullname" . }}-api-secrets
              key: AWS_SECRET_ACCESS_KEY
              optional: true
        {{- end }}
        {{- end }}
        {{- end }}
        # Anthropic Provider Configuration (Direct API, not via Bedrock)
        {{- if .Values.ai.anthropic.enabled }}
        - name: ANTHROPIC_ENABLED
          value: "true"
        - name: ANTHROPIC_API_KEY
          valueFrom:
            secretKeyRef:
              name: {{ include "openagentic.fullname" . }}-api-secrets
              key: ANTHROPIC_API_KEY
        - name: ANTHROPIC_MODEL
          value: {{ .Values.ai.anthropic.model | default "claude-sonnet-4-20250514" | quote }}
        - name: ANTHROPIC_PRIORITY
          value: {{ .Values.ai.anthropic.priority | default "1" | quote }}
        # Anthropic Prompt Caching (90% savings on cached tokens)
        - name: ANTHROPIC_ENABLE_CACHING
          value: {{ .Values.ai.anthropic.enableCaching | default "true" | quote }}
        {{- end }}
        # Azure OpenAI Provider Configuration
        {{- if .Values.ai.azure.openai.enabled }}
        - name: AZURE_OPENAI_ENABLED
          value: "true"
        - name: AZURE_OPENAI_PRIORITY
          value: {{ .Values.ai.azure.openai.priority | quote }}
        - name: AZURE_OPENAI_ENDPOINT
          value: {{ .Values.ai.azure.openai.endpoint | quote }}
        - name: AZURE_OPENAI_API_VERSION
          value: {{ .Values.ai.azure.openai.apiVersion | quote }}
        - name: AZURE_OPENAI_DEPLOYMENT
          value: {{ .Values.ai.azure.openai.deployment | quote }}
        # v3 — multi-deployment list for CDC-style foundries with
        # per-model deployments. LLMProviderSeeder parses into
        # provider_config.models[] so the chat selector shows all.
        - name: AZURE_OPENAI_DEPLOYMENTS
          value: {{ .Values.ai.azure.openai.deployments | default .Values.ai.azure.openai.deployment | quote }}
        - name: AZURE_OPENAI_EMBEDDING_DEPLOYMENT
          value: {{ .Values.ai.azure.openai.embeddingDeployment | quote }}
        - name: AZURE_OPENAI_EMBEDDING_DIMENSION
          value: {{ .Values.ai.azure.openai.embeddingDimension | quote }}
        # NOTE: AZURE_TENANT_ID / AZURE_CLIENT_ID / AZURE_CLIENT_SECRET
        # are emitted ONCE in the Service Principal block higher up in
        # this template. Do NOT re-emit them here — strategic merge
        # patch rejects duplicate env keys and stalls Argo sync with:
        #   duplicate entries for key [name="AZURE_TENANT_ID"]
        # apiKey fallback still works via the Values.ai.azure.openai.apiKey
        # path if an env wants inline key auth.
        {{- if .Values.ai.azure.openai.apiKey }}
        - name: AZURE_OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: {{ include "openagentic.fullname" . }}-api-secrets
              key: AZURE_OPENAI_API_KEY
              optional: true
        {{- end }}
        {{- end }}
        # Azure AI Foundry (AIF) Provider Configuration
        - name: AIF_ENABLED
          value: {{ .Values.env.AIF_ENABLED | quote }}
        - name: AIF_PRIORITY
          value: {{ .Values.env.AIF_PRIORITY | quote }}
        - name: AIF_ENDPOINT_URL
          value: {{ .Values.env.AIF_ENDPOINT_URL | quote }}
        # SECURITY: AIF key via secretKeyRef
        - name: AIF_API_KEY
          valueFrom:
            secretKeyRef:
              name: {{ include "openagentic.fullname" . }}-api-secrets
              key: AIF_API_KEY
              optional: true
        - name: AIF_CHAT_MODEL
          value: {{ .Values.env.AIF_CHAT_MODEL | quote }}
        - name: AIF_MODEL
          value: {{ .Values.env.AIF_MODEL | quote }}
        - name: AIF_MAX_TOKENS
          value: {{ .Values.env.AIF_MAX_TOKENS | quote }}
        - name: AIF_TEMPERATURE
          value: {{ .Values.env.AIF_TEMPERATURE | quote }}
        - name: AIF_API_VERSION
          value: {{ .Values.env.AIF_API_VERSION | default "2024-08-01-preview" | quote }}
        {{- if .Values.env.AIF_FUNCTION_CALLING_MODEL }}
        - name: AIF_FUNCTION_CALLING_MODEL
          value: {{ .Values.env.AIF_FUNCTION_CALLING_MODEL | quote }}
        {{- end }}
        {{- if .Values.env.AIF_DEPLOYMENT_MAP }}
        - name: AIF_DEPLOYMENT_MAP
          value: {{ .Values.env.AIF_DEPLOYMENT_MAP | quote }}
        {{- end }}
        {{- if .Values.env.AIF_ADDITIONAL_MODELS }}
        - name: AIF_ADDITIONAL_MODELS
          value: {{ .Values.env.AIF_ADDITIONAL_MODELS | quote }}
        {{- end }}
        # AIF Entra ID (Azure AD) authentication — service principal credentials
        {{- if .Values.env.AIF_TENANT_ID }}
        - name: AIF_TENANT_ID
          value: {{ .Values.env.AIF_TENANT_ID | quote }}
        - name: AIF_CLIENT_ID
          value: {{ .Values.env.AIF_CLIENT_ID | quote }}
        - name: AIF_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: {{ include "openagentic.fullname" . }}-api-secrets
              key: AIF_CLIENT_SECRET
              optional: true
        {{- end }}
        # Google Vertex AI Provider Configuration
        {{- if .Values.ai.google.vertex.enabled }}
        - name: VERTEX_AI_ENABLED
          value: "true"
        - name: VERTEX_AI_PRIORITY
          value: {{ .Values.ai.google.vertex.priority | quote }}
        - name: VERTEX_AI_PROJECT_ID
          value: {{ .Values.ai.google.vertex.projectId | quote }}
        - name: VERTEX_AI_PROJECT
          value: {{ .Values.ai.google.vertex.projectId | quote }}
        - name: VERTEX_AI_LOCATION
          value: {{ .Values.ai.google.vertex.location | quote }}
        - name: VERTEX_AI_MODEL
          value: {{ .Values.ai.google.vertex.model | quote }}
        - name: VERTEX_DEFAULT_MODEL
          value: {{ .Values.ai.google.vertex.model | default "gemini-2.0-flash-001" | quote }}
        - name: GOOGLE_CLOUD_PROJECT
          value: {{ .Values.ai.google.vertex.projectId | quote }}
        - name: GCP_PROJECT_ID
          value: {{ .Values.ai.google.vertex.projectId | quote }}
        - name: GOOGLE_CLOUD_LOCATION
          value: {{ .Values.ai.google.vertex.location | quote }}
        - name: GOOGLE_APPLICATION_CREDENTIALS
          value: "/app/gcloud/service-account.json"
        {{- if .Values.ai.google.vertex.serviceAccountJson }}
        - name: GOOGLE_APPLICATION_CREDENTIALS_JSON
          value: {{ .Values.ai.google.vertex.serviceAccountJson | b64dec | quote }}
        {{- end }}
        - name: VERTEX_AI_CHAT_MODEL
          value: {{ .Values.env.VERTEX_AI_CHAT_MODEL | quote }}
        - name: VERTEX_AI_FALLBACK_MODEL
          value: {{ .Values.env.VERTEX_AI_FALLBACK_MODEL | quote }}
        - name: VERTEX_AI_MAX_TOKENS
          value: {{ .Values.env.VERTEX_AI_MAX_TOKENS | quote }}
        - name: VERTEX_AI_TEMPERATURE
          value: {{ .Values.env.VERTEX_AI_TEMPERATURE | quote }}
        - name: VERTEX_AI_VISION_MODEL
          value: {{ .Values.env.VERTEX_AI_VISION_MODEL | quote }}
        - name: VERTEX_AI_IMAGE_MODEL
          value: {{ .Values.env.VERTEX_AI_IMAGE_MODEL | quote }}
        - name: VERTEX_AI_EMBEDDING_MODEL
          value: {{ .Values.env.VERTEX_AI_EMBEDDING_MODEL | quote }}
        - name: VERTEX_AI_EMBEDDING_DIMENSION
          value: {{ .Values.env.VERTEX_AI_EMBEDDING_DIMENSION | quote }}
        - name: VERTEX_AI_COMPACTION_MODEL
          value: {{ .Values.env.VERTEX_AI_COMPACTION_MODEL | quote }}
        - name: GCP_CREDENTIALS_FILE
          value: "/app/gcloud/service-account.json"
        # Google Vertex AI Context Caching (90% savings on Gemini 2.5!)
        - name: VERTEX_AI_ENABLE_CACHING
          value: {{ .Values.ai.google.vertex.enableCaching | default "true" | quote }}
        - name: VERTEX_AI_CACHE_TTL_SECONDS
          value: {{ .Values.ai.google.vertex.cacheTtlSeconds | default "3600" | quote }}
        - name: VERTEX_AI_MIN_CACHEABLE_CHARS
          value: {{ .Values.ai.google.vertex.minCacheableChars | default "8192" | quote }}
        {{- end }}
        # Model Configuration
        - name: ENABLE_DYNAMIC_MODEL_SELECTION
          value: {{ .Values.env.ENABLE_DYNAMIC_MODEL_SELECTION | quote }}
        - name: MODEL_SELECTOR_CACHE_TTL
          value: {{ .Values.env.MODEL_SELECTOR_CACHE_TTL | quote }}
        - name: MODEL_SELECTOR_CONCURRENCY
          value: {{ .Values.env.MODEL_SELECTOR_CONCURRENCY | quote }}
        - name: MODEL_SELECTOR_TIMEOUT
          value: {{ .Values.env.MODEL_SELECTOR_TIMEOUT | quote }}
        # Ollama Configuration
        - name: OLLAMA_ENABLED
          value: {{ .Values.env.OLLAMA_ENABLED | quote }}
        {{- if or .Values.ollama.enabled (eq .Values.env.OLLAMA_ENABLED "true") }}
        - name: OLLAMA_BASE_URL
          value: {{ .Values.env.OLLAMA_BASE_URL | default (include "openagentic.ollama.url" .) | quote }}
        - name: OLLAMA_MODEL
          value: {{ .Values.env.OLLAMA_MODEL | quote }}
        - name: OLLAMA_EMBEDDING_MODEL
          value: {{ .Values.env.OLLAMA_EMBEDDING_MODEL | quote }}
        - name: OLLAMA_EMBEDDING_DIMENSION
          value: {{ .Values.env.OLLAMA_EMBEDDING_DIMENSION | quote }}
        - name: OLLAMA_VISION_MODEL
          value: {{ .Values.env.OLLAMA_VISION_MODEL | default "qwen3-vl" | quote }}
        - name: OLLAMA_CHAT_MODEL
          value: {{ .Values.env.OLLAMA_CHAT_MODEL | quote }}
        - name: OLLAMA_TOOL_MODEL
          value: {{ .Values.env.OLLAMA_TOOL_MODEL | quote }}
        - name: OLLAMA_MAX_TOKENS
          value: {{ .Values.env.OLLAMA_MAX_TOKENS | quote }}
        - name: OLLAMA_TEMPERATURE
          value: {{ .Values.env.OLLAMA_TEMPERATURE | quote }}
        - name: OLLAMA_PRIORITY
          value: {{ .Values.env.OLLAMA_PRIORITY | quote }}
        # Ollama Model Caching - keep_alive controls how long model stays in GPU memory
        - name: OLLAMA_KEEP_ALIVE
          value: {{ .Values.ollama.keepAlive | default "30m" | quote }}
        {{- end }}
        # Cache Configuration
        - name: ENABLE_SEMANTIC_CACHE
          value: {{ .Values.env.ENABLE_SEMANTIC_CACHE | quote }}
        - name: SEMANTIC_CACHE_TTL_DEFAULT
          value: {{ .Values.env.SEMANTIC_CACHE_TTL_DEFAULT | quote }}
        - name: SEMANTIC_CACHE_SIMILARITY_THRESHOLD
          value: {{ .Values.env.SEMANTIC_CACHE_SIMILARITY_THRESHOLD | quote }}
        - name: ENABLE_MCP_CACHE
          value: {{ .Values.env.ENABLE_MCP_CACHE | quote }}
        - name: MCP_CACHE_TTL_DEFAULT
          value: {{ .Values.env.MCP_CACHE_TTL_DEFAULT | quote }}
        - name: ENABLE_RAG_CACHE
          value: {{ .Values.env.ENABLE_RAG_CACHE | quote }}
        - name: RAG_CACHE_TTL_DEFAULT
          value: {{ .Values.env.RAG_CACHE_TTL_DEFAULT | quote }}
        - name: REDIS_AI_ENABLED
          value: {{ .Values.env.REDIS_AI_ENABLED | quote }}
        - name: ENABLE_SEMANTIC_PROMPT_SEARCH
          value: {{ .Values.env.ENABLE_SEMANTIC_PROMPT_SEARCH | quote }}
        # Additional Authentication Variables (UI-specific)
        - name: VITE_AZURE_AD_AUTHORIZED_GROUPS
          value: {{ printf "%s,%s" .Values.auth.azure.authorizedUserGroups .Values.auth.azure.authorizedAdminGroups | quote }}
        - name: AZURE_ADMIN_GROUPS
          value: {{ .Values.auth.azure.authorizedAdminGroups | quote }}
        # Admin User Configuration (additional to existing ones above)
        - name: CREATE_DEFAULT_ADMIN
          value: {{ .Values.api.env.CREATE_DEFAULT_ADMIN | quote }}
        - name: ADMIN_USER_EMAIL
          value: {{ .Values.api.env.ADMIN_USER_EMAIL | quote }}
        # Initialize all authorized users from AAD groups to prevent race conditions
        - name: INITIALIZE_AAD_USERS
          value: "true"
        - name: AAD_USER_GROUPS_TO_INITIALIZE
          value: "{{ .Values.auth.azure.authorizedUserGroups }},{{ .Values.auth.azure.authorizedAdminGroups }}"
        # Additional API-specific env vars that aren't defined above
        {{- if .Values.api.env.ADMIN_USER_EMAIL }}
        - name: ADMIN_USER_EMAIL_OVERRIDE
          value: {{ .Values.api.env.ADMIN_USER_EMAIL | quote }}
        {{- end }}
        # TEST_MODE_ENABLED handled above in auth section
        # VERTEX AI already handled in Google Vertex AI Provider Configuration section
        # ===========================================
        # GOOGLE OAUTH CONFIGURATION
        # ===========================================
        {{- if or (eq .Values.env.AUTH_MODE "google") (eq .Values.env.AUTH_MODE "hybrid") (eq .Values.env.AUTH_MODE "both") }}
        - name: GOOGLE_CLIENT_ID
          value: {{ .Values.auth.google.clientId | quote }}
        - name: GOOGLE_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: {{ include "openagentic.fullname" . }}-google-secrets
              key: GOOGLE_CLIENT_SECRET
        - name: GOOGLE_REDIRECT_URI
          value: {{ .Values.auth.google.redirectUri | quote }}
        - name: GOOGLE_ADMIN_EMAILS
          value: {{ .Values.auth.google.adminEmails | quote }}
        {{- if .Values.auth.google.allowedUsers }}
        - name: GOOGLE_ALLOWED_USERS
          value: {{ .Values.auth.google.allowedUsers | quote }}
        {{- end }}
        {{- if .Values.auth.google.allowedDomains }}
        - name: GOOGLE_ALLOWED_DOMAINS
          value: {{ .Values.auth.google.allowedDomains | quote }}
        {{- end }}
        {{- end }}
        # ===========================================
        # GITHUB OAUTH CONFIGURATION (for GitHub MCP)
        # ===========================================
        {{- if and .Values.auth.github .Values.auth.github.enabled }}
        - name: GITHUB_OAUTH_CLIENT_ID
          value: {{ .Values.auth.github.clientId | quote }}
        - name: GITHUB_OAUTH_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: {{ include "openagentic.fullname" . }}-github-secrets
              key: GITHUB_CLIENT_SECRET
        - name: GITHUB_OAUTH_REDIRECT_URI
          value: {{ .Values.auth.github.redirectUri | quote }}
        - name: GITHUB_CREDENTIAL_ENCRYPTION_KEY
          valueFrom:
            secretKeyRef:
              name: {{ include "openagentic.fullname" . }}-github-secrets
              key: GITHUB_ENCRYPTION_KEY
        {{- if .Values.auth.github.host }}
        - name: GITHUB_HOST
          value: {{ .Values.auth.github.host | quote }}
        {{- end }}
        {{- if .Values.auth.github.apiUrl }}
        - name: GITHUB_API_URL
          value: {{ .Values.auth.github.apiUrl | quote }}
        {{- end }}
        {{- end }}
        # ===========================================
        # IMAGE GENERATION CONFIGURATION
        # ===========================================
        {{- if and (hasKey .Values.api.env "IMAGE_GEN_MODEL") (ne (.Values.api.env.IMAGE_GEN_MODEL | default "") "") }}
        - name: IMAGE_GEN_MODEL
          value: {{ .Values.api.env.IMAGE_GEN_MODEL | quote }}
        - name: IMAGE_GEN_PROVIDER
          value: {{ .Values.api.env.IMAGE_GEN_PROVIDER | default "vertex" | quote }}
        {{- end }}
        # OLLAMA_EMBEDDING_MODEL already defined in Ollama Configuration section above
        # OLLAMA_VISION_MODEL added to the Ollama Configuration section
        # ===========================================
        # EMBEDDING PROVIDER CONFIGURATION
        # ===========================================
        - name: EMBEDDING_PROVIDER
          value: {{ .Values.embedding.provider | default "azure" | quote }}
        - name: EMBEDDING_MODEL
          value: {{ .Values.embedding.model | quote }}
        - name: EMBEDDING_DIMENSIONS
          value: {{ .Values.embedding.dimensions | default "768" | quote }}
        # Disable pgvector HNSW/ivfflat index builds on CPUs that SIGILL
        # on halfvec index creation (observed on local k3s with pgvector
        # 0.8.2 — CPU lacks SIMD instructions the index build requires).
        # When true, semantic search uses seq scan instead of HNSW —
        # functionally correct, only slower on large collections.
        # Should stay false/unset on CDC AKS nodes (D-series) which
        # handle halfvec HNSW fine.
        {{- if and .Values.database (hasKey .Values.database "disableVectorIndexes") (eq (.Values.database.disableVectorIndexes | toString) "true") }}
        - name: DISABLE_VECTOR_INDEXES
          value: "true"
        {{- end }}
        {{- if eq .Values.embedding.provider "ollama" }}
        - name: EMBEDDING_OLLAMA_BASE_URL
          value: {{ .Values.embedding.ollama.baseUrl | default (include "openagentic.ollama.url" .) | quote }}
        - name: EMBEDDING_OLLAMA_MODEL
          value: {{ .Values.embedding.ollama.model | default "embeddinggemma" | quote }}
        {{- end }}
        {{- if or (eq .Values.embedding.provider "gcp") (eq .Values.embedding.provider "vertex-ai") (eq .Values.embedding.provider "vertex") }}
        - name: GCP_EMBEDDING_MODEL
          value: {{ .Values.embedding.gcp.model | default "text-embedding-005" | quote }}
        - name: GCP_LOCATION
          value: {{ .Values.embedding.gcp.location | default "us-central1" | quote }}
        {{- end }}
        # ===========================================
        # COMPACTION & MEMORY CONFIGURATION
        # ===========================================
        - name: COMPACTION_ENABLED
          value: {{ .Values.env.COMPACTION_ENABLED | default "true" | quote }}
        - name: COMPACTION_MODEL
          value: {{ .Values.env.COMPACTION_MODEL | default "default" | quote }}
        - name: COMPACTION_DELAY_HOURS
          value: {{ .Values.env.COMPACTION_DELAY_HOURS | default "1" | quote }}
        - name: SIMILARITY_THRESHOLD
          value: {{ .Values.env.SIMILARITY_THRESHOLD | default "0.7" | quote }}
        - name: MAX_MEMORIES
          value: {{ .Values.env.MAX_MEMORIES | default "10" | quote }}
        - name: CONTEXT_CACHE_ENABLED
          value: {{ .Values.env.CONTEXT_CACHE_ENABLED | default "true" | quote }}
        # ===========================================
        # FEATURE FLAGS
        # ===========================================
        - name: ENABLE_AZURE_AD
          value: {{ .Values.env.ENABLE_AZURE_AD | default "false" | quote }}
        - name: ENABLE_VECTOR_SEARCH
          value: {{ .Values.env.ENABLE_VECTOR_SEARCH | default "true" | quote }}
        - name: ENABLE_FILE_UPLOADS
          value: {{ .Values.env.ENABLE_FILE_UPLOADS | default "true" | quote }}
        - name: ENABLE_METRICS
          value: {{ .Values.env.ENABLE_METRICS | default "true" | quote }}
        - name: ENABLE_DEBUG_LOGS
          value: {{ .Values.env.ENABLE_DEBUG_LOGS | default "false" | quote }}
        - name: ENABLE_RAG
          value: {{ .Values.env.ENABLE_RAG | default "true" | quote }}
        - name: ENABLE_MEMORY
          value: {{ .Values.env.ENABLE_MEMORY | default "true" | quote }}
        - name: ENABLE_RERANKING
          value: {{ .Values.env.ENABLE_RERANKING | default "true" | quote }}
        # ===========================================
        # MULTI-MODEL COLLABORATION
        # ===========================================
        - name: ENABLE_MULTI_MODEL
          value: {{ .Values.env.ENABLE_MULTI_MODEL | default "false" | quote }}
        - name: MULTI_MODEL_COMPLEXITY_THRESHOLD
          value: {{ .Values.env.MULTI_MODEL_COMPLEXITY_THRESHOLD | default "60" | quote }}
        - name: MULTI_MODEL_MAX_HANDOFFS
          value: {{ .Values.env.MULTI_MODEL_MAX_HANDOFFS | default "5" | quote }}
        - name: MULTI_MODEL_AUTO_FALLBACK
          value: {{ .Values.env.MULTI_MODEL_AUTO_FALLBACK | default "true" | quote }}
        - name: MULTI_MODEL_SLIDER_THRESHOLD
          value: {{ .Values.env.MULTI_MODEL_SLIDER_THRESHOLD | default "70" | quote }}
        {{- if .Values.env.MULTI_MODEL_REASONING_PRIMARY }}
        - name: MULTI_MODEL_REASONING_PRIMARY
          value: {{ .Values.env.MULTI_MODEL_REASONING_PRIMARY | quote }}
        {{- end }}
        {{- if .Values.env.MULTI_MODEL_TOOL_PRIMARY }}
        - name: MULTI_MODEL_TOOL_PRIMARY
          value: {{ .Values.env.MULTI_MODEL_TOOL_PRIMARY | quote }}
        {{- end }}
        {{- if .Values.env.MULTI_MODEL_SYNTHESIS_PRIMARY }}
        - name: MULTI_MODEL_SYNTHESIS_PRIMARY
          value: {{ .Values.env.MULTI_MODEL_SYNTHESIS_PRIMARY | quote }}
        {{- end }}
        {{- if .Values.env.MULTI_MODEL_FALLBACK_PRIMARY }}
        - name: MULTI_MODEL_FALLBACK_PRIMARY
          value: {{ .Values.env.MULTI_MODEL_FALLBACK_PRIMARY | quote }}
        {{- end }}
        # ===========================================
        # INTELLIGENT ROUTING
        # ===========================================
        - name: ROUTE_SIMPLE_TO_OLLAMA
          value: {{ .Values.env.ROUTE_SIMPLE_TO_OLLAMA | default "false" | quote }}
        - name: ROUTE_COMPLEX_TO_CLAUDE
          value: {{ .Values.env.ROUTE_COMPLEX_TO_CLAUDE | default "false" | quote }}
        - name: USE_AI_TITLE_GENERATION
          value: {{ .Values.env.USE_AI_TITLE_GENERATION | default "true" | quote }}
        {{- if .Values.env.TITLE_GENERATION_MODEL }}
        - name: TITLE_GENERATION_MODEL
          value: {{ .Values.env.TITLE_GENERATION_MODEL | quote }}
        {{- end }}
        {{- if .Values.env.SUMMARIZATION_MODEL }}
        - name: SUMMARIZATION_MODEL
          value: {{ .Values.env.SUMMARIZATION_MODEL | quote }}
        {{- end }}
        # ===========================================
        # EXTERNAL API URL
        # ===========================================
        {{- if .Values.api.externalUrl }}
        - name: OPENAGENTIC_EXTERNAL_URL
          value: {{ .Values.api.externalUrl | quote }}
        {{- end }}
        {{- if .Values.api.externalAdminEmails }}
        - name: EXTERNAL_ADMIN_EMAILS
          value: {{ .Values.api.externalAdminEmails | quote }}
        {{- end }}
        # ===========================================
        # JWT CONFIGURATION
        # ===========================================
        {{- if .Values.auth.jwt }}
        - name: JWT_EXPIRY
          value: {{ .Values.auth.jwt.expiry | default "24h" | quote }}
        - name: JWT_REFRESH_EXPIRY
          value: {{ .Values.auth.jwt.refreshExpiry | default "7d" | quote }}
        - name: JWT_AUDIENCE
          value: {{ .Values.auth.jwt.audience | default "openagentic" | quote }}
        - name: JWT_ISSUER
          value: {{ .Values.auth.jwt.issuer | default "openagentic-api" | quote }}
        {{- end }}
        # SECURITY: DEV_AUTH_BYPASS removed from production templates (v0.5.0 hardening)
        # For local development only, use api.extraEnv to set ENABLE_DEV_AUTH_BYPASS=true
        # ===========================================
        # EXTRA ENV VARS (from api.extraEnv)
        # ===========================================
        {{- if .Values.api.extraEnv }}
        {{- range $key, $value := .Values.api.extraEnv }}
        - name: {{ $key }}
          value: {{ $value | quote }}
        {{- end }}
        {{- end }}
        lifecycle:
          preStop:
            exec:
              command: ["/bin/sh", "-c", "sleep 5"]
        resources:
          {{- toYaml .Values.api.resources | nindent 10 }}
        {{- if or .Values.ai.google.vertex.enabled .Values.azureKeyVault.enabled .Values.api.cdcCaBundle }}
        volumeMounts:
        {{- if .Values.azureKeyVault.enabled }}
        # Azure Key Vault CSI volume - MUST be mounted for secrets sync to work
        - name: secrets-store
          mountPath: "/mnt/secrets-store"
          readOnly: true
        {{- end }}
        {{- if .Values.ai.google.vertex.enabled }}
        - name: gcp-service-account
          mountPath: /app/gcloud
          readOnly: true
        {{- end }}
        {{- if .Values.api.cdcCaBundle }}
        - name: cdc-ca-bundle
          mountPath: /etc/ssl/certs/cdc-ca-bundle.crt
          subPath: ca-bundle.crt
          readOnly: true
        {{- end }}
        {{- end }}
        startupProbe:
          httpGet:
            path: /health
            port: {{ .Values.api.service.port }}
          initialDelaySeconds: 30
          periodSeconds: 15
          timeoutSeconds: 10
          failureThreshold: 120  # 30min total — Milvus collection init can be very slow
        livenessProbe:
          httpGet:
            path: /health
            port: {{ .Values.api.service.port }}
          initialDelaySeconds: 120  # Wait longer — Milvus tool indexing blocks event loop during startup
          periodSeconds: 30
          timeoutSeconds: 30
          failureThreshold: 20
        readinessProbe:
          httpGet:
            path: /health
            port: {{ .Values.api.service.port }}
          initialDelaySeconds: 15
          periodSeconds: 15
          timeoutSeconds: 15
          failureThreshold: 5   # More tolerance for transient Milvus hiccups
      {{- if or .Values.ai.google.vertex.enabled .Values.azureKeyVault.enabled .Values.api.cdcCaBundle }}
      volumes:
      {{- if .Values.azureKeyVault.enabled }}
      # Azure Key Vault CSI volume
      - name: secrets-store
        csi:
          driver: secrets-store.csi.k8s.io
          readOnly: true
          volumeAttributes:
            secretProviderClass: {{ include "openagentic.fullname" . }}-azure-keyvault
      {{- end }}
      {{- if .Values.api.cdcCaBundle }}
      # CDC Root CA Certificate Bundle (for VPCE proxy TLS verification)
      - name: cdc-ca-bundle
        configMap:
          name: cdc-ca-bundle
      {{- end }}
      {{- if .Values.ai.google.vertex.enabled }}
      - name: gcp-service-account
        secret:
          secretName: {{ include "openagentic.fullname" . }}-gcp-secrets
      {{- end }}
      {{- end }}