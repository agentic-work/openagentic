

{{- if .Values.ollama.enabled }}
{{- $gpuEnabled := and .Values.gpu.enabled .Values.ollama.gpu.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "openagentic.fullname" . }}-ollama
  labels:
    {{- include "openagentic.labels" . | nindent 4 }}
    app.kubernetes.io/component: ollama
  annotations:
    # GPU Configuration Status
    openagentic.io/gpu-enabled: {{ $gpuEnabled | quote }}
spec:
  replicas: {{ .Values.ollama.replicas }}
  strategy:
    type: Recreate  # Recreate strategy to ensure model data consistency
  selector:
    matchLabels:
      {{- include "openagentic.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: ollama
  template:
    metadata:
      annotations:
        checksum/config: {{ .Values.ollama | toYaml | sha256sum }}
        openagentic.io/gpu-enabled: {{ $gpuEnabled | quote }}
        {{- with .Values.ollama.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "openagentic.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: ollama
    spec:
      # Node selector: merge GPU nodeSelector if GPU enabled
      {{- $nodeSelector := .Values.ollama.nodeSelector }}
      {{- if $gpuEnabled }}
      {{- $nodeSelector = merge (default dict .Values.ollama.nodeSelector) (default dict .Values.gpu.nodeSelector) }}
      {{- end }}
      {{- with $nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.ollama.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      # Tolerations: merge GPU tolerations if GPU enabled
      {{- $tolerations := .Values.ollama.tolerations }}
      {{- if $gpuEnabled }}
      {{- $tolerations = concat (default list .Values.ollama.tolerations) (default list .Values.gpu.tolerations) }}
      {{- end }}
      {{- with $tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "openagentic.serviceAccountName" . }}
      initContainers:
        {{- if .Values.ollama.cdcCert.enabled }}
        # your environment CA certificate init container for TLS intercept (PAN firewall)
        - name: setup-certs
          image: busybox:latest
          command:
            - /bin/sh
            - -c
            - |
              cp /etc/ssl/certs/ca-certificates.crt /certs/ca-certificates.crt
              cat /your-env-cert/min-your-env-bundle-ca.crt >> /certs/ca-certificates.crt
              echo "your environment cert appended to ca-certificates.crt"
          volumeMounts:
            - name: your-env-cert
              mountPath: /your-env-cert
            - name: certs
              mountPath: /certs
        {{- end }}
        {{- if .Values.ollama.initModels.enabled }}
        # Init container to pull configured models on startup
        - name: pull-models
          image: {{ .Values.ollama.image.repository }}:{{ .Values.ollama.image.tag | default "latest" }}
          imagePullPolicy: {{ .Values.ollama.image.pullPolicy }}
          command:
            - /bin/sh
            - -c
            - |
              set -e
              echo "Starting Ollama server in background for model pulling..."
              ollama serve &
              OLLAMA_PID=$!

              # Wait for Ollama to be ready (use ollama list instead of curl)
              echo "Waiting for Ollama to be ready..."
              for i in $(seq 1 60); do
                if ollama list >/dev/null 2>&1; then
                  echo "Ollama is ready!"
                  break
                fi
                echo "Waiting for Ollama... ($i/60)"
                sleep 2
              done

              # Pull each model from the comma-separated list (POSIX-compatible)
              echo "$OLLAMA_INIT_MODELS" | tr ',' '\n' | while read model; do
                model=$(echo "$model" | tr -d ' ')  # Trim whitespace
                if [ -n "$model" ]; then
                  echo "Pulling model: $model"
                  ollama pull "$model" || echo "Warning: Failed to pull model $model"
                fi
              done

              echo "Model pulling complete!"
              ollama list

              # Stop the background Ollama server
              kill $OLLAMA_PID 2>/dev/null || true
              wait $OLLAMA_PID 2>/dev/null || true

              echo "Init container finished successfully"
          env:
            - name: OLLAMA_INIT_MODELS
              value: {{ .Values.ollama.initModels.models | quote }}
            {{- if .Values.ollama.initModels.pullTimeout }}
            - name: OLLAMA_PULL_TIMEOUT
              value: {{ .Values.ollama.initModels.pullTimeout | quote }}
            {{- end }}
          volumeMounts:
            - name: ollama-data
              mountPath: /root/.ollama
          resources:
            {{- toYaml .Values.ollama.initModels.resources | nindent 12 }}
      {{- end }}
      containers:
        - name: ollama
          image: {{ .Values.ollama.image.repository }}:{{ .Values.ollama.image.tag | default "latest" }}
          imagePullPolicy: {{ .Values.ollama.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 11434
              protocol: TCP
          env:
            - name: OLLAMA_HOST
              value: "0.0.0.0:11434"
            {{- if .Values.ollama.env.OLLAMA_KEEP_ALIVE }}
            - name: OLLAMA_KEEP_ALIVE
              value: {{ .Values.ollama.env.OLLAMA_KEEP_ALIVE | quote }}
            {{- end }}
            {{- if .Values.ollama.env.OLLAMA_NUM_PARALLEL }}
            - name: OLLAMA_NUM_PARALLEL
              value: {{ .Values.ollama.env.OLLAMA_NUM_PARALLEL | quote }}
            {{- end }}
            {{- if .Values.ollama.env.OLLAMA_MAX_LOADED_MODELS }}
            - name: OLLAMA_MAX_LOADED_MODELS
              value: {{ .Values.ollama.env.OLLAMA_MAX_LOADED_MODELS | quote }}
            {{- end }}
            # GPU configuration - auto-set based on gpu.enabled
            - name: OLLAMA_NUM_GPU
              {{- if $gpuEnabled }}
              value: {{ .Values.ollama.gpu.count | default "1" | quote }}
              {{- else }}
              value: "0"  # CPU only when GPU disabled
              {{- end }}
            {{- if and $gpuEnabled .Values.ollama.gpu.deviceId }}
            # Specific GPU device selection (0 = first GPU, 1 = second GPU, etc.)
            - name: NVIDIA_VISIBLE_DEVICES
              value: {{ .Values.ollama.gpu.deviceId | quote }}
            {{- end }}
            {{- if .Values.ollama.env.OLLAMA_DEBUG }}
            - name: OLLAMA_DEBUG
              value: {{ .Values.ollama.env.OLLAMA_DEBUG | quote }}
            {{- end }}
            {{- if .Values.ollama.cdcCert.enabled }}
            - name: SSL_CERT_FILE
              value: "/etc/ssl/certs/ca-certificates.crt"
            {{- end }}
            {{- with .Values.ollama.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          volumeMounts:
            - name: ollama-data
              mountPath: /root/.ollama
            {{- if .Values.ollama.cdcCert.enabled }}
            - name: certs
              mountPath: /etc/ssl/certs/ca-certificates.crt
              subPath: ca-certificates.crt
            {{- end }}
          livenessProbe:
            httpGet:
              path: /api/tags
              port: http
            initialDelaySeconds: {{ .Values.ollama.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.ollama.livenessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.ollama.livenessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.ollama.livenessProbe.failureThreshold }}
          readinessProbe:
            httpGet:
              path: /api/tags
              port: http
            initialDelaySeconds: {{ .Values.ollama.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.ollama.readinessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.ollama.readinessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.ollama.readinessProbe.failureThreshold }}
          resources:
            {{- if $gpuEnabled }}
            # GPU resources - request nvidia.com/gpu
            limits:
              {{- if .Values.ollama.resources.limits }}
              {{- toYaml .Values.ollama.resources.limits | nindent 14 }}
              {{- end }}
              nvidia.com/gpu: {{ .Values.ollama.gpu.count | default 1 | quote }}
            requests:
              {{- if .Values.ollama.resources.requests }}
              {{- toYaml .Values.ollama.resources.requests | nindent 14 }}
              {{- end }}
              nvidia.com/gpu: {{ .Values.ollama.gpu.count | default 1 | quote }}
            {{- else }}
            # CPU-only resources
            {{- toYaml .Values.ollama.resources | nindent 12 }}
            {{- end }}
      volumes:
        - name: ollama-data
          {{- if .Values.ollama.persistence.enabled }}
          persistentVolumeClaim:
            {{- if .Values.ollama.persistence.existingClaim }}
            claimName: {{ .Values.ollama.persistence.existingClaim }}
            {{- else if .Values.ollama.persistence.standalone }}
            claimName: ollama-models-data
            {{- else }}
            claimName: {{ printf "%s-ollama" (include "openagentic.fullname" .) }}
            {{- end }}
          {{- else }}
          emptyDir: {}
          {{- end }}
        {{- if .Values.ollama.cdcCert.enabled }}
        - name: your-env-cert
          configMap:
            name: {{ .Values.ollama.cdcCert.configMapName | default "your-env-ca-cert" }}
        - name: certs
          emptyDir: {}
        {{- end }}
{{- end }}
