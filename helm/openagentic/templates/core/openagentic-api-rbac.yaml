

{{- if .Values.networkAdmin.enabled }}
# API Network Admin RBAC
# Grants the API service account access to manage NetworkPolicies
# for the admin console's Network Security panel.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "openagentic.fullname" . }}-api-network-admin
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "openagentic.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
rules:
  # NetworkPolicy management
  - apiGroups: ["networking.k8s.io"]
    resources: ["networkpolicies"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Read-only access for service/pod discovery
  - apiGroups: [""]
    resources: ["pods", "services", "namespaces"]
    verbs: ["get", "list"]
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "openagentic.fullname" . }}-api-network-admin
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "openagentic.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
subjects:
  - kind: ServiceAccount
    name: {{ include "openagentic.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: Role
  name: {{ include "openagentic.fullname" . }}-api-network-admin
  apiGroup: rbac.authorization.k8s.io
{{- end }}
