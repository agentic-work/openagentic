# Proprietary and confidential. Unauthorized copying prohibited.

{{- if .Values.openagenticProxy.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "openagentic.fullname" . }}-openagentic-proxy
  labels:
    {{- include "openagentic.labels" . | nindent 4 }}
    app.kubernetes.io/component: openagentic-proxy
spec:
  type: {{ .Values.openagenticProxy.service.type | default "ClusterIP" }}
  ports:
    - port: {{ .Values.openagenticProxy.service.port | default 3300 }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "openagentic.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: openagentic-proxy
{{- end }}
