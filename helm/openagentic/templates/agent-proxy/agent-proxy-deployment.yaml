

{{- if .Values.openagenticProxy.enabled }}
# ===================================================================================================
# AGENT-PROXY DEPLOYMENT
# ===================================================================================================
# Handles all agent orchestration decoupled from the main API.
# Supports parallel, sequential, supervisor, and hierarchical orchestration strategies.
# Communicates with MCP Proxy for tool execution and LLM providers for completions.
# ===================================================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "openagentic.fullname" . }}-openagentic-proxy
  labels:
    {{- include "openagentic.labels" . | nindent 4 }}
    app.kubernetes.io/component: openagentic-proxy
spec:
  replicas: {{ .Values.openagenticProxy.replicaCount | default 1 }}
  selector:
    matchLabels:
      {{- include "openagentic.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: openagentic-proxy
  template:
    metadata:
      labels:
        {{- include "openagentic.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: openagentic-proxy
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "{{ .Values.openagenticProxy.service.port | default 3300 }}"
        prometheus.io/path: "/metrics"
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "openagentic.serviceAccountName" . }}
      containers:
        - name: openagentic-proxy
          image: "{{ .Values.openagenticProxy.image.repository }}:{{ .Values.openagenticProxy.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.openagenticProxy.image.pullPolicy | default "Always" }}
          ports:
            - name: http
              containerPort: {{ .Values.openagenticProxy.service.port | default 3300 }}
              protocol: TCP
          env:
            - name: PORT
              value: "{{ .Values.openagenticProxy.service.port | default 3300 }}"
            - name: NODE_ENV
              value: {{ .Values.env.NODE_ENV | default "production" | quote }}
            # IMPORTANT: REDIS_PASSWORD must come BEFORE REDIS_URL for $(REDIS_PASSWORD) substitution to work
            - name: REDIS_PASSWORD
              {{- if .Values.openagenticProxy.useInlineSecrets }}
              value: {{ include "openagentic.redis.password" . | quote }}
              {{- else }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-redis
                  key: redis-password
              {{- end }}
            - name: REDIS_URL
              {{- if .Values.openagenticProxy.useInlineSecrets }}
              value: {{ include "openagentic.redis.url" . | quote }}
              {{- else }}
              value: "redis://:$(REDIS_PASSWORD)@{{ include "openagentic.redis.serviceName" . }}:6379"
              {{- end }}
            - name: MCP_PROXY_URL
              value: {{ .Values.openagenticProxy.env.MCP_PROXY_URL | default (printf "http://%s-mcp-proxy:%s" (include "openagentic.fullname" .) (toString (.Values.mcpProxy.service.port | default 5001))) | quote }}
            - name: API_URL
              value: {{ .Values.openagenticProxy.env.API_URL | default (printf "http://%s-api:%s" (include "openagentic.fullname" .) (toString (.Values.api.service.port | default 8000))) | quote }}
            - name: INTERNAL_SERVICE_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "openagentic.fullname" . }}-api-secrets
                  key: INTERNAL_SERVICE_SECRET
                  optional: true
            - name: OPENAGENTIC_PROXY_INTERNAL_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "openagentic.fullname" . }}-api-secrets
                  key: OPENAGENTIC_PROXY_INTERNAL_KEY
            - name: OPENAGENTIC_PROXY_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "openagentic.fullname" . }}-api-secrets
                  key: API_SECRET_KEY
                  optional: true
            - name: LOG_LEVEL
              value: {{ .Values.openagenticProxy.env.LOG_LEVEL | default "info" | quote }}
            {{- with .Values.openagenticProxy.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          livenessProbe:
            httpGet:
              path: /api/agents/health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/agents/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            {{- toYaml (.Values.openagenticProxy.resources | default (dict "requests" (dict "cpu" "250m" "memory" "256Mi") "limits" (dict "cpu" "1000m" "memory" "1Gi"))) | nindent 12 }}
      {{- with .Values.openagenticProxy.nodeSelector | default .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.openagenticProxy.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
