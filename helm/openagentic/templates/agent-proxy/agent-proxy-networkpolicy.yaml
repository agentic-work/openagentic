

{{- if and .Values.openagenticProxy.enabled (.Values.openagenticProxy.networkPolicy).enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "openagentic.fullname" . }}-openagentic-proxy
  labels:
    {{- include "openagentic.labels" . | nindent 4 }}
    app.kubernetes.io/component: openagentic-proxy
spec:
  podSelector:
    matchLabels:
      {{- include "openagentic.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: openagentic-proxy
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow from API (delegated agent execution)
    - from:
        - podSelector:
            matchLabels:
              {{- include "openagentic.selectorLabels" . | nindent 14 }}
              app.kubernetes.io/component: api
      ports:
        - protocol: TCP
          port: {{ .Values.openagenticProxy.service.port | default 3300 }}
    # Allow from UI (nginx proxy for /api/agents/*)
    - from:
        - podSelector:
            matchLabels:
              {{- include "openagentic.selectorLabels" . | nindent 14 }}
              app.kubernetes.io/component: ui
      ports:
        - protocol: TCP
          port: {{ .Values.openagenticProxy.service.port | default 3300 }}
    # Allow from runner pods (code mode agent delegation)
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: runner
              app.kubernetes.io/managed-by: openagentic-manager
      ports:
        - protocol: TCP
          port: {{ .Values.openagenticProxy.service.port | default 3300 }}
    {{- if .Values.grafana.enabled }}
    # Allow Prometheus to scrape /metrics
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.grafana.namespace }}
          podSelector:
            matchLabels:
              app: prometheus
      ports:
        - protocol: TCP
          port: 3300
    {{- end }}
  egress:
    # DNS
    - to:
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # API (for LLM completions and skills persistence)
    - to:
        - podSelector:
            matchLabels:
              {{- include "openagentic.selectorLabels" . | nindent 14 }}
              app.kubernetes.io/component: api
      ports:
        - protocol: TCP
          port: {{ .Values.api.service.port | default 8000 }}
    # MCP Proxy (for tool execution)
    - to:
        - podSelector:
            matchLabels:
              {{- include "openagentic.selectorLabels" . | nindent 14 }}
              app.kubernetes.io/component: mcp-proxy
      ports:
        - protocol: TCP
          port: {{ .Values.mcpProxy.service.port | default 8080 }}
    # Redis (for SSE relay pub/sub)
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: redis
      ports:
        - protocol: TCP
          port: 6379
{{- end }}
