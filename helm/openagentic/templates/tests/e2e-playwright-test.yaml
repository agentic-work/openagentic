# Proprietary and confidential. Unauthorized copying prohibited.

# ===================================================================================================
# OPENAGENTIC E2E PLAYWRIGHT TEST JOB
# ===================================================================================================
# Comprehensive E2E testing using headless Playwright to validate:
# - Chat functionality with LLM responses
# - OpenAgentic Flows (workflow engine)
# - Code Mode (Openagentic)
#
# This job:
# 1. Creates a test user in the database
# 2. Runs headless Playwright tests
# 3. Reports detailed results for CI/CD iteration
#
# Invoke via:
#   kubectl create job e2e-$(date +%s) --from=cronjob/openagentic-e2e-test -n openagentic
#
# For AKS:
#   az aks command invoke -g <rg> -n <cluster> \
#     --command "kubectl create job e2e-$(date +%s) --from=cronjob/openagentic-e2e-test -n openagentic"
# ===================================================================================================
{{- if .Values.tests.enabled }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "openagentic.fullname" . }}-e2e-test-script
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "openagentic.labels" . | nindent 4 }}
data:
  e2e-test.js: |
    const { chromium } = require('playwright');

    const BASE_URL = process.env.BASE_URL || 'http://openagentic-ui';
    const API_URL = process.env.API_URL || 'http://openagentic-api:8000';
    const TEST_EMAIL = process.env.TEST_EMAIL || 'e2e-test@openagentic.io';
    const TEST_PASSWORD = process.env.TEST_PASSWORD || 'E2ETestPassword123!';

    let results = {
      timestamp: new Date().toISOString(),
      tests: [],
      summary: { passed: 0, failed: 0, skipped: 0 }
    };

    function log(msg) {
      console.log(`[${new Date().toISOString()}] ${msg}`);
    }

    function addResult(name, status, duration, details = '') {
      results.tests.push({ name, status, duration, details });
      results.summary[status]++;
      const icon = status === 'passed' ? '✓' : status === 'failed' ? '✗' : '⚠';
      log(`${icon} ${name} (${duration}ms)${details ? ': ' + details : ''}`);
    }

    async function runTest(name, testFn) {
      const start = Date.now();
      try {
        await testFn();
        addResult(name, 'passed', Date.now() - start);
      } catch (error) {
        addResult(name, 'failed', Date.now() - start, error.message);
      }
    }

    async function main() {
      log('╔══════════════════════════════════════════════════════════════════╗');
      log('║     OPENAGENTIC E2E PLAYWRIGHT TESTS                             ║');
      log('╚══════════════════════════════════════════════════════════════════╝');
      log('');
      log(`Base URL: ${BASE_URL}`);
      log(`API URL: ${API_URL}`);
      log(`Test User: ${TEST_EMAIL}`);
      log('');

      const browser = await chromium.launch({
        headless: true,
        args: ['--no-sandbox', '--disable-setuid-sandbox', '--disable-dev-shm-usage']
      });

      const context = await browser.newContext({
        viewport: { width: 1920, height: 1080 },
        ignoreHTTPSErrors: true
      });

      const page = await context.newPage();

      try {
        // =============================================
        // TEST 1: Login Page Loads
        // =============================================
        log('┌──────────────────────────────────────────────────────────────────┐');
        log('│  SECTION 1: AUTHENTICATION                                       │');
        log('└──────────────────────────────────────────────────────────────────┘');

        await runTest('Login page loads', async () => {
          await page.goto(BASE_URL, { waitUntil: 'networkidle', timeout: 30000 });
          await page.waitForSelector('button, input[type="email"], input[type="password"]', { timeout: 10000 });
        });

        // =============================================
        // TEST 2: Login with Test User
        // =============================================
        await runTest('Login with test user', async () => {
          // Look for Local login button
          const localBtn = await page.$('button:has-text("Local")');
          if (localBtn) {
            await localBtn.click();
            await page.waitForTimeout(1000);
          }

          // Fill credentials
          await page.fill('input[type="email"], input[name="email"]', TEST_EMAIL);
          await page.fill('input[type="password"], input[name="password"]', TEST_PASSWORD);

          // Click sign in
          const signInBtn = await page.$('button:has-text("Sign In"), button:has-text("Login"), button[type="submit"]');
          if (signInBtn) {
            await signInBtn.click();
          }

          // Wait for redirect to chat
          await page.waitForURL(/.*chat|.*dashboard|.*\/$/i, { timeout: 15000 });
        });

        // =============================================
        // TEST 3: Dismiss Onboarding
        // =============================================
        await runTest('Dismiss onboarding modal', async () => {
          await page.waitForTimeout(2000);
          const skipBtn = await page.$('button:has-text("Skip"), button:has-text("Close"), [aria-label="Close"]');
          if (skipBtn) {
            await skipBtn.click();
            await page.waitForTimeout(500);
          }
        });

        // =============================================
        // SECTION 2: CHAT FUNCTIONALITY
        // =============================================
        log('');
        log('┌──────────────────────────────────────────────────────────────────┐');
        log('│  SECTION 2: CHAT FUNCTIONALITY                                   │');
        log('└──────────────────────────────────────────────────────────────────┘');

        await runTest('Chat interface visible', async () => {
          await page.waitForSelector('[data-testid="chat-input"], textarea, input[placeholder*="message"]', { timeout: 10000 });
        });

        await runTest('Send chat message', async () => {
          const input = await page.$('[data-testid="chat-input"], textarea, input[placeholder*="message"]');
          if (!input) throw new Error('Chat input not found');

          await input.fill('Hello, this is an E2E test. Please respond with "TEST_OK".');
          await page.keyboard.press('Enter');

          // Wait for response
          await page.waitForTimeout(5000);
        });

        await runTest('Receive LLM response', async () => {
          // Look for any response content
          const response = await page.waitForSelector('[data-testid="message-content"], .message-bubble, .assistant-message', { timeout: 30000 });
          const text = await response.textContent();
          if (!text || text.length < 5) throw new Error('Empty or no response received');
        });

        // =============================================
        // SECTION 3: WORKFLOWS (OpenAgentic Flows)
        // =============================================
        log('');
        log('┌──────────────────────────────────────────────────────────────────┐');
        log('│  SECTION 3: OPENAGENTIC FLOWS                                    │');
        log('└──────────────────────────────────────────────────────────────────┘');

        await runTest('Navigate to Workflows', async () => {
          const workflowsLink = await page.$('a[href*="workflow"], button:has-text("Workflows"), button:has-text("Flows"), [data-testid="workflows-link"]');
          if (workflowsLink) {
            await workflowsLink.click();
            await page.waitForTimeout(3000);
          } else {
            throw new Error('Workflows link not found');
          }
        });

        await runTest('Flows interface loads', async () => {
          // Check if OpenAgentic Flows canvas or workflow list loads
          await page.waitForSelector('[data-testid="flows-container"], .react-flow, .workflow-canvas', { timeout: 10000 });
        });

        // =============================================
        // SECTION 4: CODE MODE (if accessible)
        // =============================================
        log('');
        log('┌──────────────────────────────────────────────────────────────────┐');
        log('│  SECTION 4: CODE MODE                                            │');
        log('└──────────────────────────────────────────────────────────────────┘');

        await runTest('Navigate to Code Mode', async () => {
          const codeLink = await page.$('a[href*="code"], button:has-text("Code"), [data-testid="code-mode-link"]');
          if (codeLink) {
            await codeLink.click();
            await page.waitForTimeout(3000);
          } else {
            throw new Error('Code Mode link not found');
          }
        });

        await runTest('Code Mode initializes', async () => {
          // Look for initialization checklist or VS Code interface
          await page.waitForSelector('[data-testid="code-mode"], .code-editor, iframe[src*="code-server"], .monaco-editor', { timeout: 30000 });
        });

        // =============================================
        // SECTION 5: ABOUT MODAL
        // =============================================
        log('');
        log('┌──────────────────────────────────────────────────────────────────┐');
        log('│  SECTION 5: ABOUT MODAL                                          │');
        log('└──────────────────────────────────────────────────────────────────┘');

        await runTest('Open About modal', async () => {
          // Navigate back to chat first
          await page.goto(BASE_URL, { waitUntil: 'networkidle' });
          await page.waitForTimeout(2000);

          const aboutLink = await page.$('button:has-text("About"), a:has-text("About"), [data-testid="about-link"]');
          if (aboutLink) {
            await aboutLink.click();
            await page.waitForTimeout(1000);
          } else {
            throw new Error('About link not found');
          }
        });

        await runTest('About modal displays version', async () => {
          await page.waitForSelector('text=/Version|v[0-9]/i', { timeout: 5000 });
        });

      } catch (error) {
        log(`FATAL ERROR: ${error.message}`);
        addResult('Test Suite Execution', 'failed', 0, error.message);
      } finally {
        await browser.close();
      }

      // =============================================
      // RESULTS SUMMARY
      // =============================================
      log('');
      log('╔══════════════════════════════════════════════════════════════════╗');
      log('║                        TEST RESULTS                              ║');
      log('╠══════════════════════════════════════════════════════════════════╣');
      log(`║  ✓ Passed:  ${String(results.summary.passed).padEnd(4)}                                              ║`);
      log(`║  ✗ Failed:  ${String(results.summary.failed).padEnd(4)}                                              ║`);
      log(`║  ⚠ Skipped: ${String(results.summary.skipped).padEnd(4)}                                              ║`);
      log('╠══════════════════════════════════════════════════════════════════╣');

      const total = results.summary.passed + results.summary.failed;
      const percent = total > 0 ? Math.round((results.summary.passed / total) * 100) : 0;

      if (results.summary.failed === 0) {
        log('║  Status: ALL TESTS PASSED ✓                                     ║');
      } else if (percent >= 70) {
        log(`║  Status: MOSTLY PASSING (${percent}%)                                    ║`);
      } else {
        log(`║  Status: TESTS FAILING (${percent}%)                                     ║`);
      }
      log('╚══════════════════════════════════════════════════════════════════╝');

      // Output JSON for parsing
      log('');
      log('=== JSON RESULTS ===');
      console.log(JSON.stringify(results, null, 2));
      log('=== END JSON ===');

      process.exit(results.summary.failed > 0 ? 1 : 0);
    }

    main().catch(err => {
      console.error('Fatal:', err);
      process.exit(1);
    });

  setup-test-user.sh: |
    #!/bin/sh
    # Create test user in database
    set -e

    echo "Creating E2E test user..."

    # Hash password (bcrypt compatible)
    PASSWORD_HASH='$2b$10$E2ETestHashedPasswordForTesting123456789012'

    PGPASSWORD="${POSTGRES_PASSWORD}" psql -h "${POSTGRES_HOST}" -U "${POSTGRES_USER}" -d "${POSTGRES_DB}" <<EOF
    INSERT INTO users (id, email, name, password_hash, is_admin, is_active, force_password_change, theme, settings, accessibility_settings, ui_preferences, code_enabled, created_at, updated_at)
    VALUES (
      'e2e-test-user-$(date +%s)',
      '${TEST_EMAIL}',
      'E2E Test User',
      '${PASSWORD_HASH}',
      false,
      true,
      false,
      'dark',
      '{}',
      '{}',
      '{}',
      true,
      NOW(),
      NOW()
    )
    ON CONFLICT (email) DO UPDATE SET
      is_active = true,
      force_password_change = false,
      code_enabled = true,
      updated_at = NOW();
    EOF

    echo "Test user created/updated: ${TEST_EMAIL}"
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "openagentic.fullname" . }}-e2e-test
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "openagentic.labels" . | nindent 4 }}
    app.kubernetes.io/component: e2e-test
spec:
  schedule: "0 0 31 2 *"  # Never runs automatically
  suspend: true
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 1800
      backoffLimit: 0
      template:
        metadata:
          labels:
            {{- include "openagentic.selectorLabels" . | nindent 12 }}
            app.kubernetes.io/component: e2e-test
        spec:
          restartPolicy: Never
          {{- with .Values.imagePullSecrets }}
          imagePullSecrets:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          initContainers:
            # Create test user in database
            - name: setup-user
              image: postgres:15-alpine
              env:
                - name: POSTGRES_HOST
                  value: "{{ include "openagentic.fullname" . }}-postgres"
                - name: POSTGRES_USER
                  value: "openagentic"
                - name: POSTGRES_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: {{ include "openagentic.fullname" . }}-secrets
                      key: postgresPassword
                      optional: true
                - name: POSTGRES_DB
                  value: "openagentic"
                - name: TEST_EMAIL
                  value: "{{ .Values.tests.e2e.testEmail | default "e2e-test@openagentic.io" }}"
              command: ["/bin/sh", "-c"]
              args:
                - |
                  # Wait for postgres
                  until pg_isready -h $POSTGRES_HOST -U $POSTGRES_USER; do
                    echo "Waiting for postgres..."
                    sleep 2
                  done

                  # Create test user
                  PGPASSWORD="${POSTGRES_PASSWORD:-openagentic123}" psql -h "$POSTGRES_HOST" -U "$POSTGRES_USER" -d "$POSTGRES_DB" <<EOF
                  INSERT INTO users (id, email, name, password_hash, is_admin, is_active, force_password_change, theme, settings, accessibility_settings, ui_preferences, code_enabled, created_at, updated_at)
                  VALUES (
                    'e2e-test-user-$(date +%s)',
                    '$TEST_EMAIL',
                    'E2E Test User',
                    '\$2b\$10\$rGxLDr.oKNq3GVH8XlYlAOt0nLDJPH7zKSJpVVNqDq7DKfZOlQ1hy',
                    true,
                    true,
                    false,
                    'dark',
                    '{}',
                    '{}',
                    '{}',
                    true,
                    NOW(),
                    NOW()
                  )
                  ON CONFLICT (email) DO UPDATE SET
                    is_active = true,
                    is_admin = true,
                    force_password_change = false,
                    code_enabled = true,
                    updated_at = NOW();
                  EOF

                  echo "✓ Test user created: $TEST_EMAIL"
          containers:
            - name: playwright
              image: mcr.microsoft.com/playwright:v1.40.0-jammy
              env:
                - name: BASE_URL
                  value: "http://{{ include "openagentic.fullname" . }}-ui"
                - name: API_URL
                  value: "http://{{ include "openagentic.fullname" . }}-api:8000"
                - name: TEST_EMAIL
                  value: "{{ .Values.tests.e2e.testEmail | default "e2e-test@openagentic.io" }}"
                - name: TEST_PASSWORD
                  value: "{{ .Values.tests.e2e.testPassword | default "E2ETest123!" }}"
              command: ["/bin/sh", "-c"]
              args:
                - |
                  echo "Installing dependencies..."
                  npm init -y > /dev/null 2>&1
                  npm install playwright@1.40.0 > /dev/null 2>&1

                  echo "Running E2E tests..."
                  cat > /tmp/test.js << 'TESTEOF'
                  const { chromium } = require('playwright');

                  const BASE_URL = process.env.BASE_URL || 'http://openagentic-ui';
                  const TEST_EMAIL = process.env.TEST_EMAIL;
                  const TEST_PASSWORD = process.env.TEST_PASSWORD;

                  let passed = 0, failed = 0;

                  function log(msg) { console.log(`[E2E] ${msg}`); }
                  function pass(name, ms) { passed++; log(`✓ ${name} (${ms}ms)`); }
                  function fail(name, err) { failed++; log(`✗ ${name}: ${err}`); }

                  async function test(name, fn) {
                    const start = Date.now();
                    try {
                      await fn();
                      pass(name, Date.now() - start);
                    } catch (e) {
                      fail(name, e.message);
                    }
                  }

                  (async () => {
                    log('╔═══════════════════════════════════════════════════════════╗');
                    log('║     OPENAGENTIC E2E TESTS                                 ║');
                    log('╚═══════════════════════════════════════════════════════════╝');
                    log(`URL: ${BASE_URL} | User: ${TEST_EMAIL}`);

                    const browser = await chromium.launch({
                      headless: true,
                      args: ['--no-sandbox', '--disable-setuid-sandbox']
                    });
                    const page = await browser.newPage();

                    log('─── AUTHENTICATION ───');
                    await test('Page loads', async () => {
                      await page.goto(BASE_URL, { waitUntil: 'networkidle', timeout: 30000 });
                    });

                    await test('Login form visible', async () => {
                      const localBtn = await page.$('button:has-text("Local")');
                      if (localBtn) await localBtn.click();
                      await page.waitForSelector('input[type="email"], input[type="password"]', { timeout: 10000 });
                    });

                    await test('Login successful', async () => {
                      await page.fill('input[type="email"]', TEST_EMAIL);
                      await page.fill('input[type="password"]', TEST_PASSWORD);
                      await page.click('button[type="submit"], button:has-text("Sign")');
                      await page.waitForTimeout(5000);
                      // Dismiss any modals
                      const skip = await page.$('button:has-text("Skip")');
                      if (skip) await skip.click();
                    });

                    log('─── CHAT ───');
                    await test('Chat interface loads', async () => {
                      await page.waitForSelector('textarea, input[placeholder*="message"], [data-testid="chat-input"]', { timeout: 15000 });
                    });

                    await test('Send message', async () => {
                      const input = await page.$('textarea, [data-testid="chat-input"]');
                      await input.fill('Say TEST_OK');
                      await page.keyboard.press('Enter');
                      await page.waitForTimeout(3000);
                    });

                    await test('Response received', async () => {
                      await page.waitForSelector('.message, [data-testid="assistant-message"]', { timeout: 60000 });
                    });

                    log('─── FLOWS ───');
                    await test('Navigate to Workflows', async () => {
                      const link = await page.$('a[href*="workflow"], button:has-text("Workflow"), button:has-text("Flows")');
                      if (!link) throw new Error('Workflows link not found');
                      await link.click();
                      await page.waitForTimeout(3000);
                    });

                    await test('Flows interface loads', async () => {
                      await page.waitForSelector('.react-flow, [data-testid="flows-container"], .workflow-canvas', { timeout: 15000 });
                    });

                    log('─── CODE MODE ───');
                    await test('Navigate to Code', async () => {
                      const link = await page.$('a[href*="code"], button:has-text("Code")');
                      if (!link) throw new Error('Code link not found');
                      await link.click();
                      await page.waitForTimeout(5000);
                    });

                    await test('Code Mode loads', async () => {
                      await page.waitForSelector('[data-testid="code-mode"], iframe, .monaco-editor', { timeout: 30000 });
                    });

                    await browser.close();

                    log('');
                    log('╔═══════════════════════════════════════════════════════════╗');
                    log(`║  RESULTS: ${passed} passed, ${failed} failed                          ║`);
                    log('╚═══════════════════════════════════════════════════════════╝');

                    process.exit(failed > 0 ? 1 : 0);
                  })();
                  TESTEOF

                  node /tmp/test.js
              resources:
                requests:
                  cpu: "500m"
                  memory: "1Gi"
                limits:
                  cpu: "2000m"
                  memory: "2Gi"
{{- end }}
