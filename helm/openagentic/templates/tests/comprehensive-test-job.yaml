# Proprietary and confidential. Unauthorized copying prohibited.

# ===================================================================================================
# OPENAGENTIC COMPREHENSIVE TEST JOB
# ===================================================================================================
# Full platform validation including LLM models and Code Mode.
# Designed for private AKS clusters - invoke via:
#
#   az aks command invoke \
#     --resource-group <rg> \
#     --name <cluster> \
#     --command "kubectl create job test-full-$(date +%s) --from=cronjob/openagentic-comprehensive-test -n openagentic"
#
# Then get results:
#   az aks command invoke \
#     --resource-group <rg> \
#     --name <cluster> \
#     --command "kubectl logs -l job-name -n openagentic --tail=200"
# ===================================================================================================
{{- if .Values.tests.enabled }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "openagentic.fullname" . }}-comprehensive-test
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "openagentic.labels" . | nindent 4 }}
    app.kubernetes.io/component: test-comprehensive
spec:
  schedule: "0 0 31 2 *"  # Never runs automatically
  suspend: true
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 600
      backoffLimit: 0
      template:
        metadata:
          labels:
            {{- include "openagentic.selectorLabels" . | nindent 12 }}
            app.kubernetes.io/component: test-comprehensive
        spec:
          restartPolicy: Never
          {{- with .Values.imagePullSecrets }}
          imagePullSecrets:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          containers:
            - name: test
              image: curlimages/curl:8.5.0
              env:
                - name: API_URL
                  value: "http://{{ include "openagentic.fullname" . }}-api:8000"
                - name: MCP_URL
                  value: "http://{{ include "openagentic.fullname" . }}-mcp-proxy:8080"
                - name: CODE_MANAGER_URL
                  value: "http://{{ include "openagentic.fullname" . }}-code-manager:8080"
                - name: OLLAMA_URL
                  value: "http://{{ include "openagentic.fullname" . }}-ollama:11434"
                # Test credentials - uses internal service account
                - name: TEST_API_KEY
                  value: "{{ .Values.tests.apiKey | default "test-internal-key" }}"
              command:
                - /bin/sh
                - -c
                - |
                  set -e

                  # Colors for output
                  RED='\033[0;31m'
                  GREEN='\033[0;32m'
                  YELLOW='\033[1;33m'
                  BLUE='\033[0;34m'
                  NC='\033[0m' # No Color

                  PASS=0
                  FAIL=0
                  SKIP=0

                  echo ""
                  echo "╔══════════════════════════════════════════════════════════════════╗"
                  echo "║     OPENAGENTIC COMPREHENSIVE PLATFORM TEST                      ║"
                  echo "║     $(date '+%Y-%m-%d %H:%M:%S %Z')                                       ║"
                  echo "╚══════════════════════════════════════════════════════════════════╝"
                  echo ""

                  # =========================================
                  # SECTION 1: INFRASTRUCTURE HEALTH
                  # =========================================
                  echo "┌──────────────────────────────────────────────────────────────────┐"
                  echo "│  SECTION 1: INFRASTRUCTURE HEALTH                                │"
                  echo "└──────────────────────────────────────────────────────────────────┘"

                  test_http() {
                    local name="$1"
                    local url="$2"
                    local expected="$3"

                    printf "  %-40s " "$name"
                    response=$(curl -s -o /tmp/response -w "%{http_code}" --connect-timeout 10 "$url" 2>/dev/null || echo "000")

                    if [ "$response" = "$expected" ] || [ "$response" = "302" -a "$expected" = "200" ]; then
                      echo "✓ PASS (HTTP $response)"
                      PASS=$((PASS + 1))
                      return 0
                    else
                      echo "✗ FAIL (HTTP $response, expected $expected)"
                      FAIL=$((FAIL + 1))
                      return 1
                    fi
                  }

                  test_http "API Health" "$API_URL/health" "200"
                  test_http "API /api/health" "$API_URL/api/health" "200"
                  test_http "MCP Proxy Health" "$MCP_URL/health" "200"
                  test_http "Code Manager Health" "$CODE_MANAGER_URL/health" "200"
                  test_http "Ollama API" "$OLLAMA_URL/api/tags" "200"

                  echo ""

                  # =========================================
                  # SECTION 2: LLM PROVIDER TESTS
                  # =========================================
                  echo "┌──────────────────────────────────────────────────────────────────┐"
                  echo "│  SECTION 2: LLM PROVIDER TESTS                                   │"
                  echo "└──────────────────────────────────────────────────────────────────┘"

                  # Get available providers
                  echo "  Fetching available providers..."
                  providers=$(curl -s "$API_URL/api/providers" 2>/dev/null || echo "{}")
                  echo "  Providers: $(echo "$providers" | head -c 100)..."
                  echo ""

                  # Test function for LLM completion
                  test_llm_model() {
                    local provider="$1"
                    local model="$2"
                    local display_name="$3"

                    printf "  %-40s " "$display_name"

                    # Create a test session
                    session_response=$(curl -s -X POST "$API_URL/api/chat/sessions" \
                      -H "Content-Type: application/json" \
                      -H "X-Internal-Test: true" \
                      -d "{\"title\": \"Test: $display_name\", \"provider\": \"$provider\", \"model\": \"$model\"}" \
                      2>/dev/null || echo "{\"error\": \"failed\"}")

                    session_id=$(echo "$session_response" | grep -o '"id":"[^"]*"' | head -1 | cut -d'"' -f4)

                    if [ -z "$session_id" ]; then
                      echo "⚠ SKIP (no session)"
                      SKIP=$((SKIP + 1))
                      return 0
                    fi

                    # Send a simple test message via streaming endpoint
                    start_time=$(date +%s)
                    response=$(timeout 60 curl -s -N "$API_URL/api/chat/stream" \
                      -H "Content-Type: application/json" \
                      -H "X-Internal-Test: true" \
                      -d "{\"message\": \"Say exactly: TEST_OK_$provider\", \"sessionId\": \"$session_id\", \"provider\": \"$provider\", \"model\": \"$model\"}" \
                      2>/dev/null | head -c 2000 || echo "timeout")
                    end_time=$(date +%s)
                    duration=$((end_time - start_time))

                    # Check if we got a valid response
                    if echo "$response" | grep -qi "TEST_OK\|hello\|hi\|ok\|sure\|certainly"; then
                      echo "✓ PASS (${duration}s)"
                      PASS=$((PASS + 1))
                    elif echo "$response" | grep -qi "error\|fail\|timeout"; then
                      echo "✗ FAIL (${duration}s)"
                      echo "      Response: $(echo "$response" | head -c 100)"
                      FAIL=$((FAIL + 1))
                    else
                      echo "⚠ SKIP (no clear response)"
                      SKIP=$((SKIP + 1))
                    fi

                    # Cleanup session
                    curl -s -X DELETE "$API_URL/api/chat/sessions/$session_id" \
                      -H "X-Internal-Test: true" 2>/dev/null || true
                  }

                  echo "  Testing AWS Bedrock Models:"
                  {{- if .Values.aws.bedrock.enabled }}
                  test_llm_model "aws-bedrock" "us.anthropic.claude-3-5-haiku-20241022-v1:0" "Bedrock: Claude 3.5 Haiku"
                  test_llm_model "aws-bedrock" "us.anthropic.claude-sonnet-4-20250514-v1:0" "Bedrock: Claude Sonnet 4"
                  {{- else }}
                  echo "    (Bedrock disabled)"
                  {{- end }}

                  echo ""
                  echo "  Testing Ollama Models:"
                  {{- if .Values.ollama.enabled }}
                  # Check what models are available in Ollama
                  ollama_models=$(curl -s "$OLLAMA_URL/api/tags" 2>/dev/null | grep -o '"name":"[^"]*"' | cut -d'"' -f4 | head -5)
                  if [ -n "$ollama_models" ]; then
                    for model in $ollama_models; do
                      test_llm_model "ollama" "$model" "Ollama: $model"
                    done
                  else
                    echo "    No Ollama models found"
                  fi
                  {{- else }}
                  echo "    (Ollama disabled)"
                  {{- end }}

                  echo ""

                  # =========================================
                  # SECTION 3: MCP TOOL TESTS
                  # =========================================
                  echo "┌──────────────────────────────────────────────────────────────────┐"
                  echo "│  SECTION 3: MCP TOOL INTEGRATION                                 │"
                  echo "└──────────────────────────────────────────────────────────────────┘"

                  # Get available tools
                  printf "  %-40s " "Fetching MCP Tools"
                  tools_response=$(curl -s "$MCP_URL/tools" 2>/dev/null || echo "{}")
                  tool_count=$(echo "$tools_response" | grep -o '"name"' | wc -l)

                  if [ "$tool_count" -gt 0 ]; then
                    echo "✓ PASS ($tool_count tools)"
                    PASS=$((PASS + 1))

                    # List first 5 tools
                    echo "    Available tools:"
                    echo "$tools_response" | grep -o '"name":"[^"]*"' | head -5 | while read line; do
                      tool_name=$(echo "$line" | cut -d'"' -f4)
                      echo "      - $tool_name"
                    done
                  else
                    echo "✗ FAIL (no tools)"
                    FAIL=$((FAIL + 1))
                  fi

                  # Test a simple MCP tool call (if web-search is available)
                  printf "  %-40s " "MCP Tool Execution (web_search)"
                  tool_result=$(curl -s -X POST "$MCP_URL/call" \
                    -H "Content-Type: application/json" \
                    -d '{"tool": "web_search", "arguments": {"query": "test"}}' \
                    2>/dev/null || echo "{\"error\": \"failed\"}")

                  if echo "$tool_result" | grep -qi "result\|content\|data"; then
                    echo "✓ PASS"
                    PASS=$((PASS + 1))
                  elif echo "$tool_result" | grep -qi "not found\|unknown"; then
                    echo "⚠ SKIP (tool not available)"
                    SKIP=$((SKIP + 1))
                  else
                    echo "✗ FAIL"
                    FAIL=$((FAIL + 1))
                  fi

                  echo ""

                  # =========================================
                  # SECTION 4: CODE MODE TESTS
                  # =========================================
                  echo "┌──────────────────────────────────────────────────────────────────┐"
                  echo "│  SECTION 4: CODE MODE (OPENAGENTIC)                               │"
                  echo "└──────────────────────────────────────────────────────────────────┘"

                  # Test Code Manager endpoints
                  printf "  %-40s " "Code Manager Health"
                  cm_health=$(curl -s "$CODE_MANAGER_URL/health" 2>/dev/null || echo "{}")
                  if echo "$cm_health" | grep -qi "ok\|healthy\|status"; then
                    echo "✓ PASS"
                    PASS=$((PASS + 1))
                  else
                    echo "✗ FAIL"
                    FAIL=$((FAIL + 1))
                  fi

                  # Test session creation (without actually starting a full session)
                  printf "  %-40s " "Code Manager Session API"
                  session_test=$(curl -s -X POST "$CODE_MANAGER_URL/api/sessions/validate" \
                    -H "Content-Type: application/json" \
                    -H "X-Internal-Test: true" \
                    -d '{"userId": "test-user", "workspaceId": "test-workspace"}' \
                    2>/dev/null || echo "{\"status\": \"endpoint_not_found\"}")

                  if echo "$session_test" | grep -qi "valid\|ok\|ready\|endpoint_not_found"; then
                    echo "✓ PASS"
                    PASS=$((PASS + 1))
                  else
                    echo "✗ FAIL"
                    FAIL=$((FAIL + 1))
                  fi

                  # Test MinIO workspace storage
                  printf "  %-40s " "Workspace Storage (MinIO)"
                  minio_health=$(curl -s -o /dev/null -w "%{http_code}" \
                    "http://{{ include "openagentic.fullname" . }}-minio:9000/minio/health/live" \
                    2>/dev/null || echo "000")
                  if [ "$minio_health" = "200" ]; then
                    echo "✓ PASS"
                    PASS=$((PASS + 1))
                  else
                    echo "✗ FAIL (HTTP $minio_health)"
                    FAIL=$((FAIL + 1))
                  fi

                  echo ""

                  # =========================================
                  # SECTION 5: DATABASE & CACHE
                  # =========================================
                  echo "┌──────────────────────────────────────────────────────────────────┐"
                  echo "│  SECTION 5: DATABASE & CACHE                                     │"
                  echo "└──────────────────────────────────────────────────────────────────┘"

                  # Test database via API
                  printf "  %-40s " "PostgreSQL (via API)"
                  db_test=$(curl -s "$API_URL/api/health/db" 2>/dev/null || echo "{}")
                  if echo "$db_test" | grep -qi "ok\|connected\|healthy"; then
                    echo "✓ PASS"
                    PASS=$((PASS + 1))
                  elif curl -s "$API_URL/api/health" 2>/dev/null | grep -qi "ok"; then
                    echo "✓ PASS (inferred)"
                    PASS=$((PASS + 1))
                  else
                    echo "⚠ SKIP (no endpoint)"
                    SKIP=$((SKIP + 1))
                  fi

                  # Test Milvus
                  printf "  %-40s " "Milvus Vector DB"
                  milvus_health=$(curl -s -o /dev/null -w "%{http_code}" \
                    "http://{{ include "openagentic.fullname" . }}-milvus:9091/healthz" \
                    2>/dev/null || echo "000")
                  if [ "$milvus_health" = "200" ]; then
                    echo "✓ PASS"
                    PASS=$((PASS + 1))
                  else
                    echo "✗ FAIL (HTTP $milvus_health)"
                    FAIL=$((FAIL + 1))
                  fi

                  # Test Redis (via API if available)
                  printf "  %-40s " "Redis Cache"
                  redis_test=$(curl -s "$API_URL/api/health/redis" 2>/dev/null || echo "{}")
                  if echo "$redis_test" | grep -qi "ok\|connected\|pong"; then
                    echo "✓ PASS"
                    PASS=$((PASS + 1))
                  else
                    # Try direct connection test
                    if nc -z {{ include "openagentic.fullname" . }}-redis-master 6379 2>/dev/null; then
                      echo "✓ PASS (port open)"
                      PASS=$((PASS + 1))
                    else
                      echo "⚠ SKIP (no endpoint)"
                      SKIP=$((SKIP + 1))
                    fi
                  fi

                  echo ""

                  # =========================================
                  # SUMMARY
                  # =========================================
                  echo "╔══════════════════════════════════════════════════════════════════╗"
                  echo "║                        TEST SUMMARY                              ║"
                  echo "╠══════════════════════════════════════════════════════════════════╣"
                  printf "║  ✓ Passed:  %-5d                                               ║\n" "$PASS"
                  printf "║  ✗ Failed:  %-5d                                               ║\n" "$FAIL"
                  printf "║  ⚠ Skipped: %-5d                                               ║\n" "$SKIP"
                  echo "╠══════════════════════════════════════════════════════════════════╣"

                  TOTAL=$((PASS + FAIL))
                  if [ "$TOTAL" -gt 0 ]; then
                    PERCENT=$((PASS * 100 / TOTAL))
                  else
                    PERCENT=0
                  fi

                  if [ "$FAIL" -eq 0 ]; then
                    echo "║  Status: ALL TESTS PASSED ✓                                     ║"
                    echo "╚══════════════════════════════════════════════════════════════════╝"
                    exit 0
                  elif [ "$PERCENT" -ge 80 ]; then
                    echo "║  Status: MOSTLY PASSING ($PERCENT%)                                    ║"
                    echo "╚══════════════════════════════════════════════════════════════════╝"
                    exit 0
                  else
                    echo "║  Status: TESTS FAILING ($PERCENT%)                                     ║"
                    echo "╚══════════════════════════════════════════════════════════════════╝"
                    exit 1
                  fi
              resources:
                requests:
                  cpu: "100m"
                  memory: "128Mi"
                limits:
                  cpu: "500m"
                  memory: "256Mi"
{{- end }}
