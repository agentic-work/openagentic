apiVersion: v1
kind: Service
metadata:
  name: workflows
  labels:
    {{- include "openagentic.labels" . | nindent 4 }}
spec:
  selector:
    app: workflows
  ports:
    - port: 3400
      targetPort: 3400
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: workflows
  labels:
    {{- include "openagentic.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: workflows
  template:
    metadata:
      labels:
        app: workflows
    spec:
      enableServiceLinks: false
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: workflows
          image: {{ .Values.image.registry }}/openagentic-workflows:{{ .Values.image.tag }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 3400
          envFrom:
            - secretRef:
                name: openagentic-secrets
          env:
            - name: REDIS_URL
              value: redis://redis:6379
            - name: API_URL
              value: http://api:8000
            - name: MCP_PROXY_URL
              value: http://mcp-proxy:8080
          startupProbe:
            httpGet:
              path: /health
              port: 3400
            periodSeconds: 5
            failureThreshold: 40
          readinessProbe:
            httpGet:
              path: /health
              port: 3400
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources.workflows | nindent 12 }}
