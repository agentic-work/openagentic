

{{- if .Values.mcpProxy.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "openagentic.fullname" . }}-mcp-proxy
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "openagentic.labels" . | nindent 4 }}
    app.kubernetes.io/component: mcp-proxy
spec:
  {{- if not .Values.mcpProxy.autoscaling.enabled }}
  replicas: {{ .Values.mcpProxy.replicas | default 2 }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "openagentic.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: mcp-proxy
  template:
    metadata:
      labels:
        {{- include "openagentic.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: mcp-proxy
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "{{ .Values.mcpProxy.service.port | default 3001 }}"
        prometheus.io/path: "/metrics"
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.mcpProxy.nodeSelector | default .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.mcpProxy.kubernetes.enabled }}
      serviceAccountName: {{ include "openagentic.fullname" . }}-mcp-proxy
      {{- else }}
      # SECURITY: Disable SA token when K8s access not needed
      automountServiceAccountToken: false
      {{- end }}
      # Fix DNS: ndots:1 ensures external domains (example.com = 1 dot) are tried as FQDN first.
      # example.local.com has a wildcard DNS record that poisons resolution with ndots >= 2.
      dnsConfig:
        options:
          - name: ndots
            value: "1"
      containers:
      - name: mcp-proxy
        image: "{{ .Values.mcpProxy.image.repository }}:{{ .Values.mcpProxy.image.tag | default .Chart.AppVersion }}"
        imagePullPolicy: {{ .Values.mcpProxy.image.pullPolicy | default "IfNotPresent" }}
        ports:
        - name: http
          containerPort: 8080
          protocol: TCP
        # MCPP port for MCP Inspector WebSocket connections
        - name: mcpp
          containerPort: 6277
          protocol: TCP
        env:
        - name: PORT
          value: "8080"
        - name: ENABLE_AUTH
          value: {{ .Values.mcpProxy.env.ENABLE_AUTH | quote }}
        - name: AZURE_TENANT_ID
          value: {{ .Values.mcpProxy.env.AZURE_TENANT_ID | quote }}
        - name: AZURE_SUBSCRIPTION_ID
          value: {{ .Values.env.AZURE_SUBSCRIPTION_ID | default "" | quote }}
        - name: AZURE_CLIENT_ID
          value: {{ .Values.mcpProxy.env.AZURE_CLIENT_ID | quote }}
        - name: AZURE_CLIENT_SECRET
          {{- if .Values.mcpProxy.useInlineSecrets }}
          value: {{ .Values.secrets.azureClientSecret | default "" | quote }}
          {{- else }}
          valueFrom:
            secretKeyRef:
              {{- if .Values.azureKeyVault.enabled }}
              name: {{ include "openagentic.fullname" . }}-keyvault-secrets
              {{- else if .Values.externalSecrets.enabled }}
              name: {{ include "openagentic.fullname" . }}-api-secrets
              {{- else }}
              name: {{ include "openagentic.fullname" . }}-azure-secrets
              {{- end }}
              key: AZURE_CLIENT_SECRET
          {{- end }}
        - name: AZURE_AD_TENANT_ID
          value: {{ .Values.mcpProxy.env.AZURE_TENANT_ID | quote }}
        - name: AZURE_AD_CLIENT_ID
          value: {{ .Values.mcpProxy.env.AZURE_CLIENT_ID | quote }}
        - name: AZURE_AD_CLIENT_SECRET
          {{- if .Values.mcpProxy.useInlineSecrets }}
          value: {{ .Values.secrets.azureClientSecret | default "" | quote }}
          {{- else }}
          valueFrom:
            secretKeyRef:
              {{- if .Values.azureKeyVault.enabled }}
              name: {{ include "openagentic.fullname" . }}-keyvault-secrets
              {{- else if .Values.externalSecrets.enabled }}
              name: {{ include "openagentic.fullname" . }}-api-secrets
              {{- else }}
              name: {{ include "openagentic.fullname" . }}-azure-secrets
              {{- end }}
              key: AZURE_CLIENT_SECRET
          {{- end }}
        # NOTE: AZURE_MCP_URL removed - oap-azure-mcp uses OBO tokens from user session
        # IMPORTANT: POSTGRES_PASSWORD must come BEFORE DATABASE_URL for $(POSTGRES_PASSWORD) substitution to work
        - name: POSTGRES_PASSWORD
          {{- if .Values.mcpProxy.useInlineSecrets }}
          value: {{ include "openagentic.postgresql.password" . | quote }}
          {{- else }}
          valueFrom:
            secretKeyRef:
              name: {{ include "openagentic.fullname" . }}-db-secrets
              key: POSTGRES_PASSWORD
          {{- end }}
        - name: DATABASE_URL
          {{- if .Values.mcpProxy.useInlineSecrets }}
          value: "postgresql://{{ include "openagentic.postgresql.username" . }}:{{ include "openagentic.postgresql.password" . }}@{{ include "openagentic.postgresql.serviceName" . }}:5432/{{ include "openagentic.postgresql.database" . }}?sslmode={{ .Values.postgresql.sslmode | default "require" }}"
          {{- else }}
          value: "postgresql://{{ include "openagentic.postgresql.username" . }}:$(POSTGRES_PASSWORD)@{{ include "openagentic.postgresql.serviceName" . }}:5432/{{ include "openagentic.postgresql.database" . }}?sslmode={{ .Values.postgresql.sslmode | default "require" }}"
          {{- end }}
        # IMPORTANT: REDIS_PASSWORD must come BEFORE REDIS_URL for $(REDIS_PASSWORD) substitution to work
        - name: REDIS_PASSWORD
          {{- if .Values.mcpProxy.useInlineSecrets }}
          value: {{ include "openagentic.redis.password" . | quote }}
          {{- else }}
          valueFrom:
            secretKeyRef:
              name: {{ .Release.Name }}-redis
              key: redis-password
          {{- end }}
        - name: REDIS_URL
          {{- if .Values.mcpProxy.useInlineSecrets }}
          value: {{ include "openagentic.redis.url" . | quote }}
          {{- else }}
          value: "redis://:$(REDIS_PASSWORD)@{{ include "openagentic.redis.serviceName" . }}:6379"
          {{- end }}
        - name: REDIS_HOST
          value: "{{ include "openagentic.redis.serviceName" . }}"
        - name: REDIS_PORT
          value: "6379"
        - name: MILVUS_HOST
          value: {{ .Values.mcpProxy.env.MILVUS_HOST | quote }}
        - name: API_BASE_URL
          value: {{ .Values.mcpProxy.env.API_BASE_URL | quote }}
        - name: LOG_LEVEL
          value: {{ .Values.mcpProxy.env.LOG_LEVEL | default "info" | quote }}
        # JWT validation secrets - MUST match API's secrets for internal token validation
        - name: JWT_SECRET
          {{- if .Values.mcpProxy.useInlineSecrets }}
          value: {{ .Values.secrets.jwtSecret | default .Values.security.jwtSecret | default "" | quote }}
          {{- else }}
          valueFrom:
            secretKeyRef:
              name: {{ include "openagentic.fullname" . }}-api-secrets
              key: JWT_SECRET
          {{- end }}
        - name: SIGNING_SECRET
          {{- if .Values.mcpProxy.useInlineSecrets }}
          value: {{ .Values.secrets.signingSecret | default .Values.security.signingSecret | default "" | quote }}
          {{- else }}
          valueFrom:
            secretKeyRef:
              name: {{ include "openagentic.fullname" . }}-api-secrets
              key: SIGNING_SECRET
          {{- end }}
        # SECURITY: Internal service secret for x-request-from bypass
        - name: INTERNAL_SERVICE_SECRET
          {{- if .Values.mcpProxy.useInlineSecrets }}
          value: {{ .Values.secrets.internalServiceSecret | default "" | quote }}
          {{- else }}
          valueFrom:
            secretKeyRef:
              name: {{ include "openagentic.fullname" . }}-api-secrets
              key: INTERNAL_SERVICE_SECRET
          {{- end }}
        # API internal key for service-to-service auth
        - name: API_INTERNAL_KEY
          {{- if .Values.mcpProxy.useInlineSecrets }}
          value: {{ .Values.secrets.apiSecretKey | default .Values.security.apiSecretKey | default "" | quote }}
          {{- else }}
          valueFrom:
            secretKeyRef:
              name: {{ include "openagentic.fullname" . }}-api-secrets
              key: API_SECRET_KEY
              optional: true
          {{- end }}
        # Azure AD Group Authorization - same as API
        - name: AAD_AUTHORIZED_USER_GROUPS
          value: {{ .Values.auth.azure.authorizedUserGroups | quote }}
        - name: AAD_AUTHORIZED_ADMIN_GROUPS
          value: {{ .Values.auth.azure.authorizedAdminGroups | quote }}
        # OpenAgentic MCP Servers - remote mode for servers that have external K8s containers
        {{- if .Values.awpAdminMcp.enabled }}
        - name: OpenAgentic_ADMIN_MCP_URL
          value: "http://{{ include "openagentic.fullname" . }}-oap-admin-mcp:{{ .Values.awpAdminMcp.service.port | default 8083 }}"
        {{- end }}
        {{- /* OpenAgentic Azure MCP: connect to the standalone container so the
             azure MCP can be released independently from mcp-proxy.
             The standalone oap-azure-mcp serves an MCP-compatible HTTP endpoint
             on port 8081 (FastMCP /mcp). Set mcpProxy.env.OpenAgentic_AZURE_MCP_REMOTE=false
             to fall back to bundled stdio mode. */}}
        {{- if and (hasKey .Values.mcpProxy.env "OpenAgentic_AZURE_MCP_REMOTE" | default true) (not (eq (.Values.mcpProxy.env.OpenAgentic_AZURE_MCP_REMOTE | toString) "false")) }}
        - name: OpenAgentic_AZURE_MCP_URL
          value: "http://{{ include "openagentic.fullname" . }}-oap-azure-mcp:{{ .Values.awpAzureMcp.service.port | default 8081 }}"
        {{- end }}
        {{- /* OpenAgentic_AWS_MCP_URL still intentionally NOT set — AWS MCP stays bundled until it gets a standalone container */}}
        # MCP Server Enable/Disable Flags
        - name: OpenAgentic_ADMIN_MCP_DISABLED
          value: {{ .Values.mcpProxy.env.ADMIN_MCP_DISABLED | default "false" | quote }}
        - name: RESULT_STORAGE_MCP_DISABLED
          value: {{ .Values.mcpProxy.env.RESULT_STORAGE_MCP_DISABLED | default "false" | quote }}
        - name: MEMORY_MCP_DISABLED
          value: {{ .Values.mcpProxy.env.MEMORY_MCP_DISABLED | default "false" | quote }}
        - name: SEQUENTIAL_THINKING_MCP_DISABLED
          value: {{ .Values.mcpProxy.env.SEQUENTIAL_THINKING_MCP_DISABLED | default "false" | quote }}
        - name: FETCH_MCP_DISABLED
          value: {{ .Values.mcpProxy.env.FETCH_MCP_DISABLED | default "false" | quote }}
        - name: AZURE_COST_MCP_DISABLED
          value: {{ .Values.mcpProxy.env.AZURE_COST_MCP_DISABLED | default "false" | quote }}
        - name: BACKGROUND_PROCESSOR_MCP_DISABLED
          value: {{ .Values.mcpProxy.env.BACKGROUND_PROCESSOR_MCP_DISABLED | default "false" | quote }}
        - name: VMWARE_MCP_DISABLED
          value: {{ .Values.mcpProxy.env.VMWARE_MCP_DISABLED | default "true" | quote }}
        - name: PROMETHEUS_MCP_DISABLED
          value: {{ .Values.mcpProxy.env.PROMETHEUS_MCP_DISABLED | default "false" | quote }}
        - name: AWS_MCP_DISABLED
          value: {{ .Values.mcpProxy.env.AWS_MCP_DISABLED | default "true" | quote }}
        - name: AWS_KNOWLEDGE_MCP_DISABLED
          value: {{ .Values.mcpProxy.env.AWS_KNOWLEDGE_MCP_DISABLED | default "true" | quote }}
        # OpenAgentic AWS MCP Server (with Identity Center OBO)
        - name: OpenAgentic_AWS_MCP_DISABLED
          value: {{ .Values.mcpProxy.env.OpenAgentic_AWS_MCP_DISABLED | default "false" | quote }}
        # Memory MCP Server (deprecated)
        - name: OpenAgentic_MEMORY_MCP_DISABLED
          value: {{ .Values.mcpProxy.env.OpenAgentic_MEMORY_MCP_DISABLED | default "true" | quote }}
        # ===========================================
        # AWS IDENTITY CENTER / OBO CONFIGURATION
        # ===========================================
        {{- if .Values.aws.identityCenter }}
        {{- if .Values.aws.identityCenter.instanceArn }}
        - name: AWS_IC_INSTANCE_ARN
          value: {{ .Values.aws.identityCenter.instanceArn | quote }}
        {{- end }}
        {{- if .Values.aws.identityCenter.applicationArn }}
        - name: AWS_IC_APPLICATION_ARN
          value: {{ .Values.aws.identityCenter.applicationArn | quote }}
        {{- end }}
        {{- end }}
        {{- if .Values.aws.accountId }}
        - name: AWS_ACCOUNT_ID
          value: {{ .Values.aws.accountId | quote }}
        {{- end }}
        {{- if .Values.aws.oboRoleArn }}
        - name: AWS_OBO_ROLE_ARN
          value: {{ .Values.aws.oboRoleArn | quote }}
        {{- end }}
        {{- if .Values.aws.oboFallbackToService }}
        - name: AWS_OBO_FALLBACK_TO_SERVICE
          value: {{ .Values.aws.oboFallbackToService | quote }}
        {{- end }}
        # OpenAgentic GCP MCP Server
        - name: OpenAgentic_GCP_MCP_DISABLED
          value: {{ .Values.mcpProxy.env.OpenAgentic_GCP_MCP_DISABLED | default "false" | quote }}
        # OpenAgentic GitHub MCP Server (GitHub API via user OAuth tokens)
        - name: OpenAgentic_GITHUB_MCP_DISABLED
          value: {{ .Values.mcpProxy.env.OpenAgentic_GITHUB_MCP_DISABLED | default "false" | quote }}
        {{- if .Values.auth.github }}
        {{- if .Values.auth.github.host }}
        - name: GITHUB_HOST
          value: {{ .Values.auth.github.host | quote }}
        {{- end }}
        {{- if .Values.auth.github.apiUrl }}
        - name: GITHUB_API_URL
          value: {{ .Values.auth.github.apiUrl | quote }}
        {{- end }}
        {{- end }}
        # OpenAgentic Kubernetes MCP Server (ADMIN-ONLY - cluster administration)
        - name: OpenAgentic_KUBERNETES_MCP_DISABLED
          value: {{ .Values.mcpProxy.env.OpenAgentic_KUBERNETES_MCP_DISABLED | default "false" | quote }}
        # Protected namespace - the OpenAgentic deployment namespace (read-only in K8s MCP)
        - name: OPENAGENTIC_NAMESPACE
          value: {{ .Release.Namespace | quote }}
        # OpenAgentic OpenAgentic MCP Server (code execution)
        - name: OpenAgentic_OPENAGENTIC_MCP_DISABLED
          value: {{ .Values.mcpProxy.env.OpenAgentic_OPENAGENTIC_MCP_DISABLED | default "false" | quote }}
        {{- if not (.Values.mcpProxy.env.OpenAgentic_OPENAGENTIC_MCP_DISABLED | default "false" | eq "true") }}
        - name: OPENAGENTIC_MANAGER_URL
          value: {{ .Values.mcpProxy.env.OPENAGENTIC_MANAGER_URL | default (printf "http://%s-code-manager:%s" (include "openagentic.fullname" .) (.Values.codeManager.service.port | default "3050" | toString)) | quote }}
        - name: OPENAGENTIC_API_URL
          value: {{ .Values.mcpProxy.env.OPENAGENTIC_API_URL | default (printf "http://%s-api:8000" (include "openagentic.fullname" .)) | quote }}
        - name: MCP_SERVICE_AUTH_KEY
          {{- if .Values.mcpProxy.useInlineSecrets }}
          value: {{ .Values.secrets.mcpServiceAuthKey | default "" | quote }}
          {{- else }}
          valueFrom:
            secretKeyRef:
              name: {{ include "openagentic.fullname" . }}-secrets
              key: mcpServiceAuthKey
              optional: true
          {{- end }}
        {{- end }}
        # GCP Configuration (for oap-gcp-mcp)
        {{- if not (.Values.mcpProxy.env.OpenAgentic_GCP_MCP_DISABLED | default "false" | eq "true") }}
        - name: GCP_PROJECT_ID
          value: {{ .Values.mcpProxy.env.GCP_PROJECT_ID | default .Values.ai.google.vertex.projectId | quote }}
        - name: GCP_REGION
          value: {{ .Values.mcpProxy.env.GCP_REGION | default .Values.ai.google.vertex.location | default "us-central1" | quote }}
        - name: GCP_CREDENTIALS_FILE
          value: "/app/secrets/service-account.json"
        - name: GOOGLE_APPLICATION_CREDENTIALS
          value: "/app/secrets/service-account.json"
        {{- end }}
        # ===========================================
        # OBSERVABILITY STACK CONFIGURATION
        # External monitoring stack in monitoring-stack namespace
        # ===========================================
        # Prometheus Configuration
        {{- if not (.Values.mcpProxy.env.PROMETHEUS_MCP_DISABLED | default "false" | eq "true") }}
        - name: PROMETHEUS_URL
          value: {{ .Values.mcpProxy.env.PROMETHEUS_URL | default .Values.observability.prometheus.url | default "http://prometheus.monitoring-stack.svc.cluster.local:9090" | quote }}
        {{- end }}
        # Loki Configuration (log aggregation)
        - name: LOKI_URL
          value: {{ .Values.mcpProxy.env.LOKI_URL | default .Values.observability.loki.url | default "http://loki.monitoring-stack.svc.cluster.local:3100" | quote }}
        - name: OpenAgentic_LOKI_MCP_DISABLED
          value: {{ .Values.mcpProxy.env.OpenAgentic_LOKI_MCP_DISABLED | default "false" | quote }}
        # AlertManager Configuration
        - name: ALERTMANAGER_URL
          value: {{ .Values.mcpProxy.env.ALERTMANAGER_URL | default .Values.observability.alertmanager.url | default "http://alertmanager.monitoring-stack.svc.cluster.local:9093" | quote }}
        - name: OpenAgentic_ALERTMANAGER_MCP_DISABLED
          value: {{ .Values.mcpProxy.env.OpenAgentic_ALERTMANAGER_MCP_DISABLED | default "false" | quote }}
        # Grafana Configuration (for dashboard links)
        - name: GRAFANA_URL
          value: {{ .Values.mcpProxy.env.GRAFANA_URL | default .Values.observability.grafana.url | default "http://grafana.monitoring-stack.svc.cluster.local:3000" | quote }}
        # VMware Configuration (if enabled)
        {{- if .Values.mcpProxy.env.VMWARE_HOST }}
        - name: VMWARE_HOST
          value: {{ .Values.mcpProxy.env.VMWARE_HOST | quote }}
        - name: VMWARE_USERNAME
          value: {{ .Values.mcpProxy.env.VMWARE_USERNAME | quote }}
        - name: VMWARE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ include "openagentic.secretName" . }}
              key: vmwarePassword
              optional: true
        {{- end }}
        # AWS Configuration (if enabled)
        {{- if not (.Values.mcpProxy.env.AWS_MCP_DISABLED | default "true" | eq "true") }}
        - name: AWS_REGION
          value: {{ .Values.aws.defaultRegion | default "us-east-1" | quote }}
        - name: AWS_ACCESS_KEY_ID
          valueFrom:
            secretKeyRef:
              name: {{ include "openagentic.secretName" . }}
              key: awsAccessKeyId
              optional: true
        - name: AWS_SECRET_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: {{ include "openagentic.secretName" . }}
              key: awsSecretAccessKey
              optional: true
        {{- end }}
        # NOTE: Old AZURE_MCP_* vars removed - oap-azure-mcp uses OBO tokens from user session
        # Extra environment variables (from mcpProxy.extraEnv)
        {{- if .Values.mcpProxy.extraEnv }}
        {{- range $key, $value := .Values.mcpProxy.extraEnv }}
        - name: {{ $key }}
          value: {{ $value | quote }}
        {{- end }}
        {{- end }}
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: {{ .Values.mcpProxy.livenessProbe.initialDelaySeconds | default 30 }}
          periodSeconds: {{ .Values.mcpProxy.livenessProbe.periodSeconds | default 15 }}
          timeoutSeconds: {{ .Values.mcpProxy.livenessProbe.timeoutSeconds | default 5 }}
          failureThreshold: {{ .Values.mcpProxy.livenessProbe.failureThreshold | default 3 }}
        readinessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: {{ .Values.mcpProxy.readinessProbe.initialDelaySeconds | default 15 }}
          periodSeconds: {{ .Values.mcpProxy.readinessProbe.periodSeconds | default 10 }}
          timeoutSeconds: {{ .Values.mcpProxy.readinessProbe.timeoutSeconds | default 5 }}
          failureThreshold: {{ .Values.mcpProxy.readinessProbe.failureThreshold | default 3 }}
        resources:
          {{- toYaml .Values.mcpProxy.resources | nindent 12 }}
        {{- if or .Values.azureKeyVault.enabled (not (.Values.mcpProxy.env.OpenAgentic_GCP_MCP_DISABLED | default "false" | eq "true")) }}
        volumeMounts:
        {{- if .Values.azureKeyVault.enabled }}
        - name: secrets-store
          mountPath: "/mnt/secrets-store"
          readOnly: true
        {{- end }}
        {{- if not (.Values.mcpProxy.env.OpenAgentic_GCP_MCP_DISABLED | default "false" | eq "true") }}
        - name: gcp-service-account
          mountPath: /app/secrets
          readOnly: true
        {{- end }}
        {{- end }}
      {{- if or .Values.azureKeyVault.enabled (not (.Values.mcpProxy.env.OpenAgentic_GCP_MCP_DISABLED | default "false" | eq "true")) }}
      volumes:
      {{- if .Values.azureKeyVault.enabled }}
      - name: secrets-store
        csi:
          driver: secrets-store.csi.k8s.io
          readOnly: true
          volumeAttributes:
            secretProviderClass: {{ include "openagentic.fullname" . }}-azure-keyvault
      {{- end }}
      {{- if not (.Values.mcpProxy.env.OpenAgentic_GCP_MCP_DISABLED | default "false" | eq "true") }}
      - name: gcp-service-account
        secret:
          secretName: {{ include "openagentic.fullname" . }}-gcp-secrets
      {{- end }}
      {{- end }}
{{- end }}