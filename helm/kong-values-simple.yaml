# Proprietary and confidential. Unauthorized copying prohibited.

# Simplified Kong values for docker-desktop with Gateway API support
# Uses kong/ingress chart

# Gateway pod - use liveness probe on status/ready endpoint
gateway:
  enabled: true

  image:
    repository: kong/kong-gateway
    tag: "3.9"

  env:
    database: "off"
    # SSE/streaming support
    nginx_proxy_proxy_read_timeout: "3600s"
    nginx_proxy_proxy_send_timeout: "3600s"
    nginx_proxy_proxy_connect_timeout: "60s"
    nginx_proxy_proxy_buffering: "off"
    # Trust Docker Desktop networking
    trusted_ips: "0.0.0.0/0,::/0"
    real_ip_header: "X-Forwarded-For"
    real_ip_recursive: "on"
    plugins: "bundled"

  # Proxy service
  proxy:
    enabled: true
    type: LoadBalancer
    http:
      enabled: true
      servicePort: 80
      containerPort: 8000
    tls:
      enabled: true
      servicePort: 443
      containerPort: 8443

  # Admin API
  admin:
    enabled: true
    type: ClusterIP
    http:
      enabled: true
      servicePort: 8001
      containerPort: 8001
    tls:
      enabled: false

  # Status endpoint
  status:
    enabled: true
    http:
      enabled: true
      containerPort: 8100

  # CRITICAL: Relax readiness probe to allow empty config
  # The gateway will still work, just return 404 until routes are configured
  readinessProbe:
    httpGet:
      path: /status  # Use /status instead of /status/ready
      port: status
      scheme: HTTP
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 5
    successThreshold: 1
    failureThreshold: 3

  livenessProbe:
    httpGet:
      path: /status
      port: status
      scheme: HTTP
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 5
    successThreshold: 1
    failureThreshold: 3

  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 1Gi

# Controller
controller:
  enabled: true

  image:
    repository: kong/kubernetes-ingress-controller
    tag: "3.3"

  ingressController:
    ingressClass: kong
    installCRDs: false

    env:
      controller_gateway_api_controller_name: "konghq.com/kic-gateway-controller"
      feature_gates: "GatewayAlpha=true"
      controller_watch_namespace: ""
      controller_log_level: "debug"  # More verbose for debugging

  admissionWebhook:
    enabled: false

serviceAccount:
  create: true
  name: kong-sa
