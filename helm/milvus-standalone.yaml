# Proprietary and confidential. Unauthorized copying prohibited.

# Milvus STANDALONE Mode
# Much simpler than cluster mode, suitable for development/small deployments
#
# Deploy with:
#   helm upgrade --install milvus zilliztech/milvus \
#     -f helm/milvus-standalone.yaml \
#     -n openagentic

# STANDALONE MODE - single node
cluster:
  enabled: false

standalone:
  enabled: true
  replicas: 1
  nodeSelector:
    kubernetes.io/arch: amd64
  resources:
    requests:
      cpu: 500m
      memory: 2Gi
    limits:
      cpu: 4000m
      memory: 8Gi
  persistence:
    enabled: true
    persistentVolumeClaim:
      storageClass: nfs
      size: 50Gi
  extraEnv:
    - name: ETCD_ENDPOINTS
      value: "milvus-etcd.openagentic.svc.cluster.local:2379"
    - name: MINIO_ADDRESS
      value: "milvus-minio:9000"

# Use standard (non-GPU) image - using 2.3.x for stability
image:
  all:
    pullPolicy: IfNotPresent
    repository: milvusdb/milvus
    tag: v2.3.17

# Use RocksMQ for standalone (embedded message queue)
extraConfigFiles:
  user.yaml: |
    mq:
      type: rocksmq
    messageQueue: rocksmq

# ETCD - single replica for standalone
etcd:
  enabled: true
  replicaCount: 1
  nodeSelector:
    kubernetes.io/arch: amd64
  persistence:
    enabled: true
    size: 10Gi
    storageClassName: nfs
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 1Gi

# MINIO - single replica for standalone
minio:
  enabled: true
  mode: standalone
  replicas: 1
  accessKey: minioadmin
  secretKey: minioadmin123
  bucketName: milvus-bucket
  nodeSelector:
    kubernetes.io/arch: amd64
  persistence:
    enabled: true
    size: 50Gi
    storageClass: nfs
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 1Gi

# Disable Pulsar (not needed in standalone)
pulsar:
  enabled: false
pulsarv3:
  enabled: false

# Disable cluster components
proxy:
  enabled: false
mixCoordinator:
  enabled: false
dataNode:
  enabled: false
queryNode:
  enabled: false
indexNode:
  enabled: false
streamingNode:
  enabled: false

# Service configuration
service:
  type: ClusterIP
  port: 19530
  annotations: {}

# Metrics
metrics:
  enabled: true
  serviceMonitor:
    enabled: false
