# Proprietary and confidential. Unauthorized copying prohibited.

# Milvus CLUSTER with GPU Support
# Based on: https://milvus.io/docs/install_cluster-helm-gpu.md
#
# Deploy with:
#   helm upgrade --install milvus zilliztech/milvus \
#     -f helm/milvus-cluster-gpu.yaml \
#     -n openagentic

# CLUSTER MODE - Full distributed setup
cluster:
  enabled: true

# GPU image
image:
  all:
    pullPolicy: IfNotPresent
    repository: milvusdb/milvus
    tag: v2.6.10-gpu

# GPU configuration
extraConfigFiles:
  user.yaml: |
    gpu:
      initMemSize: 2048
      maxMemSize: 8192
      buildIndexOnGpu: true

# Global storage class
persistence:
  persistentVolumeClaim:
    storageClass: nfs

# ===========================================
# GPU WORKER NODES - Using both GPUs on hal
# ===========================================

# DataNode with GPU 0
dataNode:
  enabled: true
  replicas: 1
  nodeSelector:
    kubernetes.io/arch: amd64
  resources:
    requests:
      cpu: 500m
      memory: 2Gi
      nvidia.com/gpu: "1"
    limits:
      cpu: 2000m
      memory: 4Gi
      nvidia.com/gpu: "1"
  extraEnv:
    - name: CUDA_VISIBLE_DEVICES
      value: "0"

# QueryNode with GPU 1
queryNode:
  enabled: true
  replicas: 1
  nodeSelector:
    kubernetes.io/arch: amd64
  resources:
    requests:
      cpu: 500m
      memory: 2Gi
      nvidia.com/gpu: "1"
    limits:
      cpu: 2000m
      memory: 4Gi
      nvidia.com/gpu: "1"
  extraEnv:
    - name: CUDA_VISIBLE_DEVICES
      value: "1"

# ===========================================
# COORDINATOR COMPONENTS
# ===========================================

mixCoordinator:
  enabled: true
  replicas: 1
  nodeSelector:
    kubernetes.io/arch: amd64
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 2Gi

# Proxy
proxy:
  enabled: true
  replicas: 1
  nodeSelector:
    kubernetes.io/arch: amd64
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 2Gi

# StreamingNode - disabled (optional component, causing panics)
streamingNode:
  enabled: false
  replicas: 0
  # nodeSelector:
  #   kubernetes.io/arch: amd64
  # resources:
  #   requests:
  #     cpu: 200m
  #     memory: 512Mi
  #   limits:
  #     cpu: 1000m
  #     memory: 2Gi

# ===========================================
# ETCD - 3 replicas for HA
# ===========================================
etcd:
  enabled: true
  replicaCount: 3
  nodeSelector:
    kubernetes.io/arch: amd64
  persistence:
    enabled: true
    size: 10Gi
    storageClassName: nfs
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 1Gi

# ===========================================
# MINIO - 4 replicas for distributed storage
# ===========================================
minio:
  enabled: true
  mode: distributed
  replicas: 4
  nodeSelector:
    kubernetes.io/arch: amd64
  persistence:
    enabled: true
    size: 50Gi
    storageClass: nfs
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 1Gi

# ===========================================
# PULSAR v3 - Message queue for cluster mode
# ===========================================
pulsarv3:
  enabled: true
  persistence: true

  zookeeper:
    replicaCount: 3
    resources:
      requests:
        memory: 256Mi
        cpu: 100m
    volumes:
      persistence: true
      data:
        name: data
        size: 10Gi
        local_storage: false
    configData:
      PULSAR_MEM: >
        -Xms256m -Xmx256m

  bookkeeper:
    replicaCount: 3
    resources:
      requests:
        memory: 512Mi
        cpu: 200m
    volumes:
      persistence: true
      journal:
        name: journal
        size: 20Gi
        local_storage: false
      ledgers:
        name: ledgers
        size: 50Gi
        local_storage: false
    configData:
      PULSAR_MEM: >
        -Xms512m -Xmx512m -XX:MaxDirectMemorySize=512m

  broker:
    replicaCount: 2
    resources:
      requests:
        memory: 512Mi
        cpu: 200m
    configData:
      PULSAR_MEM: >
        -Xms512m -Xmx512m -XX:MaxDirectMemorySize=512m

  proxy:
    replicaCount: 2
    resources:
      requests:
        memory: 256Mi
        cpu: 100m

  autorecovery:
    replicaCount: 1
    resources:
      requests:
        memory: 256Mi
        cpu: 100m

# Disable standalone mode
standalone:
  enabled: false

# Disable old pulsar
pulsar:
  enabled: false

# Service configuration
service:
  type: ClusterIP
  port: 19530
  annotations: {}

# Metrics
metrics:
  enabled: true
  serviceMonitor:
    enabled: false
