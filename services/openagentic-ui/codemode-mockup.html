<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CodeMode — Agentic Loop Demo</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  :root{--bg:#0d1117;--bg2:#161b22;--text:#e6edf3;--text2:#b1bac4;--dim:#8b949e;--dimmer:#484f58;--accent:#58a6ff;--success:#3fb950;--warning:#d29922;--error:#f85149;--purple:#a371f7;--teal:#5faec1;--border:#30363d;--mono:'JetBrains Mono',ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace}
  body{background:#010409;color:var(--text);font-family:var(--mono);font-size:13px;line-height:1.55;display:flex;justify-content:center;padding:20px}
  .container{width:860px;background:var(--bg);border:1px solid var(--border);border-radius:8px;overflow:hidden;display:flex;flex-direction:column;height:94vh;box-shadow:0 16px 64px rgba(0,0,0,0.5)}

  /* Header = theme pill ONLY */
  .header{display:flex;align-items:center;padding:5px 14px;background:var(--bg2);border-bottom:1px solid var(--border);font-size:11px;flex-shrink:0}
  .clickable{cursor:pointer;transition:all 0.15s;position:relative}
  .clickable:hover{opacity:0.85}
  .clickable::after{content:'';position:absolute;bottom:-1px;left:0;right:0;height:1px;background:currentColor;opacity:0;transition:opacity 0.15s}
  .clickable:hover::after{opacity:0.3}
  .theme-pill{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:4px;border:1px solid var(--border);background:transparent;color:var(--dim);font-family:inherit;font-size:11px}
  .theme-pill:hover{background:rgba(255,255,255,0.05);border-color:var(--dim)}
  .theme-pill .dot{width:8px;height:8px;border-radius:50%;background:#33FF33}

  .chat{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:4px;scroll-behavior:smooth}

  /* Animations */
  .think-glow{animation:tglow 2s ease-in-out infinite}
  @keyframes tglow{0%,100%{border-left-color:var(--purple);box-shadow:-2px 0 8px rgba(163,113,247,0)}50%{border-left-color:#c084fc;box-shadow:-2px 0 14px rgba(163,113,247,0.2)}}
  .cursor-blink{display:inline-block;width:7px;height:14px;background:var(--purple);animation:cb 0.7s step-end infinite;vertical-align:text-bottom;margin-left:2px}
  @keyframes cb{50%{opacity:0}}
  .dot-bounce span{animation:db 1.4s ease-in-out infinite;display:inline-block;color:var(--purple)}
  .dot-bounce span:nth-child(2){animation-delay:0.2s}
  .dot-bounce span:nth-child(3){animation-delay:0.4s}
  @keyframes db{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-3px)}}
  .fade-up{animation:fu 0.35s ease-out both}
  @keyframes fu{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
  .stream-word{opacity:0;animation:sw 0.12s ease-out forwards}
  @keyframes sw{to{opacity:1}}

  /* Sub-agent indented block */
  .subagent{margin-left:14px;padding-left:10px;border-left:2px solid var(--border);margin-top:4px}

  /* Task card */
  .task-card{display:flex;align-items:center;gap:8px;padding:6px 10px;background:var(--bg2);border:1px solid var(--border);border-radius:5px;font-size:12px;margin:4px 0}
  .task-status{width:8px;height:8px;border-radius:50%;flex-shrink:0}
  .task-status.pending{background:var(--warning)}
  .task-status.running{background:var(--accent);animation:pulse 1.5s ease-in-out infinite}
  .task-status.done{background:var(--success)}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
  .task-label{color:var(--text);flex:1}
  .task-time{color:var(--dimmer);font-size:10px}

  /* File diff preview */
  .diff-block{margin:4px 0;padding:6px 8px;background:var(--bg2);border:1px solid var(--border);border-radius:4px;font-size:11px;max-height:100px;overflow-y:auto}
  .diff-add{color:var(--success)}
  .diff-file{color:var(--accent);font-weight:500;margin-bottom:4px}

  /* Input */
  .input-area{flex-shrink:0;border-top:1px solid var(--border);background:var(--bg2);padding:10px 14px 0}
  .input-box{display:flex;align-items:flex-start;gap:8px;background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:8px 12px;transition:border-color 0.15s}
  .input-box:focus-within{border-color:var(--accent)}
  .input-box input{flex:1;background:transparent;border:none;outline:none;color:var(--text);font-family:inherit;font-size:13px}
  .input-box input::placeholder{color:var(--dimmer)}

  /* Footer = EVERYTHING */
  .footer{flex-shrink:0;padding:6px 14px 8px;background:var(--bg2);font-size:11px;color:var(--dim);display:flex;flex-direction:column;gap:3px}
  .footer-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .perm-pill{color:var(--success);background:none;border:1px solid rgba(63,185,80,0.3);border-radius:3px;font-family:inherit;font-size:11px;padding:1px 8px}
  .perm-pill:hover{background:rgba(63,185,80,0.1);border-color:var(--success)}
  .model-pill{display:inline-flex;align-items:center;gap:4px;padding:1px 8px;background:rgba(88,166,255,0.1);border:1px solid rgba(88,166,255,0.3);border-radius:3px;color:var(--accent);font-family:inherit;font-size:11px}
  .model-pill:hover{background:rgba(88,166,255,0.2);border-color:var(--accent)}
  .ctx-bar{width:56px;height:5px;background:var(--border);border-radius:3px;overflow:hidden;display:inline-block;vertical-align:middle}
  .ctx-fill{height:100%;border-radius:3px;transition:width 1s ease-out;background:var(--success)}
  .sep{color:var(--dimmer)}
  .f-item{color:var(--dim)}
  .f-val{color:var(--text2)}
  .f-link{color:var(--accent);text-decoration:underline;text-decoration-style:dotted;text-underline-offset:2px}
  .f-link:hover{text-decoration-style:solid}
</style>
</head>
<body>
<div class="container">
  <!-- Header: theme ONLY -->
  <div class="header">
    <button class="theme-pill clickable"><span class="dot"></span> Default</button>
  </div>

  <div class="chat" id="chat"></div>

  <div class="input-area">
    <div class="input-box" id="inputBox">
      <span style="color:var(--dimmer);font-size:14px;user-select:none">&#10095;</span>
      <input type="text" id="input" placeholder='Try "explain this codebase"'>
    </div>
    <div class="footer">
      <div class="footer-row">
        <button class="perm-pill clickable" title="Click or Shift+Tab to cycle">&#9655;&#9655; permissive on</button>
        <button class="model-pill clickable" title="Click to change model">gpt-oss:20b <span style="font-size:9px;opacity:0.6">&#9660;</span></button>
        <span class="sep">|</span>
        <span class="f-item"><span style="color:var(--text)">aw_da8ce95b</span> @ openagentic-da8ce95b</span>
        <span class="sep">|</span>
        <span class="f-item">cwd: <span class="f-val">/workspaces/da8ce95b</span></span>
      </div>
      <div class="footer-row">
        <span style="display:inline-flex;align-items:center;gap:5px"><span class="ctx-bar"><span class="ctx-fill" id="ctxFill" style="width:0%"></span></span> <span id="ctxLbl">-- ctx</span></span>
        <span class="sep">|</span>
        <span class="f-item">cpu <span id="cpu" style="color:var(--success)">--</span></span>
        <span class="f-item">mem <span id="mem" style="color:var(--accent)">--</span></span>
        <span class="f-item">io <span id="io" style="color:var(--purple)">--</span></span>
        <span class="sep">|</span>
        <span><span style="color:var(--success)">&#9679;</span> 13ms</span>
        <span class="sep">|</span>
        <span>v0.6.3</span>
        <span class="sep">|</span>
        <span id="up">&#8593;0s</span>
        <span class="sep">|</span>
        <span>45 tools</span>
        <span class="sep">|</span>
        <span>2 mcp</span>
      </div>
    </div>
  </div>
</div>
<script>
const chat=document.getElementById('chat'),inp=document.getElementById('input'),t0=Date.now();
const spinC=['\u25D0','\u25D3','\u25D1','\u25D2'];
function tick(){const s=(Date.now()-t0)/1000;document.getElementById('cpu').textContent=Math.round(32+Math.sin(s*0.7)*14)+'%';document.getElementById('mem').textContent=Math.round(41+Math.sin(s*0.3+1)*9)+'%';document.getElementById('io').textContent=Math.round(10+Math.abs(Math.sin(s*1.1))*20)+'%';const m=Math.floor(s/60),ss=Math.floor(s%60);document.getElementById('up').textContent=m>0?'\u2191'+m+'m '+ss+'s':'\u2191'+ss+'s';requestAnimationFrame(tick)}tick();
function mk(t,c){const e=document.createElement(t);if(c)e.className=c;return e}
function wait(ms){return new Promise(r=>setTimeout(r,ms))}
function scroll(){chat.scrollTop=chat.scrollHeight}
function addRow(g,gc,content,parent){const r=mk('div','fade-up');r.style.cssText='display:flex;gap:10px;font-size:13px';const gEl=mk('div');gEl.style.cssText='width:16px;flex-shrink:0;text-align:center;color:'+(gc||'var(--dim)')+';padding-top:1px';gEl.textContent=g||'';r.appendChild(gEl);const c=mk('div');c.style.cssText='flex:1;min-width:0';if(typeof content==='string')c.textContent=content;else if(content)c.appendChild(content);r.appendChild(c);(parent||chat).appendChild(r);scroll();return{row:r,gutter:gEl,content:c}}

function makeToolRow(name,summary,parent){
  const h=mk('div');h.style.cssText='display:flex;align-items:baseline;gap:6px;font-size:13px';
  const n=mk('span');n.style.cssText='color:var(--accent);font-weight:600';n.textContent=name;
  const lp=mk('span');lp.style.color='var(--dimmer)';lp.textContent='(';
  const s=mk('span');s.style.color='var(--text2)';s.textContent=summary;
  const rp=mk('span');rp.style.color='var(--dimmer)';rp.textContent=')';
  const sp=mk('span');sp.style.cssText='color:var(--dim);font-size:12px;margin-left:6px';sp.textContent='\u25D0';
  let si=0;const iv=setInterval(()=>{si=(si+1)%4;sp.textContent=spinC[si]},150);
  h.append(n,document.createTextNode(' '),lp,s,rp,sp);
  const row=addRow('\u25CF','var(--accent)',h,parent);
  return{row,header:h,stopSpin:()=>{clearInterval(iv);sp.remove();const btn=mk('button');btn.style.cssText='color:var(--dimmer);font-size:11px;background:none;border:none;cursor:pointer;font-family:inherit;margin-left:6px';btn.textContent='[show]';h.appendChild(btn)}}
}
function addResult(text,parent,isErr){const s=mk('span');s.style.cssText='color:'+(isErr?'var(--error)':'var(--dim)')+';font-size:12px';s.textContent=text;addRow('\u23BF','var(--dimmer)',s,parent)}
function addTask(label,status,time){const c=mk('div','task-card fade-up');const dot=mk('span','task-status '+status);const l=mk('span','task-label');l.textContent=label;const t=mk('span','task-time');t.textContent=time;c.append(dot,l,t);chat.appendChild(c);scroll();return{card:c,dot,timeEl:t}}
async function typeInto(text){inp.focus();for(let i=0;i<text.length;i++){inp.value=text.slice(0,i+1);await wait(20)}await wait(300);inp.value=''}
async function streamText(el,text,ms){const words=text.split(/(\s+)/);for(let i=0;i<words.length;i++){const w=mk('span','stream-word');w.textContent=words[i];el.appendChild(w);if(i%2===0){scroll();await wait(ms||10)}}}
async function thinkBlock(text,dur){
  const tb=mk('div','think-glow fade-up');tb.style.cssText='border-left:2px solid var(--purple);padding:8px 12px;margin:4px 0;background:linear-gradient(90deg,rgba(163,113,247,0.04) 0%,transparent 100%);border-radius:0 6px 6px 0';
  const th=mk('div');th.style.cssText='display:flex;align-items:baseline;gap:8px;font-style:italic;color:var(--dim);font-size:12px';
  const g=mk('span');g.style.cssText='color:var(--purple);font-style:normal';g.textContent='\u2234';
  const tl=mk('span');tl.textContent='Thinking';
  const tm=mk('span');tm.style.cssText='color:var(--purple);opacity:0.8';tm.id='tt'+Math.random();
  const tk=mk('span');tk.style.color='var(--dimmer)';
  const sp=mk('span');sp.style.cssText='color:var(--dimmer);font-size:10px';
  const dots=mk('span','dot-bounce');for(let i=0;i<3;i++){const d=mk('span');d.textContent='\u00b7';d.style.animationDelay=(i*0.2)+'s';dots.appendChild(d)}
  th.append(g,document.createTextNode(' '),tl,document.createTextNode(' '),tm,document.createTextNode(' '),tk,document.createTextNode(' '),sp,document.createTextNode(' '),dots);
  const bd=mk('div');bd.style.cssText='margin-top:6px;color:var(--dim);font-style:italic;font-size:12px;max-height:120px;overflow-y:auto;line-height:1.5';
  tb.append(th,bd);chat.appendChild(tb);scroll();
  const cursor=mk('span','cursor-blink');bd.appendChild(cursor);
  const ts=Date.now();let tc=0;
  for(const ch of text){bd.insertBefore(document.createTextNode(ch),cursor);tc++;const el=((Date.now()-ts)/1000);const toks=Math.round(tc/4);const speed=el>0.1?Math.round(toks/el):0;tm.textContent='('+el.toFixed(1)+'s)';tk.textContent='\u00b7 ~'+toks+' tok';if(speed>0)sp.textContent='\u00b7 '+speed+' tok/s';if(tc%6===0){scroll();await wait(dur||18)}}
  await wait(200);cursor.remove();tb.classList.remove('think-glow');dots.remove();scroll()
}

async function run(){
  await wait(600);
  await typeInto('scaffold a python fastapi project with jwt auth, write unit tests, run them, and fix any failures');
  addRow('\u276F','var(--dimmer)','scaffold a python fastapi project with jwt auth, write unit tests, run them, and fix any failures');
  await wait(400);

  // Think
  await thinkBlock("This is a multi-step task. I need to: 1) Create project structure with FastAPI + JWT auth, 2) Write the auth endpoints, 3) Write unit tests with pytest, 4) Run the tests, 5) Fix any failures. I'll create tasks for parallel work and use an agent for the test-writing phase. Let me start with the scaffold...",22);
  await wait(300);

  // Bash: mkdir
  let t=makeToolRow('Bash','mkdir -p fastapi-auth/app && cd fastapi-auth');
  await wait(800);t.stopSpin();
  addResult('(created fastapi-auth/app/)');
  await wait(300);

  // Write: requirements.txt
  t=makeToolRow('Write','fastapi-auth/requirements.txt');
  await wait(600);t.stopSpin();
  const diff1=mk('div','diff-block fade-up');
  const df=mk('div','diff-file');df.textContent='+ fastapi-auth/requirements.txt';
  const da=mk('div','diff-add');da.textContent='+ fastapi==0.104.1\n+ uvicorn[standard]\n+ python-jose[cryptography]\n+ passlib[bcrypt]\n+ pytest\n+ httpx';
  diff1.append(df,da);chat.appendChild(diff1);scroll();
  await wait(400);

  // Write: main.py
  t=makeToolRow('Write','fastapi-auth/app/main.py');
  await wait(700);t.stopSpin();
  const diff2=mk('div','diff-block fade-up');
  const df2=mk('div','diff-file');df2.textContent='+ fastapi-auth/app/main.py (48 lines)';
  const da2=mk('div','diff-add');da2.textContent='+ from fastapi import FastAPI, Depends, HTTPException\n+ from .auth import create_token, verify_token\n+ app = FastAPI(title="Auth API")\n+ ...';
  diff2.append(df2,da2);chat.appendChild(diff2);scroll();
  await wait(400);

  // Write: auth.py
  t=makeToolRow('Write','fastapi-auth/app/auth.py');
  await wait(600);t.stopSpin();
  addResult('wrote 62 lines');
  await wait(300);

  // TaskCreate
  t=makeToolRow('TaskCreate','Write unit tests for auth endpoints');
  await wait(500);t.stopSpin();
  addResult('task #1 created');
  await wait(200);

  // Task cards
  const task1=addTask('#1 Write unit tests for auth endpoints','running','0s');
  const task2=addTask('#2 Run pytest and verify','pending','--');
  await wait(300);

  // Agent spawns for task 1
  const agentRow=mk('div','fade-up');agentRow.style.cssText='display:flex;gap:10px;font-size:13px';
  const ag=mk('div');ag.style.cssText='width:16px;flex-shrink:0;text-align:center;color:var(--teal);padding-top:1px';ag.textContent='\u25CF';
  const ah=mk('div');ah.style.cssText='flex:1';
  const aHead=mk('div');aHead.style.cssText='display:flex;align-items:baseline;gap:6px;font-size:13px';
  const an=mk('span');an.style.cssText='color:var(--teal);font-weight:600';an.textContent='Agent';
  const aDesc=mk('span');aDesc.style.color='var(--text2)';aDesc.textContent='"write pytest tests for JWT auth flow"';
  const aSpin=mk('span');aSpin.style.cssText='color:var(--dim);font-size:12px;margin-left:6px';
  let ai=0;const aInt=setInterval(()=>{ai=(ai+1)%4;aSpin.textContent=spinC[ai]},150);
  aHead.append(an,document.createTextNode(' ('),aDesc,document.createTextNode(')'),aSpin);
  ah.appendChild(aHead);agentRow.append(ag,ah);chat.appendChild(agentRow);scroll();
  await wait(400);

  // Sub-agent transcript (indented)
  const sub=mk('div','subagent');ah.appendChild(sub);

  // Sub-agent thinking
  const stb=mk('div','fade-up');stb.style.cssText='border-left:2px solid var(--teal);padding:6px 10px;margin:2px 0;background:linear-gradient(90deg,rgba(95,174,193,0.04) 0%,transparent 100%);border-radius:0 4px 4px 0;font-size:11px;color:var(--dim);font-style:italic';
  stb.textContent='\u2234 Planning test cases: login, token refresh, protected route, invalid credentials...';
  sub.appendChild(stb);scroll();
  await wait(600);

  // Sub-agent writes test file
  const stHead=mk('div');stHead.style.cssText='display:flex;align-items:baseline;gap:6px;font-size:12px;margin:4px 0';
  const stn=mk('span');stn.style.cssText='color:var(--accent);font-weight:500';stn.textContent='Write';
  const sts=mk('span');sts.style.color='var(--dim)';sts.textContent='fastapi-auth/tests/test_auth.py';
  stHead.append(stn,document.createTextNode(' '),sts);sub.appendChild(stHead);scroll();
  await wait(500);
  const sdiff=mk('div','diff-block fade-up');sdiff.style.fontSize='10px';
  const sdf=mk('div','diff-file');sdf.textContent='+ tests/test_auth.py (84 lines)';
  const sda=mk('div','diff-add');sda.textContent='+ def test_login_success(client):\n+     resp = client.post("/auth/login", json={...})\n+     assert resp.status_code == 200\n+     assert "access_token" in resp.json()\n+ \n+ def test_login_invalid_password(client):\n+     resp = client.post("/auth/login", json={...})\n+     assert resp.status_code == 401';
  sdiff.append(sdf,sda);sub.appendChild(sdiff);scroll();
  await wait(500);

  clearInterval(aInt);aSpin.remove();
  // Update task 1
  task1.dot.className='task-status done';task1.timeEl.textContent='3.2s';
  await wait(300);

  // Task 2 starts
  task2.dot.className='task-status running';task2.timeEl.textContent='0s';
  await wait(300);

  // Bash: pip install
  t=makeToolRow('Bash','cd fastapi-auth && pip install -r requirements.txt');
  await wait(1000);t.stopSpin();
  addResult('Successfully installed fastapi-0.104.1 uvicorn-0.24.0 python-jose-3.3.0 ...');
  await wait(400);

  // Bash: pytest
  t=makeToolRow('Bash','cd fastapi-auth && python -m pytest tests/ -v');
  await wait(1200);t.stopSpin();
  const testOut=mk('div','diff-block fade-up');testOut.style.maxHeight='80px';
  const tLines=[
    {c:'var(--success)',t:'tests/test_auth.py::test_login_success PASSED'},
    {c:'var(--success)',t:'tests/test_auth.py::test_login_invalid_password PASSED'},
    {c:'var(--error)',t:'tests/test_auth.py::test_token_refresh FAILED'},
    {c:'var(--success)',t:'tests/test_auth.py::test_protected_route PASSED'},
    {c:'var(--success)',t:'tests/test_auth.py::test_expired_token PASSED'},
    {c:'var(--dim)',t:''},
    {c:'var(--warning)',t:'4 passed, 1 failed'},
  ];
  for(const l of tLines){const ln=mk('div');ln.style.cssText='font-size:11px;color:'+l.c;ln.textContent=l.t;testOut.appendChild(ln)}
  chat.appendChild(testOut);scroll();
  await wait(400);

  // Think about failure
  await thinkBlock("test_token_refresh failed. Let me check the error - it's likely missing the refresh_token endpoint in auth.py. I need to add a /auth/refresh route that accepts a valid token and returns a new one.",25);
  await wait(300);

  // Read the error
  t=makeToolRow('Read','fastapi-auth/tests/test_auth.py:45-55');
  await wait(500);t.stopSpin();
  addResult('line 48: resp = client.post("/auth/refresh", ...)  # 404 - endpoint missing');
  await wait(300);

  // Edit: fix auth.py
  t=makeToolRow('Edit','fastapi-auth/app/auth.py');
  await wait(600);t.stopSpin();
  const fixDiff=mk('div','diff-block fade-up');
  const fdf=mk('div','diff-file');fdf.textContent='~ fastapi-auth/app/auth.py';
  const fda=mk('div','diff-add');fda.textContent='+ @router.post("/auth/refresh")\n+ async def refresh_token(token: str = Depends(oauth2_scheme)):\n+     payload = verify_token(token)\n+     new_token = create_token({"sub": payload["sub"]})\n+     return {"access_token": new_token}';
  fixDiff.append(fdf,fda);chat.appendChild(fixDiff);scroll();
  await wait(400);

  // Rerun tests
  t=makeToolRow('Bash','cd fastapi-auth && python -m pytest tests/ -v');
  await wait(1000);t.stopSpin();
  const testOut2=mk('div','diff-block fade-up');
  const tLines2=[
    {c:'var(--success)',t:'tests/test_auth.py::test_login_success PASSED'},
    {c:'var(--success)',t:'tests/test_auth.py::test_login_invalid_password PASSED'},
    {c:'var(--success)',t:'tests/test_auth.py::test_token_refresh PASSED'},
    {c:'var(--success)',t:'tests/test_auth.py::test_protected_route PASSED'},
    {c:'var(--success)',t:'tests/test_auth.py::test_expired_token PASSED'},
    {c:'var(--dim)',t:''},
    {c:'var(--success)',t:'5 passed'},
  ];
  for(const l of tLines2){const ln=mk('div');ln.style.cssText='font-size:11px;color:'+l.c;ln.textContent=l.t;testOut2.appendChild(ln)}
  chat.appendChild(testOut2);scroll();
  await wait(300);

  // Update task 2
  task2.dot.className='task-status done';task2.timeEl.textContent='6.1s';
  await wait(300);

  // Update context
  document.getElementById('ctxFill').style.width='52%';document.getElementById('ctxFill').style.background='var(--warning)';document.getElementById('ctxLbl').textContent='67k / 128k ctx';

  // Final response
  const rd=mk('div');rd.style.cssText='font-size:13px;color:var(--text);line-height:1.65';
  addRow('\u25CF','var(--accent)',rd);
  await wait(200);
  const cursor=mk('span','cursor-blink');rd.appendChild(cursor);

  const lines=[
    ['strong','Done! FastAPI project scaffolded with JWT auth + tests.'],
    ['',''],
    ['strong','Project structure:'],
    ['code','fastapi-auth/\n  app/main.py      # FastAPI app + routes\n  app/auth.py      # JWT create/verify/refresh\n  tests/test_auth.py  # 5 pytest cases\n  requirements.txt'],
    ['',''],
    ['strong','Test results: 5/5 passing'],
    ['','Fixed: added missing /auth/refresh endpoint that test_token_refresh required.'],
    ['',''],
    ['','Run with: cd fastapi-auth && uvicorn app.main:app --reload'],
  ];
  for(const[style,text]of lines){
    if(!text){const br=mk('br');rd.insertBefore(br,cursor);continue}
    if(style==='strong'){const b=mk('strong');rd.insertBefore(b,cursor);await streamWords(b,text.split(/(\s+)/),12)}
    else if(style==='code'){const pre=mk('pre');pre.style.cssText='background:var(--bg2);padding:6px 8px;border-radius:4px;font-size:11px;color:var(--accent);margin:4px 0;white-space:pre';pre.textContent=text;rd.insertBefore(pre,cursor);scroll();await wait(100)}
    else{await streamWords(rd,text.split(/(\s+)/),10,cursor)}
    await wait(60);scroll()
  }
  cursor.remove();scroll()
}
async function streamWords(parent,words,ms,before){for(let i=0;i<words.length;i++){const w=mk('span','stream-word');w.textContent=words[i];if(before)parent.insertBefore(w,before);else parent.appendChild(w);if(i%2===0){scroll();await wait(ms||10)}}}
run();
</script>
