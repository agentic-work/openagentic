<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>openagentic · codemode (agenticode UI preview)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#F4EFE6; --ink:#0E0D0B; --signal:#FF5722; --signal-2:#FFB87E; --signal-ink:#B83A0E;
    --bg-0:#18130C; --bg-1:#211A11; --bg-2:#2C2418; --bg-3:#392F20;
    --cream:#F4EFE6; --muted:#968B76; --line:rgba(244,239,230,.10);
    --mono:'IBM Plex Mono',ui-monospace,monospace; --sans:'Inter',system-ui,sans-serif;
    --ok:#22C55E; --warn:#F59E0B; --err:#FF453A;
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{margin:0;background:var(--bg-0);color:var(--cream);font-family:var(--sans);
       display:flex;flex-direction:column;height:100vh;overflow:hidden;-webkit-font-smoothing:antialiased}
  /* top bar */
  .topbar{display:flex;align-items:center;gap:14px;padding:10px 16px;background:var(--bg-1);
          border-bottom:1px solid var(--line);flex:0 0 auto}
  .brand{display:flex;align-items:baseline;gap:7px;font-family:var(--mono);font-weight:600;font-size:15px;letter-spacing:-.01em}
  .brand .g{color:var(--signal);font-weight:700;text-shadow:0 0 10px rgba(255,87,34,.35)}
  .brand .sub{color:var(--muted);font-size:11px;letter-spacing:.14em;text-transform:uppercase;margin-left:4px}
  .ws{font-family:var(--mono);font-size:12px;color:var(--muted);background:var(--bg-2);padding:3px 9px;border-radius:6px;border:1px solid var(--line)}
  .spacer{flex:1}
  .modelpick{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--muted)}
  .modelpick label{font-family:var(--mono);text-transform:uppercase;letter-spacing:.1em;font-size:10px}
  select{font-family:var(--mono);font-size:12px;background:var(--bg-2);color:var(--cream);
         border:1px solid rgba(255,87,34,.3);border-radius:7px;padding:5px 9px;outline:none;max-width:340px}
  .provbadge{font-family:var(--mono);font-size:10px;color:var(--signal);border:1px solid rgba(255,87,34,.4);
             border-radius:5px;padding:2px 7px}
  /* body: file panel + transcript */
  .main{flex:1;display:flex;min-height:0}
  .files{flex:0 0 220px;background:var(--bg-1);border-right:1px solid var(--line);overflow:auto;padding:12px 0}
  .files h4{font-family:var(--mono);font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);
            margin:0 0 8px;padding:0 14px}
  .ftree{font-family:var(--mono);font-size:12.5px;line-height:1.9}
  .ftree .row{padding:1px 14px;cursor:default;white-space:nowrap;color:#CDC4B2}
  .ftree .row:hover{background:var(--bg-2)}
  .ftree .dir{color:var(--cream);font-weight:600}
  .ftree .badge{color:var(--signal);font-size:10px;margin-left:6px}
  .col{flex:1;display:flex;flex-direction:column;min-width:0}
  .transcript{flex:1;overflow:auto;padding:22px 8px}
  .turn{max-width:880px;margin:0 auto 18px;padding:0 16px}
  .role{font-family:var(--mono);font-size:11px;letter-spacing:.06em;color:var(--muted);margin-bottom:6px;display:flex;gap:8px;align-items:center}
  .role .dot{width:7px;height:7px;border-radius:50%}
  .user .role .dot{background:var(--signal-2)} .asst .role .dot{background:var(--signal)}
  .user .bubble{background:var(--bg-2);border:1px solid var(--line);border-radius:12px;padding:10px 14px;font-size:14.5px}
  .asst .body{font-size:14.5px;line-height:1.6}
  .asst .body p{margin:.5em 0} .asst .body code{font-family:var(--mono);background:rgba(255,87,34,.12);color:var(--signal-2);padding:1px 5px;border-radius:4px;font-size:.92em}
  .asst .body pre{background:var(--bg-1);border:1px solid var(--line);border-radius:10px;padding:12px;overflow:auto;font-family:var(--mono);font-size:13px}
  /* thinking accordion */
  .think{margin:6px 0;border:1px solid var(--line);border-radius:9px;background:rgba(255,184,126,.04);overflow:hidden}
  .think summary{cursor:pointer;list-style:none;padding:7px 12px;font-family:var(--mono);font-size:12px;color:var(--signal-2);display:flex;gap:8px;align-items:center}
  .think summary::-webkit-details-marker{display:none}
  .think .tk{padding:0 12px 10px;font-size:12.5px;color:var(--muted);white-space:pre-wrap;line-height:1.5;font-family:var(--mono)}
  /* tool card */
  .tool{margin:8px 0;border:1px solid var(--line);border-radius:10px;overflow:hidden;background:var(--bg-1)}
  .tool .hd{display:flex;align-items:center;gap:9px;padding:8px 12px;font-family:var(--mono);font-size:13px;cursor:pointer}
  .tool .gear{color:var(--signal)} .tool .tname{color:var(--cream);font-weight:600}
  .tool .st{margin-left:auto;font-size:10px;letter-spacing:.1em;text-transform:uppercase;padding:2px 7px;border-radius:5px}
  .tool .st.run{color:var(--warn);border:1px solid rgba(245,158,11,.4)}
  .tool .st.ok{color:var(--ok);border:1px solid rgba(34,197,94,.4)}
  .tool .io{border-top:1px solid var(--line);padding:9px 12px;font-family:var(--mono);font-size:12px;color:var(--muted);white-space:pre-wrap;max-height:240px;overflow:auto}
  .tool .io b{color:var(--signal-2);font-weight:600}
  .chips{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
  .chip{font-size:12px;font-family:var(--mono);color:var(--signal-2);border:1px solid rgba(255,87,34,.3);
        border-radius:14px;padding:4px 12px;cursor:pointer;background:rgba(255,87,34,.06)}
  .chip:hover{background:rgba(255,87,34,.14)}
  /* composer */
  .composer{flex:0 0 auto;border-top:1px solid var(--line);background:var(--bg-1);padding:12px 16px}
  .cwrap{max-width:880px;margin:0 auto;display:flex;gap:10px;align-items:flex-end}
  textarea{flex:1;resize:none;background:var(--bg-2);border:1px solid var(--line);border-radius:12px;
           color:var(--cream);font-family:var(--sans);font-size:14.5px;padding:11px 14px;outline:none;min-height:46px;max-height:160px}
  textarea:focus{border-color:rgba(255,87,34,.5)}
  .send{font-family:var(--mono);font-weight:600;font-size:14px;color:var(--bg-0);
        background:linear-gradient(135deg,#FF5722,#E64A19);border:none;border-radius:11px;padding:11px 20px;cursor:pointer}
  .send:disabled{opacity:.5;cursor:default}
  /* status line */
  .status{flex:0 0 auto;display:flex;align-items:center;gap:16px;padding:5px 16px;background:var(--bg-0);
          border-top:1px solid var(--line);font-family:var(--mono);font-size:11px;color:var(--muted)}
  .status .s{display:flex;gap:6px;align-items:center}
  .status .live{color:var(--signal)}
  .dotpulse{width:7px;height:7px;border-radius:50%;background:var(--signal);animation:p 1.1s infinite}
  @keyframes p{0%,100%{opacity:.3}50%{opacity:1}}
  .hint{color:var(--muted);font-size:11px;font-family:var(--mono);text-align:center;margin-top:6px;opacity:.7}
</style>
</head>
<body>
  <div class="topbar">
    <div class="brand"><span class="g">⌥</span><span>openagentic</span><span class="sub">codemode</span></div>
    <span class="ws" id="ws">~/workspace</span>
    <div class="spacer"></div>
    <div class="modelpick">
      <label>model registry</label>
      <select id="model"><option>loading…</option></select>
      <span class="provbadge" id="prov">—</span>
    </div>
  </div>
  <div class="main">
    <div class="files">
      <h4>workspace</h4>
      <div class="ftree" id="ftree"></div>
    </div>
    <div class="col">
      <div class="transcript" id="transcript"></div>
      <div class="composer">
        <div class="cwrap">
          <textarea id="input" placeholder="Ask codemode to build, debug, or explain…  (⌥ uses the selected registry model)"></textarea>
          <button class="send" id="send">Send</button>
        </div>
        <div class="hint">agenticode-style transcript · NDJSON-shaped events · same React renderers the macOS app uses</div>
      </div>
      <div class="status">
        <div class="s"><span id="state">● idle</span></div>
        <div class="s">model: <span class="live" id="smodel">—</span></div>
        <div class="s">tokens: <span id="stok">0</span></div>
        <div class="s" style="margin-left:auto" id="srun"></div>
      </div>
    </div>
  </div>

<script>
const $ = s => document.querySelector(s);
let TOKEN=null, SID=null, TOKENS=0;

const SAMPLE_TREE = [
  ['📁 src', 'dir'], ['  📄 index.ts', ''], ['  📄 server.ts', ''],
  ['  📁 routes', 'dir'], ['    📄 chat.ts', ''], ['    📄 models.ts', ''],
  ['  📁 services', 'dir'], ['    📄 ProviderManager.ts', ''],
  ['📄 package.json', ''], ['📄 tsconfig.json', ''], ['📄 AGENTICODE.md', 'mem'],
  ['📄 README.md', ''],
];
function renderTree(){
  $('#ftree').innerHTML = SAMPLE_TREE.map(([t,c])=>{
    const cls = c==='dir'?'row dir':'row';
    const badge = c==='mem'?'<span class="badge">memory</span>':'';
    return `<div class="${cls}">${t}${badge}</div>`;
  }).join('');
}

async function api(path, opts={}){
  const r = await fetch(path, {...opts, headers:{'Content-Type':'application/json', ...(TOKEN?{'Authorization':'Bearer '+TOKEN}:{}), ...(opts.headers||{})}});
  return r;
}
async function boot(){
  renderTree();
  // 1. login
  const lr = await api('/api/auth/local/login',{method:'POST',body:JSON.stringify({username:'admin@openagentic.local',password:'smoke-admin-1234'})});
  const lj = await lr.json(); TOKEN = lj.token;
  // 2. model registry
  const mr = await api('/api/models'); const mj = await mr.json();
  const models = (mj.models||mj||[]);
  const sel = $('#model'); sel.innerHTML='';
  models.forEach(m=>{ const o=document.createElement('option'); o.value=m.id; o.textContent=m.id; o.dataset.prov=m.providerType||''; sel.appendChild(o); });
  // default = codemode model (role 'code' if present, else first)
  const codeIdx = models.findIndex(m=>(m.roles||[]).some(r=>/code/i.test(r)));
  sel.selectedIndex = codeIdx>=0?codeIdx:0;
  syncModel();
  sel.addEventListener('change', syncModel);
  // 3. session
  const sr = await api('/api/chat/sessions',{method:'POST',body:JSON.stringify({title:'codemode-preview'})});
  SID = (await sr.json()).session.id;
  setState('idle');
}
function syncModel(){
  const o = $('#model').selectedOptions[0];
  $('#smodel').textContent = o ? o.value.split('.').pop().slice(0,28) : '—';
  $('#prov').textContent = o ? (o.dataset.prov||'model') : '—';
}
function setState(s){
  const map={idle:'● idle', thinking:'◐ thinking', running:'◑ running tool', streaming:'◓ responding', done:'● done'};
  $('#state').innerHTML = (s==='idle'||s==='done') ? map[s] : `<span class="dotpulse" style="display:inline-block;margin-right:6px"></span>${map[s]}`;
}
function turnEl(role){
  const d=document.createElement('div'); d.className='turn '+(role==='user'?'user':'asst');
  d.innerHTML = `<div class="role"><span class="dot"></span>${role==='user'?'you':'codemode · '+($('#smodel').textContent)}</div>`;
  $('#transcript').appendChild(d); return d;
}
function scroll(){ const t=$('#transcript'); t.scrollTop=t.scrollHeight; }

async function send(){
  const text = $('#input').value.trim(); if(!text||!SID) return;
  $('#input').value=''; $('#send').disabled=true;
  const u=turnEl('user'); const b=document.createElement('div'); b.className='bubble'; b.textContent=text; u.appendChild(b); scroll();
  const a=turnEl('asst');
  let thinkBox=null, thinkBody=null, bodyEl=null, curTool=null;
  setState('thinking'); $('#srun').innerHTML='<span class="live">● live</span>';
  const ensureBody=()=>{ if(!bodyEl){ bodyEl=document.createElement('div'); bodyEl.className='body'; a.appendChild(bodyEl);} return bodyEl; };
  const ensureThink=()=>{ if(!thinkBox){ thinkBox=document.createElement('details'); thinkBox.className='think'; thinkBox.open=true;
      thinkBox.innerHTML='<summary>◇ thinking…</summary>'; thinkBody=document.createElement('div'); thinkBody.className='tk'; thinkBox.appendChild(thinkBody); a.appendChild(thinkBox);} return thinkBody; };
  try{
    const res = await fetch('/api/chat/stream',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+TOKEN},
      body:JSON.stringify({message:text, sessionId:SID})});
    const reader = res.body.getReader(); const dec=new TextDecoder(); let buf='';
    while(true){
      const {done,value}=await reader.read(); if(done) break;
      buf+=dec.decode(value,{stream:true}); const lines=buf.split('\n'); buf=lines.pop();
      for(const line of lines){ const s=line.trim(); if(!s) continue; let e; try{e=JSON.parse(s)}catch{continue}
        handle(e); }
    }
  }catch(err){ ensureBody().innerHTML+=`<p style="color:var(--err)">stream error: ${err}</p>`; }
  setState('done'); $('#srun').innerHTML=''; $('#send').disabled=false; scroll();

  function handle(e){
    const d=e.delta||{};
    if(e.type==='content_block_delta'){
      const tt=d.type||'';
      if(tt.includes('thinking')||d.thinking){ setState('thinking'); ensureThink().textContent += (d.thinking||d.text||''); }
      else { setState('streaming'); const t=(d.text||d.thinking||''); if(t){ if(thinkBox&&thinkBox.open) thinkBox.open=false; renderText(ensureBody(), t); } }
      scroll();
    } else if(e.type==='thinking_complete'){ if(thinkBox){ thinkBox.querySelector('summary').textContent='◇ thought'; thinkBox.open=false; } }
    else if(e.type==='tool_call_complete'||e.type==='tool_executing'){
      const name=e.name||e.tool||(e.toolCall&&e.toolCall.name)||'tool';
      const input=e.input||e.args||(e.toolCall&&e.toolCall.input)||{};
      if(!curTool||curTool.dataset.tool!==name||e.type==='tool_call_complete'){
        curTool=document.createElement('div'); curTool.className='tool'; curTool.dataset.tool=name;
        curTool.innerHTML=`<div class="hd"><span class="gear">⚙</span><span class="tname">${name}</span><span class="st run">running</span></div>`+
          `<div class="io"><b>input</b>\n${escapeHtml(JSON.stringify(input,null,2)).slice(0,600)}</div>`;
        a.appendChild(curTool); curTool.querySelector('.hd').onclick=()=>curTool.querySelector('.io').classList.toggle('hide');
      }
      setState('running'); scroll();
    }
    else if(e.type==='tool_result'){
      const name=e.name||e.tool||'tool'; let tcard=curTool;
      if(tcard){ const st=tcard.querySelector('.st'); st.textContent='done'; st.className='st ok';
        const out=document.createElement('div'); out.className='io';
        let r=e.result!==undefined?e.result:(e.content!==undefined?e.content:e.output);
        if(typeof r!=='string') r=JSON.stringify(r,null,2);
        out.innerHTML=`<b>result</b>\n${escapeHtml((r||'').toString()).slice(0,1200)}`; tcard.appendChild(out);
      }
      scroll();
    }
    else if(e.type==='follow_up'&&Array.isArray(e.items)){
      const c=document.createElement('div'); c.className='chips';
      e.items.forEach(it=>{ const ch=document.createElement('span'); ch.className='chip'; ch.textContent=it; ch.onclick=()=>{$('#input').value=it;send();}; c.appendChild(ch); });
      a.appendChild(c);
    }
    else if(e.type==='done'){ if(e.model) $('#smodel').textContent=e.model.split('.').pop().slice(0,28); }
    else if(e.type==='stream_complete'){ if(e.usage&&e.usage.totalTokens){ TOKENS+=e.usage.totalTokens; $('#stok').textContent=TOKENS; } }
    if(e.usage&&e.usage.totalTokens){ $('#stok').textContent = (TOKENS=Math.max(TOKENS,e.usage.totalTokens)); }
  }
}
function renderText(el, t){
  // lightweight markdown: code spans, bold, paragraphs
  el.dataset.raw = (el.dataset.raw||'')+t;
  let h = escapeHtml(el.dataset.raw)
    .replace(/```([\s\S]*?)```/g,(m,c)=>`<pre>${c}</pre>`)
    .replace(/`([^`]+)`/g,'<code>$1</code>')
    .replace(/\*\*([^*]+)\*\*/g,'<b>$1</b>')
    .replace(/\n\n/g,'</p><p>');
  el.innerHTML = '<p>'+h+'</p>';
}
function escapeHtml(s){ return (s||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }
$('#send').addEventListener('click', send);
$('#input').addEventListener('keydown', e=>{ if(e.key==='Enter'&&!e.shiftKey){ e.preventDefault(); send(); }});
boot().catch(e=>{ $('#transcript').innerHTML='<div class="turn"><div class="body" style="color:var(--err)">boot error: '+e+'</div></div>'; });
</script>
</body>
</html>
