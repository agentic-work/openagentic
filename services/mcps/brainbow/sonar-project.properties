# SonarQube project config — generated by initial bootstrap.
sonar.projectKey=brainbow
sonar.projectName=Brainbow
sonar.sourceEncoding=UTF-8

# ui.html is a single-file embedded viewer — its inline JS + CSS are style-
# only, not covered by tests, and would pollute the smell count.
sonar.exclusions=**/node_modules/**,**/dist/**,**/build/**,**/.next/**,**/coverage/**,**/__pycache__/**,**/*.min.js,**/*.bundle.js,**/.venv/**,**/venv/**,**/target/**,**/.gradle/**,**/vendor/**,ui.html

sonar.test.inclusions=**/*.test.js,**/*.spec.js,**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx,**/test/**,**/tests/**,**/__tests__/**,**/*_test.py,**/test_*.py

# Coverage — JavaScript LCOV enabled; Python left commented (not a Python project).
sonar.javascript.lcov.reportPaths=coverage/lcov.info
# sonar.python.coverage.reportPaths=coverage.xml

# server.js is the HTTP entrypoint — exercised only via subprocess-based
# trip-wire tests (which run when Chromium is available). v8 can't
# instrument subprocesses, so it would be 0% even if tests ran. Exclude
# from the coverage denominator; unit coverage reflects only src/.
sonar.coverage.exclusions=ui.html,server.js,scripts/**,tests/fixtures/**,**/*.config.js
