# SonarQube project config.
sonar.projectKey=synth
sonar.projectName=Synth
sonar.sourceEncoding=UTF-8

# Restrict analysis to the Python package. Exclude build artefacts,
# venvs, caches, generated Playwright snapshots, and the capabilities
# YAML catalogue (data, not code).
sonar.sources=synth
sonar.exclusions=\
  **/node_modules/**,\
  **/dist/**,\
  **/build/**,\
  **/.next/**,\
  **/coverage/**,\
  **/__pycache__/**,\
  **/*.min.js,\
  **/*.bundle.js,\
  **/.venv/**,\
  **/venv/**,\
  **/target/**,\
  **/.gradle/**,\
  **/vendor/**,\
  **/.playwright-mcp/**,\
  **/synth/capabilities/builtin.yaml,\
  synth/core/identity.py,\
  synth/core/metrics.py,\
  synth/platform/integration.py

# Tests live under tests/ — they count for SonarQube's test-coverage but
# are excluded from the "main source" scan for bugs/smells.
sonar.tests=tests
sonar.test.inclusions=\
  tests/**,\
  **/*_test.py,\
  **/test_*.py

# Planned/internal stubs — no live imports today. Excluded from the
# coverage denominator so they don't drag the project rating down
# until wired. Delete each exclusion when its module is activated.
sonar.coverage.exclusions=\
  synth/core/identity.py,\
  synth/core/metrics.py,\
  synth/platform/integration.py

# Coverage report — produced by pytest-cov via .coveragerc.
sonar.python.coverage.reportPaths=coverage.xml
sonar.python.version=3.11, 3.12
