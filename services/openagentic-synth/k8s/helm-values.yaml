# Proprietary and confidential. Unauthorized copying prohibited.

# OAT Executor Helm Values
# Add this to your main values.yaml under oatExecutor:

oatExecutor:
  enabled: true

  replicaCount: 2

  image:
    repository: harbor.agenticwork.io/openagentic/openagentic-synth
    tag: latest
    pullPolicy: Always

  # Resource configuration
  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "1000m"

  # Executor configuration
  config:
    port: 8090
    maxExecutionTime: 30
    maxMemoryMb: 256
    maxConcurrent: 5
    logLevel: INFO

  # Autoscaling
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 20
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80
    # Scale up aggressively, scale down conservatively
    scaleUpStabilizationSeconds: 30
    scaleDownStabilizationSeconds: 300

  # Security
  securityContext:
    runAsNonRoot: true
    runAsUser: 65532
    runAsGroup: 65532
    readOnlyRootFilesystem: true
    allowPrivilegeEscalation: false

  # Network policy
  networkPolicy:
    enabled: true
    # IPs that can call the executor (openagentic-api pods)
    allowedSources:
      - podSelector:
          matchLabels:
            app: openagentic-api
    # External APIs the executor can call
    allowExternalHttps: true
    # Block internal network access
    blockInternalNetworks: true

  # Observability
  otel:
    enabled: true
    endpoint: "http://otel-collector.monitoring:4317"

  # Health checks
  livenessProbe:
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3

  readinessProbe:
    initialDelaySeconds: 3
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 2

  # Pod disruption budget
  podDisruptionBudget:
    enabled: true
    minAvailable: 1

  # Topology spread
  topologySpreadConstraints:
    enabled: true
    maxSkew: 1
