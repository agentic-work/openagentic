# Loki — single-binary, filesystem storage. Backs the built-in loki MCP
# (oap-loki-mcp) which the mcp-proxy points at http://loki:3100 (LOKI_URL).
# Promtail ships every compose container's stdout/stderr here so "show me the
# api logs" / LogQL queries work out-of-the-box on a fresh install.
auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9096
  log_level: warn

common:
  instance_addr: 127.0.0.1
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

schema_config:
  configs:
    - from: 2024-01-01
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

limits_config:
  reject_old_samples: false
  allow_structured_metadata: true
  retention_period: 168h   # 7d, matches prometheus

compactor:
  working_directory: /loki/compactor
  delete_request_store: filesystem
  retention_enabled: true

# No phone-home (matches the platform's zero-telemetry posture).
analytics:
  reporting_enabled: false
